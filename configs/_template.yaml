# Cruxible Core Configuration Template
# ====================================
#
# This file is an authoring checklist for a Cruxible world model. It is not a
# complete domain by itself: copy it, replace the empty maps/lists with your
# domain objects, and keep only the sections you need.
#
# For full field semantics, see docs/config-reference.md.

version: "1.0"
name: my_domain
description: >
  Describe the decision domain, who maintains it, and what decisions it
  supports.
# cruxible_version: "0.2.0"
# extends: ../base-world/config.yaml

# ---------------------------------------------------------------------------
# Shared Enums
# ---------------------------------------------------------------------------
# Use enum_ref when the same vocabulary appears in multiple properties.
# Add ordered: low_to_high only when the order of values is semantic rank.
enums: {}
  # priority:
  #   description: Shared rank from lowest to highest.
  #   values: [low, medium, high, critical]
  #   ordered: low_to_high
  # lifecycle_status:
  #   values: [active, inactive, retired]

# ---------------------------------------------------------------------------
# Entity Types
# ---------------------------------------------------------------------------
# Entity properties default to type: string and optional: true.
# Supported property types:
#   string, int, integer, float, number, bool, date, datetime, json
entity_types: {}
  # EntityA:
  #   description: Durable thing the graph should remember.
  #   properties:
  #     entity_a_id:
  #       type: string
  #       primary_key: true
  #     name:
  #       indexed: true
  #     status:
  #       enum_ref: lifecycle_status
  #       indexed: true
  #     score:
  #       type: number
  #       optional: true
  #     tags:
  #       type: json
  #       optional: true
  #       json_schema:
  #         type: array
  #         items: {type: string}
  #   constraints: []
  #
  # EntityB:
  #   properties:
  #     entity_b_id: {type: string, primary_key: true}
  #     owner: {}

# ---------------------------------------------------------------------------
# Relationships
# ---------------------------------------------------------------------------
# Relationships are directed from -> to. Add proposal_policy only when the
# edge is governed and should be proposed/reviewed rather than deterministically
# applied.
relationships: []
  # - name: entity_a_relates_to_entity_b
  #   description: Deterministic or governed relationship description.
  #   from: EntityA
  #   to: EntityB
  #   inverse: entity_b_related_from_entity_a
  #   cardinality: many_to_many
  #   properties:
  #     source: {}
  #     basis: {}
  #   # Put durable provenance for accepted facts in relationship metadata via
  #   # workflow evidence mappings, not generic relationship properties.
  #
  # - name: governed_relationship
  #   from: EntityA
  #   to: EntityB
  #   proposal_identity: thesis_signature  # or relationship_tuple
  #   properties:
  #     verdict: {enum: [support, unsure, contradict]}
  #     basis: {}
  #   proposal_policy:
  #     auto_resolve_when: all_support
  #     auto_resolve_requires_prior_trust: trusted_only
  #     max_group_size: 1000
  #     signals:
  #       provider_signal:
  #         role: required       # required, blocking, advisory
  #         always_review_on_unsure: true
  #         note: Explain what this signal means.

# ---------------------------------------------------------------------------
# Named Queries
# ---------------------------------------------------------------------------
# Queries are public read surfaces. Use traversal when the caller provides an
# entry entity. Use collection when the query lists one entity or relationship
# type without an entry point.
named_queries: {}
  # entity_b_for_entity_a:
  #   description: Starting from EntityA, find related EntityB rows.
  #   mode: traversal
  #   entry_point: EntityA
  #   returns: EntityB
  #   result_shape: path          # path, entity, relationship
  #   dedupe: path                # path, entity, none
  #   relationship_state: live    # live, accepted, pending, reviewable
  #   allow_relationship_state_override: false
  #   traversal:
  #     - relationship: entity_a_relates_to_entity_b
  #       direction: outgoing     # outgoing, incoming, both
  #       alias: relation
  #       required: true
  #       max_depth: 1
  #       filter:
  #         source: system_a
  #       target_filter:
  #         status: active
  #       where:
  #         candidate.properties.status:
  #           eq: active
  #       where_related:
  #         - relationship: blocked_by
  #           direction: outgoing
  #           target:
  #             entity_id: {eq: $entry.entity_id}
  #       where_not_related: []
  #       exclude_if_related: []
  #   include:
  #     owners:
  #       from: $result
  #       relationship: owned_by
  #       direction: outgoing
  #       many: true
  #       required: false
  #       relationship_state: live
  #       where:
  #         target.properties.status: {eq: active}
  #       order_by:
  #         - by: $target.properties.name
  #           direction: asc
  #   select:
  #     source_id: $entry.entity_id
  #     target_id: $result.entity_id
  #     relation_source: $path.relation.edge.properties.source
  #   order_by:
  #     - by: $result.properties.priority
  #       direction: desc
  #       enum_ref: priority
  #   limit: 100
  #   max_paths: 1000
  #   max_paths_per_result: 10
  #
  # active_entity_a:
  #   description: Entryless entity collection.
  #   mode: collection
  #   result_shape: entity
  #   returns: EntityA
  #   where:
  #     result.properties.status: {eq: active}
  #   order_by:
  #     - by: $result.properties.name
  #       direction: asc
  #   limit: 100
  #
  # reviewable_governed_edges:
  #   description: Entryless relationship collection.
  #   mode: collection
  #   result_shape: relationship
  #   returns: governed_relationship
  #   relationship_state: reviewable
  #   where:
  #     edge.properties.verdict: {ne: contradict}
  #     source.properties.status: {eq: active}
  #     target.entity_id: {eq: $input.target_id}

# ---------------------------------------------------------------------------
# Constraints
# ---------------------------------------------------------------------------
# Constraints are compact boolean rules evaluated by the graph validation path.
constraints: []
  # - name: active_entities_need_owner
  #   description: Active EntityA rows should have an owner value.
  #   rule: "EntityA.status == 'active' -> EntityA.owner != null"
  #   value_type: bool
  #   severity: warning

# ---------------------------------------------------------------------------
# Quality Checks
# ---------------------------------------------------------------------------
# Quality checks run over graph state and produce diagnostics. They are useful
# for operational guardrails that do not belong in provider code.
quality_checks: []
  # - name: entity_a_has_name
  #   kind: property
  #   severity: warning
  #   target: entity
  #   entity_type: EntityA
  #   property: name
  #   rule: non_empty             # required, non_empty, type, pattern
  #
  # - name: unique_entity_a_names
  #   kind: uniqueness
  #   entity_type: EntityA
  #   properties: [name]
  #
  # - name: at_least_one_entity_a
  #   kind: bounds
  #   target: entity_count
  #   entity_type: EntityA
  #   min_count: 1
  #
  # - name: entity_a_has_one_owner
  #   kind: cardinality
  #   entity_type: EntityA
  #   relationship_type: owned_by
  #   direction: outgoing
  #   min_count: 1
  #   max_count: 1
  #
  # - name: denormalized_owner_matches_edge
  #   kind: relationship_property_consistency
  #   severity: warning
  #   entity_type: EntityA
  #   relationship_type: owned_by
  #   direction: outgoing
  #   source_property: owner_id
  #   target_property: owner_id
  #   allow_missing_source: true

# ---------------------------------------------------------------------------
# Feedback Profiles
# ---------------------------------------------------------------------------
# Feedback profiles define bounded reason codes for relationship feedback.
feedback_profiles: {}
  # governed_relationship:
  #   version: 1
  #   reason_codes:
  #     wrong_target:
  #       description: The proposed target entity is incorrect.
  #       remediation_hint: provider_fix
  #       required_scope_keys: [source, target]
  #   scope_keys:
  #     source: FROM.entity_a_id
  #     target: TO.entity_b_id

# ---------------------------------------------------------------------------
# Outcome Profiles
# ---------------------------------------------------------------------------
# Outcome profiles define bounded labels/codes for trust and quality analysis.
outcome_profiles: {}
  # governed_relationship_resolution:
  #   anchor_type: resolution
  #   relationship_type: governed_relationship
  #   version: 1
  #   outcome_codes:
  #     correct:
  #       description: The accepted relationship remained correct.
  #       remediation_hint: trust_adjustment
  #       required_scope_keys: [relationship_type]
  #   scope_keys:
  #     relationship_type: RESOLUTION.relationship_type
  #
  # entity_query_receipt:
  #   anchor_type: receipt
  #   surface_type: query
  #   surface_name: active_entity_a
  #   version: 1
  #   outcome_codes:
  #     missing_result:
  #       description: A known relevant entity was missing from the query.
  #       remediation_hint: graph_fix
  #       required_scope_keys: [query]
  #   scope_keys:
  #     query: SURFACE.name

# ---------------------------------------------------------------------------
# Decision Policies
# ---------------------------------------------------------------------------
# Decision policies apply action-side behavior during query/proposal execution.
decision_policies: []
  # - name: suppress_retired_targets
  #   description: Hide retired relationships from this investigation query.
  #   applies_to: query
  #   query_name: reviewable_governed_edges
  #   relationship_type: governed_relationship
  #   effect: suppress             # query supports suppress; workflow supports require_review
  #   rationale: Retired targets are not actionable.
  #   match:
  #     from: {}
  #     to:
  #       status: retired
  #     edge: {}
  #     context: {}
  #   expires_at: "2026-12-31"

# ---------------------------------------------------------------------------
# Contracts
# ---------------------------------------------------------------------------
# Contracts define provider/workflow payload boundaries.
# Built-ins:
#   cruxible.EmptyInput
#   cruxible.JsonObject
#   cruxible.JsonItems
#   cruxible.ParsedTabularBundle
contracts: {}
  # RawRows:
  #   description: Provider output rows.
  #   allow_extra: false
  #   fields:
  #     items:
  #       type: json
  #       json_schema:
  #         type: array
  #         items: {type: object}
  #
  # WorkflowInput:
  #   fields:
  #     entity_a_id:
  #       type: string
  #     include_inactive:
  #       type: bool
  #       optional: true

# ---------------------------------------------------------------------------
# Artifacts
# ---------------------------------------------------------------------------
# Artifacts are pinned files/directories. Only loader/parser providers should
# declare artifact access; domain transform providers should receive explicit
# input fields from workflow config.
artifacts: {}
  # source_bundle:
  #   kind: directory
  #   uri: ./data/seed
  #   sha256: sha256:<digest>
  #   metadata:
  #     owner: data-platform

# ---------------------------------------------------------------------------
# Providers
# ---------------------------------------------------------------------------
# Providers are versioned executable leaves. They still accept/return plain
# dictionaries; use contracts to document and validate their payloads.
providers: {}
  # parse_source_bundle:
  #   kind: function               # function, model, tool
  #   description: Parse source files into named tables.
  #   contract_in: cruxible.JsonObject
  #   contract_out: cruxible.ParsedTabularBundle
  #   ref: cruxible_core.providers.common.tabular.load_tabular_artifact_bundle
  #   version: "1.0.0"
  #   deterministic: true
  #   runtime: python              # python, http_json, command
  #   artifact: source_bundle
  #   side_effects: false
  #   config: {}
  #
  # normalize_rows:
