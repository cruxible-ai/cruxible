name: Publish to PyPI

on:
  push:
    tags: ["v*"]

jobs:
  verify-versions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify package versions are locked
        run: |
          python - <<'PY'
          import tomllib
          from pathlib import Path

          root = tomllib.loads(Path("pyproject.toml").read_text())
          client = tomllib.loads(Path("packages/cruxible-client/pyproject.toml").read_text())
          core_version = root["project"]["version"]
          client_version = client["project"]["version"]
          expected = f"cruxible-client=={client_version}"
          dependencies = root["project"]["dependencies"]

          if core_version != client_version:
              raise SystemExit(
                  f"Version mismatch: cruxible={core_version} cruxible-client={client_version}"
              )
          if expected not in dependencies:
              raise SystemExit(f"Missing exact dependency pin: {expected}")
          PY

  # PyPI pending publishers must have distinct configurations, so the two
  # packages publish from separate jobs: cruxible-client under the
  # pypi-cruxible-client environment, cruxible with no environment.
  publish-client:
    runs-on: ubuntu-latest
    needs: verify-versions
    environment: pypi-cruxible-client
    permissions:
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4

      - name: Build cruxible-client
        run: uv build --package cruxible-client

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  publish-cruxible:
    runs-on: ubuntu-latest
    needs: publish-client
    permissions:
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4

      - name: Build cruxible
        run: uv build --package cruxible

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
