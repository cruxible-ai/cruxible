name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --all-packages --all-extras

      - name: Lint
        run: uv run ruff check src packages/cruxible-client/src tests

      - name: Format check
        run: uv run ruff format --check src packages/cruxible-client/src tests

      - name: Type check
        run: uv run mypy src packages/cruxible-client/src

      - name: Test
        run: uv run pytest --tb=short

      - name: Cruxible review handoff preflight
        if: matrix.python-version == '3.12'
        env:
          CRUXIBLE_SERVER_URL: ${{ vars.CRUXIBLE_STATE_URL }}
          CRUXIBLE_INSTANCE_ID: ${{ vars.CRUXIBLE_INSTANCE_ID }}
          CRUXIBLE_SERVER_BEARER_TOKEN: ${{ secrets.CRUXIBLE_STATE_READER_TOKEN }}
          CRUXIBLE_CHANGE_REPO: ${{ github.repository }}
          CRUXIBLE_CHANGE_HEAD: ${{ github.event.pull_request.head.sha || github.sha }}
          CRUXIBLE_EXPECTED_CONFIG_NAME: project_state
        run: |
          if [ -z "$CRUXIBLE_SERVER_URL" ] || [ -z "$CRUXIBLE_INSTANCE_ID" ] || [ -z "$CRUXIBLE_SERVER_BEARER_TOKEN" ]; then
            echo "Skipping Cruxible review handoff preflight; state endpoint/token not configured."
            exit 0
          fi
          uv run python scripts/check_review_handoff.py

  docker-image-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-packages --all-extras

      - name: Verify Docker daemon
        run: docker info

      - name: Test Docker image
        env:
          CRUXIBLE_RUN_DOCKER_TESTS: "1"
        run: uv run pytest tests/test_image -m docker --tb=short
