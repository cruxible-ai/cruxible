version: "1.0"
name: case_law_monitoring
description: >
  Single-layer case-law monitoring world model for use alongside a specialized
  legal agent. The canonical layer tracks opinions, courts, judges, statutes,
  legal issues, clients, firm matters, filings, deadlines, attorneys, arguments,
  and case outcomes. Governed relationships capture the legal judgments a lawyer
  or agent should review: matter statutory scope, holdings, statutory
  interpretation, treatment of prior opinions, argument impact, matter impact,
  filing response obligations, and review obligations.

# ─── Entity types ────────────────────────────────────────────────────

entity_types:
  Opinion:
    description: "Published opinion, order, or precedential legal authority monitored by the legal agent."
    id: opinion_id
    properties:
      case_name: string indexed
      citation: string indexed
      docket_number: string
      date_filed: date
      jurisdiction: string indexed
      precedential_status:
        type: string
        optional: true
        enum:
        - published
        - unpublished
        - precedential
        - nonprecedential
        - order
      source_url: string

  Court:
    description: "Court or tribunal issuing opinions and hosting matters."
    id: court_id
    properties:
      name: string indexed
      jurisdiction: string indexed
      level:
        type: string
        optional: true
        enum:
        - trial
        - appellate
        - supreme
        - administrative

  Judge:
    description: "Judge, panel member, or adjudicator associated with an opinion."
    id: judge_id
    properties:
      name: string indexed
      court_hint: string

  Statute:
    description: "Statute, regulation, rule, or doctrinal source interpreted by opinions and relevant to matters."
    id: statute_id
    properties:
      title: string indexed
      section: string indexed
      jurisdiction: string
      topic: string

  LegalIssue:
    description: "Practice-specific legal issue or doctrine tracked by a firm or team."
    id: issue_id
    properties:
      name: string indexed
      practice_area: string
      description: string

  Client:
    description: "Firm client associated with one or more matters."
    id: client_id
    properties:
      name: string indexed
      industry: string

  Matter:
    description: "Firm matter, pending case, investigation, deal, or client representation that legal developments may affect."
    id: matter_id
    properties:
      name: string indexed
      client_name:
        type: string
        optional: true
        indexed: true
        description: Denormalized display name; matter_for_client is the relationship source
          of truth.
      matter_type:
        type: string
        optional: true
        enum:
        - litigation
        - investigation
        - advisory
        - transaction
        - regulatory
      status:
        type: string
        optional: true
        enum:
        - active
        - stayed
        - closed
        - monitoring
      jurisdiction: string

  Filing:
    description: "Filing, brief, motion, order, docket entry, or client work product associated with a matter."
    id: filing_id
    properties:
      docket_number: string
      title: string indexed
      filing_type:
        type: string
        optional: true
        enum:
        - complaint
        - motion
        - brief
        - order
        - notice
        - letter
        - memo
      filed_at: date

  Deadline:
    description: "Filing deadline, response obligation, hearing date, or other matter deadline."
    id: deadline_id
    properties:
      title: string indexed
      due_date: date
      deadline_type:
        type: string
        optional: true
        enum:
        - filing
        - response
        - discovery
        - hearing
        - statute_of_limitations
        - client_update
      status:
        type: string
        optional: true
        enum:
        - pending
        - met
        - missed
        - extended
        - waived
        - closed

  Attorney:
    description: "Attorney or legal team member responsible for matters and review items."
    id: attorney_id
    properties:
      name: string indexed
      team: string
      email: string

  Argument:
    description: "Legal argument, position, theory, or cited-authority bundle used in a matter."
    id: argument_id
    properties:
      title: string indexed
      description: string
      argument_type:
        type: string
        optional: true
        enum:
        - claim
        - defense
        - counterclaim
        - affirmative_defense
        - motion
        - advisory_position
      position:
        type: string
        optional: true
        enum:
        - plaintiff
        - defense
        - petitioner
        - respondent
        - advisory
        - neutral
      status:
        type: string
        optional: true
        enum:
        - draft
        - filed
        - planned
        - abandoned
        - preserved

  Holding:
    description: "Atomic holding or rule extracted from an opinion for reviewed legal reasoning."
    id: holding_id
    properties:
      summary: string indexed
      holding_type:
        type: string
        optional: true
        enum:
        - rule
        - exception
        - application
        - distinction
        - procedural
      scope: string

  ReviewItem:
    description: "Review obligation or attorney work item created by legal developments."
    id: review_item_id
    properties:
      title: string indexed
      priority:
        type: string
        optional: true
        enum:
        - critical
        - high
        - medium
        - low
      status:
        type: string
        optional: true
        enum:
        - open
        - assigned
        - reviewed
        - closed
      due_at: date

  CaseOutcome:
    description: "Resolved matter result. Distinct from Cruxible Loop 2 outcomes, which judge whether system decisions were correct."
    id: outcome_id
    properties:
      result:
        type: string
        enum:
        - won
        - lost
        - settled
        - dismissed
        - default_judgment
        - withdrawn
        - moot
      resolved_at: date
      notes: string

# ─── Relationships ──────────────────────────────────────────────────

relationships:
  # Canonical anchors and firm state.
  - opinion_from_court: Opinion -> Court  # Opinion was issued by a court.

  - opinion_decided_by_judge: Opinion -> Judge  # Opinion was decided or joined by a judge.
    properties:
      role:
        type: string
        optional: true
        enum:
        - author
        - panel_member
        - concurrence
        - dissent

  - opinion_cites_opinion: Opinion -> Opinion  # Opinion cites another opinion as authority.
    properties:
      citation_context: string

  - filing_in_matter: Filing -> Matter  # Filing belongs to a firm matter.

  - matter_for_client: Matter -> Client  # Matter belongs to a firm client.

  - matter_assigned_to_attorney: Matter -> Attorney  # Matter is assigned to an attorney or responsible team member.
    properties:
      role:
        type: string
        optional: true
        enum:
        - lead
        - reviewer
        - responsible_attorney
        - watcher

  - matter_in_jurisdiction: Matter -> Court  # Matter is pending in or primarily governed by a court jurisdiction.

  - matter_has_deadline: Matter -> Deadline  # Matter has a filing deadline, response obligation, or other tracked deadline.

  - argument_in_matter: Argument -> Matter  # Legal argument belongs to a matter.

  - argument_raises_issue: Argument -> LegalIssue  # Legal argument raises a tracked legal issue.

  - argument_cites_opinion: Argument -> Opinion  # Legal argument relies on a cited opinion.
    properties:
      citation_role:
        type: string
        optional: true
        enum:
        - primary
        - supporting
        - distinguishing
        - background

  - statute_governs_issue: Statute -> LegalIssue  # Statute, rule, or regulation is relevant to a tracked legal issue.

  - outcome_of_matter: CaseOutcome -> Matter  # Case outcome resolves or records the result of a matter.

  - outcome_resolved_argument: CaseOutcome -> Argument  # Case outcome resolved or affected a specific argument.
    properties:
      role:
        type: string
        optional: true
        enum:
        - primary_argument
        - alternative_argument
        - defensive
        - amicus
        - not_reached
      prevailed:
        type: bool
        optional: true
      weight:
        type: string
        optional: true
        enum:
        - adopted
        - distinguished
        - rejected
        - not_reached
      notes: string

  # Governed legal judgments.
  - matter_turns_on_statute: Matter -> Statute  # Governed judgment that a matter's legal scope depends on a statute, rule, or doctrine.
    properties:
      scope_basis: string
      rationale: string
    proposal_policy:
      signals:
        matter_statute_match:
          role: required
          always_review_on_unsure: true
        attorney_review:
          role: advisory
          always_review_on_unsure: true
      auto_resolve_when: all_support

  - opinion_has_holding: Opinion -> Holding  # Governed judgment that an opinion contains a specific holding.
    properties:
      locator: string
      rationale: string
    proposal_policy:
      signals:
        holding_extractor:
          role: required
          always_review_on_unsure: true
        attorney_review:
          role: advisory
          always_review_on_unsure: true
      auto_resolve_when: all_support

  - holding_interprets_statute: Holding -> Statute  # Governed judgment that a holding interprets a statute, rule, or regulation.
    properties:
      interpretation_type:
        type: string
        enum:
        - broadens
        - narrows
        - clarifies
        - creates_exception
        - applies
        - distinguishes
      rationale: string
    proposal_policy:
      signals:
        statute_interpretation_extractor:
          role: required
          always_review_on_unsure: true
        attorney_review:
          role: advisory
          always_review_on_unsure: true
      auto_resolve_when: all_support

  - holding_addresses_issue: Holding -> LegalIssue  # Governed judgment that a holding materially addresses a tracked legal issue.
    properties:
      issue_fit:
        type: string
        optional: true
        enum:
        - direct
        - analogous
        - adjacent
        - weak
      rationale: string
    proposal_policy:
      signals:
        issue_mapper:
          role: required
          always_review_on_unsure: true
        attorney_review:
          role: advisory
          always_review_on_unsure: true
      auto_resolve_when: all_support

  - opinion_treats_opinion: Opinion -> Opinion  # Governed judgment that an opinion treats a cited opinion in a legally meaningful way.
    properties:
      treatment:
        type: string
        enum:
        - follows
        - distinguishes
        - criticizes
        - limits
        - overrules
        - abrogates
      rationale: string
    proposal_policy:
      signals:
        citation_treatment_classifier:
          role: required
          always_review_on_unsure: true
        attorney_review:
          role: advisory
          always_review_on_unsure: true
      auto_resolve_when: all_support

  - holding_supports_argument: Holding -> Argument  # Governed judgment that a holding supports a firm argument.
    properties:
      support_strength:
        type: string
        optional: true
        enum:
        - strong
        - moderate
        - weak
        - analogous
      rationale: string
    proposal_policy:
      signals:
        argument_impact_assessor:
          role: required
          always_review_on_unsure: true
        attorney_review:
          role: advisory
          always_review_on_unsure: true
      auto_resolve_when: all_support

  - holding_undermines_argument: Holding -> Argument  # Governed judgment that a holding undermines, narrows, or creates risk for a firm argument.
    properties:
      risk_type:
        type: string
        optional: true
        enum:
        - adverse_authority
        - distinction_required
        - waiver_risk
        - strategy_shift
      rationale: string
    proposal_policy:
      signals:
        argument_impact_assessor:
          role: required
          always_review_on_unsure: true
        attorney_review:
          role: advisory
          always_review_on_unsure: true
      auto_resolve_when: all_support

  - opinion_affects_matter: Opinion -> Matter  # Governed judgment that a new opinion affects a firm matter.
    properties:
      impact_level:
        type: string
        enum:
        - critical
        - high
        - medium
        - low
        - none
      impact_type:
        type: string
        optional: true
        enum:
        - argument_update
        - adverse_authority
        - filing_deadline
        - settlement_posture
        - monitoring_only
      rationale: string
    proposal_policy:
      signals:
        matter_impact_assessor:
          role: required
          always_review_on_unsure: true
        jurisdiction_overlap:
          role: advisory
          always_review_on_unsure: true
        attorney_review:
          role: advisory
          always_review_on_unsure: true
      auto_resolve_when: all_support

  - opinion_creates_review_item: Opinion -> ReviewItem  # Governed judgment that an opinion creates a concrete review obligation.
    properties:
      obligation_type:
        type: string
        optional: true
        enum:
        - brief_update
        - client_alert
        - strategy_review
        - citation_check
        - deadline_check
      rationale: string
    proposal_policy:
      signals:
        review_item_router:
          role: required
          always_review_on_unsure: true
        attorney_review:
          role: advisory
          always_review_on_unsure: true
      auto_resolve_when: all_support

  - review_item_for_matter: ReviewItem -> Matter  # Governed judgment linking a review item to the matter that needs attention.
    properties:
      assignment_basis: string
      rationale: string
    proposal_policy:
      signals:
        review_item_router:
          role: required
          always_review_on_unsure: true
        attorney_review:
          role: advisory
          always_review_on_unsure: true
      auto_resolve_when: all_support

  - filing_requires_response: Filing -> Matter  # Governed judgment that a filing creates a response obligation or deadline for a tracked matter.
    properties:
      response_type:
        type: string
        optional: true
        enum:
        - answer
        - opposition
        - reply
        - motion_to_dismiss
        - no_action
        - client_update
      deadline_date: date
      rationale: string
    proposal_policy:
      signals:
        filing_obligation_assessor:
          role: required
          always_review_on_unsure: true
        docket_matter_match:
          role: required
          always_review_on_unsure: true
        attorney_review:
          role: advisory
          always_review_on_unsure: true
      auto_resolve_when: all_support

# ─── Decision policies ───────────────────────────────────────────────

decision_policies:
  - name: matter_scope_requires_review
    description: Matter statutory-scope judgments should be reviewed before downstream impact workflows rely on them.
    rationale: Incorrect matter-scope links can make later opinion-impact assessments miss relevant authority or overstate irrelevant authority.
    applies_to: workflow
    workflow_name: propose_matter_statutory_scope
    relationship_type: matter_turns_on_statute
    effect: require_review

  - name: matter_impacts_require_review
    description: Matter impact judgments should be reviewed before being treated as trusted work-product state.
    rationale: A false matter-impact edge can create unnecessary client work or miss a required legal update.
    applies_to: workflow
    workflow_name: propose_matter_impact
    relationship_type: opinion_affects_matter
    effect: require_review

  - name: negative_treatment_requires_review
    description: Treatment of cited authority requires attorney review before it affects matter strategy.
    rationale: Negative treatment is high leverage and can change active filings or client advice.
    applies_to: workflow
    workflow_name: propose_opinion_treatment
    relationship_type: opinion_treats_opinion
    effect: require_review

  - name: filing_obligations_require_review
    description: Filing response obligations require review before being treated as trusted deadline state.
    rationale: Incorrect filing obligations can create missed deadlines or unnecessary work.
    applies_to: workflow
    workflow_name: propose_filing_response
    relationship_type: filing_requires_response
    effect: require_review

# ─── Named queries ───────────────────────────────────────────────────

named_queries:
  matters_impacted_by_opinion:
    mode: traversal
    description: Starting from an opinion, find matters judged affected by that opinion.
    entry_point: Opinion
    returns: Matter
    traversal:
      - relationship: opinion_affects_matter
        direction: outgoing

  client_impact_watch:
    mode: traversal
    description: Starting from a client, find opinions judged to affect that client's matters.
    entry_point: Client
    returns: Opinion
    traversal:
      - relationship: matter_for_client
        direction: incoming
      - relationship: opinion_affects_matter
        direction: incoming

  matter_statutory_scope:
    mode: traversal
    description: Starting from a matter, find statutes and doctrines accepted as within the matter's legal scope.
    entry_point: Matter
    returns: Statute
    traversal:
      - relationship: matter_turns_on_statute
        direction: outgoing

  adverse_authority_for_matter:
    mode: traversal
    description: Starting from a matter, find opinions whose holdings undermine arguments in that matter.
    entry_point: Matter
    returns: Opinion
    traversal:
      - relationship: argument_in_matter
        direction: incoming
      - relationship: holding_undermines_argument
        direction: incoming
      - relationship: opinion_has_holding
        direction: incoming

  supporting_authority_for_matter:
    mode: traversal
    description: Starting from a matter, find opinions whose holdings support arguments in that matter.
    entry_point: Matter
    returns: Opinion
    traversal:
      - relationship: argument_in_matter
        direction: incoming
      - relationship: holding_supports_argument
        direction: incoming
      - relationship: opinion_has_holding
        direction: incoming

  negative_treatment_for_cited_authorities:
    mode: traversal
    description: Starting from a matter, find new opinions that negatively treat authorities cited by matter arguments.
    entry_point: Matter
    returns: Opinion
    traversal:
      - relationship: argument_in_matter
        direction: incoming
      - relationship: argument_cites_opinion
        direction: outgoing
      - relationship: opinion_treats_opinion
        direction: incoming

  precedent_chain_for_issue:
    mode: traversal
    description: Starting from a legal issue, find opinions with reviewed holdings that address the issue.
    entry_point: LegalIssue
    returns: Opinion
    traversal:
      - relationship: holding_addresses_issue
        direction: incoming
      - relationship: opinion_has_holding
        direction: incoming

  statutory_interpretations_for_issue:
    mode: traversal
    description: Starting from a legal issue, find statutes interpreted by holdings addressing that issue.
    entry_point: LegalIssue
    returns: Statute
    traversal:
      - relationship: holding_addresses_issue
        direction: incoming
      - relationship: holding_interprets_statute
        direction: outgoing

  review_items_for_matter:
    mode: traversal
    description: Starting from a matter, find open or historical review items created by monitored opinions.
    entry_point: Matter
    returns: ReviewItem
    traversal:
      - relationship: review_item_for_matter
        direction: incoming

  filing_response_obligations_for_matter:
    mode: traversal
    description: Starting from a matter, find filings judged to require a response or deadline.
    entry_point: Matter
    returns: Filing
    traversal:
      - relationship: filing_requires_response
        direction: incoming

  deadline_watch:
    mode: traversal
    description: Starting from an attorney, find deadlines across assigned matters.
    entry_point: Attorney
    returns: Deadline
    traversal:
      - relationship: matter_assigned_to_attorney
        direction: incoming
      - relationship: matter_has_deadline
        direction: outgoing

  argument_track_record:
    mode: traversal
    description: Starting from an argument, find case outcomes where that argument was resolved or evaluated.
    entry_point: Argument
    returns: CaseOutcome
    traversal:
      - relationship: outcome_resolved_argument
        direction: incoming

  case_outcomes_for_matter:
    mode: traversal
    description: Starting from a matter, find case outcomes recorded for that matter.
    entry_point: Matter
    returns: CaseOutcome
    traversal:
      - relationship: outcome_of_matter
        direction: incoming

  opinion_review_items:
    mode: traversal
    description: Starting from an opinion, find review items created by that opinion.
    entry_point: Opinion
    returns: ReviewItem
    traversal:
      - relationship: opinion_creates_review_item
        direction: outgoing

  authorities_in_matter_jurisdiction:
    mode: traversal
    description: Starting from a matter, find opinions issued by courts in the matter's jurisdiction.
    entry_point: Matter
    returns: Opinion
    traversal:
      - relationship: matter_in_jurisdiction
        direction: outgoing
      - relationship: opinion_from_court
        direction: incoming

  opinions_by_judge:
    mode: traversal
    description: Starting from a judge, find opinions that judge authored or joined.
    entry_point: Judge
    returns: Opinion
    traversal:
      - relationship: opinion_decided_by_judge
        direction: incoming

  supporting_authority_now_bad_law:
    mode: traversal
    description: >
      Starting from a matter, reach its supporting holdings and their opinions,
      then surface opinions that negatively treat those supporting authorities
      (overrules, abrogates, or limits) so a once-good authority that just went
      bad is flagged.
    entry_point: Matter
    returns: Opinion
    traversal:
      - relationship: argument_in_matter
        direction: incoming
      - relationship: holding_supports_argument
        direction: incoming
      - relationship: opinion_has_holding
        direction: incoming
      - relationship: opinion_treats_opinion
        direction: incoming

  statute_interpretations_for_matter:
    mode: traversal
    description: >
      Starting from a matter, follow its statutory scope to statutes, then find
      the holdings that interpret those statutes and the opinions that contain
      them.
    entry_point: Matter
    returns: Opinion
    traversal:
      - relationship: matter_turns_on_statute
        direction: outgoing
      - relationship: holding_interprets_statute
        direction: incoming
      - relationship: opinion_has_holding
        direction: incoming

# ─── Quality checks ──────────────────────────────────────────────────

quality_checks:
  - opinions_have_court:
      cardinality:
        entity: Opinion
        relationship: opinion_from_court
        direction: out
        min: 1
      description: "Every opinion should be linked to an issuing court."
      severity: warning
  - matters_have_responsible_attorney:
      cardinality:
        entity: Matter
        relationship: matter_assigned_to_attorney
        direction: out
        min: 1
      description: "Every active matter should have at least one responsible attorney."
      severity: warning
  - matters_have_one_client:
      cardinality:
        entity: Matter
        relationship: matter_for_client
        direction: out
        min: 1
        max: 1
      description: "Every matter should be linked to exactly one firm client."
      severity: warning
  - deadlines_have_matter:
      cardinality:
        entity: Deadline
        relationship: matter_has_deadline
        direction: in
        min: 1
      description: "Every deadline should be attached to at least one matter."
      severity: warning
  - case_outcomes_have_matter:
      cardinality:
        entity: CaseOutcome
        relationship: outcome_of_matter
        direction: out
        min: 1
        max: 1
      description: "Every case outcome should resolve exactly one matter."
      severity: error
  - opinion_treatments_have_treatment:
      property: opinion_treats_opinion.treatment
      rule: required
      description: "Every opinion treatment edge should specify the treatment type."
      severity: error
  - matter_impacts_have_level:
      property: opinion_affects_matter.impact_level
      rule: required
      description: "Every matter impact edge should have an impact level."
      severity: error
  - filing_responses_have_response_type:
      property: filing_requires_response.response_type
      rule: required
      description: "Every filing response edge should specify the response obligation type."
      severity: error

