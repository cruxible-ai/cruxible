    deterministic: false

  link_holdings_to_statutes:
    description: Link holdings to interpreted statutes, rules, or regulations.
    contract_in: StatuteInterpretationInput
    contract_out: StatuteInterpretationOutput
    ref: kit://providers/case_law_monitoring.py::link_holdings_to_statutes
    version: "0.1.0"
    deterministic: false

  map_holdings_to_issues:
    description: Map holdings to firm-tracked legal issues.
    contract_in: IssueMappingInput
    contract_out: IssueMappingOutput
    ref: kit://providers/case_law_monitoring.py::map_holdings_to_issues
