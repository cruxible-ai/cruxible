    deterministic: false

  assess_filing_response_obligations:
    description: Assess whether filings require responses, deadlines, or client updates.
    contract_in: FilingResponseInput
    contract_out: FilingResponseOutput
    ref: kit://providers/case_law_monitoring.py::assess_filing_response_obligations
    version: "0.1.0"
    deterministic: false

  route_review_items:
    description: Create candidate review obligations from impact and treatment signals.
    contract_in: ReviewItemInput
    contract_out: ReviewItemOutput
