        input:
          filings: $steps.filings.results
          matters: $steps.matters.results
          deadlines: $steps.deadlines.results
          filing_in_matter_edges: $steps.filing_in_matter_edges.results
          matter_deadline_edges: $steps.matter_deadline_edges.results
        as: judgments
      - id: candidates
        make_candidates:
          relationship_type: filing_requires_response
          items: $steps.judgments.items
          from_type: Filing
          from_id: $item.filing_id
          to_type: Matter
          to_id: $item.matter_id
          properties: auto
        as: candidates
      - id: obligation_signals
        map_signals:
          signal_source: filing_obligation_assessor
