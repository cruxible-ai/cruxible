  MatterImpactInput:
    fields:
      opinions:
        type: json
      matters:
        type: json
      support_edges:
        type: json
      undermine_edges:
        type: json
      treatment_edges:
        type: json
      matter_statute_edges:
        type: json
      opinion_court_edges:
        type: json
      matter_jurisdiction_edges:
        type: json

  MatterImpactOutput:
    fields:
      items:
        type: json

  FilingResponseInput:
    fields:
      filings:
        type: json
      matters:
        type: json
      deadlines:
        type: json

  FilingResponseOutput:
    fields:
      items:
        type: json

  ReviewItemInput:
    fields:
      opinions:
        type: json
      matters:
        type: json
      matter_impact_edges:
        type: json
      treatment_edges:
        type: json
      created_review_items:
        type: json

  ReviewItemOutput:
    fields:
      items:
        type: json

providers:
  extract_holdings_from_opinions:
    description: Extract candidate holdings from monitored legal opinions.
    contract_in: OpinionAnalysisInput
    contract_out: OpinionAnalysisOutput
    ref: kit://providers/case_law_monitoring.py::extract_holdings_from_opinions
