    ref: kit://providers/case_law_monitoring.py::assess_argument_impact
    version: "0.1.0"
    deterministic: false

  scope_matters_to_statutes:
    description: Extract or normalize statutory and doctrinal scope for tracked matters.
    contract_in: MatterScopeInput
    contract_out: MatterScopeOutput
    ref: kit://providers/case_law_monitoring.py::scope_matters_to_statutes
    version: "0.1.0"
    deterministic: false

  assess_matter_impact:
    description: Assess whether opinions affect firm matters.
    contract_in: MatterImpactInput
