    version: "0.1.0"
    deterministic: true

workflows:
  build_corpus:
    type: canonical
    description: >
      Load the base-world legal corpus: opinions, courts, judges, statutes,
      legal issues, clients, matters, attorneys, and arguments, plus the
      deterministic canonical edges that anchor them (issuing court, deciding
      judge, citation graph, matter client/attorney/jurisdiction, and argument
      context). This is the canonical creation path for the anchors the governed
      proposal workflows later read.
    contract_in: EmptyInput
    steps:
      - id: seed
        provider: load_corpus_seed
        input: {}
        as: seed
      # --- Entities ---
      - id: opinions
        make_entities:
          entity_type: Opinion
          items: $steps.seed.opinions
          entity_id: $item.opinion_id
          properties:
            opinion_id: $item.opinion_id
            case_name: $item.case_name
            citation: $item.citation
            docket_number: $item.docket_number
            date_filed: $item.date_filed
            jurisdiction: $item.jurisdiction
            precedential_status: $item.precedential_status
            source_url: $item.source_url
        as: opinions
      - id: courts
        make_entities:
          entity_type: Court
          items: $steps.seed.courts
          entity_id: $item.court_id
          properties:
            court_id: $item.court_id
            name: $item.name
            jurisdiction: $item.jurisdiction
            level: $item.level
        as: courts
      - id: judges
        make_entities:
          entity_type: Judge
          items: $steps.seed.judges
          entity_id: $item.judge_id
          properties:
            judge_id: $item.judge_id
            name: $item.name
            court_hint: $item.court_hint
        as: judges
      - id: statutes
        make_entities:
          entity_type: Statute
          items: $steps.seed.statutes
          entity_id: $item.statute_id
          properties:
            statute_id: $item.statute_id
            title: $item.title
            section: $item.section
            jurisdiction: $item.jurisdiction
            topic: $item.topic
        as: statutes
      - id: legal_issues
        make_entities:
          entity_type: LegalIssue
          items: $steps.seed.legal_issues
          entity_id: $item.issue_id
          properties:
            issue_id: $item.issue_id
            name: $item.name
            practice_area: $item.practice_area
            description: $item.description
        as: legal_issues
      - id: clients
        make_entities:
          entity_type: Client
          items: $steps.seed.clients
          entity_id: $item.client_id
          properties:
            client_id: $item.client_id
            name: $item.name
            industry: $item.industry
        as: clients
      - id: matters
        make_entities:
          entity_type: Matter
          items: $steps.seed.matters
          entity_id: $item.matter_id
          properties:
            matter_id: $item.matter_id
            name: $item.name
            client_name: $item.client_name
            matter_type: $item.matter_type
            status: $item.status
            jurisdiction: $item.jurisdiction
        as: matters
      - id: attorneys
        make_entities:
          entity_type: Attorney
          items: $steps.seed.attorneys
          entity_id: $item.attorney_id
          properties:
            attorney_id: $item.attorney_id
            name: $item.name
            team: $item.team
            email: $item.email
        as: attorneys
      - id: arguments
        make_entities:
          entity_type: Argument
          items: $steps.seed.arguments
          entity_id: $item.argument_id
          properties:
            argument_id: $item.argument_id
            title: $item.title
            description: $item.description
            argument_type: $item.argument_type
            position: $item.position
            status: $item.status
        as: arguments
      # --- Relationships ---
      - id: opinion_court_edges
        make_relationships:
          relationship_type: opinion_from_court
          items: $steps.seed.opinion_from_court_edges
          from_type: Opinion
          from_id: $item.opinion_id
          to_type: Court
          to_id: $item.court_id
        as: opinion_court_edges
      - id: opinion_judge_edges
        make_relationships:
          relationship_type: opinion_decided_by_judge
          items: $steps.seed.opinion_decided_by_judge_edges
          from_type: Opinion
          from_id: $item.opinion_id
          to_type: Judge
          to_id: $item.judge_id
          properties:
            role: $item.role
        as: opinion_judge_edges
      - id: opinion_citation_edges
        make_relationships:
          relationship_type: opinion_cites_opinion
          items: $steps.seed.opinion_cites_opinion_edges
          from_type: Opinion
          from_id: $item.source_opinion_id
          to_type: Opinion
          to_id: $item.cited_opinion_id
          properties:
            citation_context: $item.citation_context
        as: opinion_citation_edges
      - id: matter_client_edges
        make_relationships:
          relationship_type: matter_for_client
          items: $steps.seed.matter_for_client_edges
          from_type: Matter
          from_id: $item.matter_id
          to_type: Client
          to_id: $item.client_id
        as: matter_client_edges
      - id: matter_attorney_edges
        make_relationships:
          relationship_type: matter_assigned_to_attorney
          items: $steps.seed.matter_assigned_to_attorney_edges
          from_type: Matter
          from_id: $item.matter_id
          to_type: Attorney
          to_id: $item.attorney_id
          properties:
            role: $item.role
        as: matter_attorney_edges
      - id: matter_jurisdiction_edges
        make_relationships:
          relationship_type: matter_in_jurisdiction
          items: $steps.seed.matter_in_jurisdiction_edges
          from_type: Matter
          from_id: $item.matter_id
          to_type: Court
          to_id: $item.court_id
        as: matter_jurisdiction_edges
      - id: argument_matter_edges
        make_relationships:
          relationship_type: argument_in_matter
          items: $steps.seed.argument_in_matter_edges
          from_type: Argument
          from_id: $item.argument_id
          to_type: Matter
          to_id: $item.matter_id
        as: argument_matter_edges
      - id: argument_issue_edges
        make_relationships:
          relationship_type: argument_raises_issue
          items: $steps.seed.argument_raises_issue_edges
          from_type: Argument
          from_id: $item.argument_id
          to_type: LegalIssue
          to_id: $item.issue_id
        as: argument_issue_edges
      - id: argument_opinion_edges
        make_relationships:
          relationship_type: argument_cites_opinion
          items: $steps.seed.argument_cites_opinion_edges
          from_type: Argument
          from_id: $item.argument_id
          to_type: Opinion
          to_id: $item.opinion_id
          properties:
            citation_role: $item.citation_role
        as: argument_opinion_edges
      - id: statute_issue_edges
        make_relationships:
          relationship_type: statute_governs_issue
          items: $steps.seed.statute_governs_issue_edges
          from_type: Statute
          from_id: $item.statute_id
          to_type: LegalIssue
          to_id: $item.issue_id
        as: statute_issue_edges
      # --- Apply ---
      - id: apply_opinions
        apply_entities:
          entities_from: opinions
        as: apply_opinions
      - id: apply_courts
        apply_entities:
          entities_from: courts
        as: apply_courts
      - id: apply_judges
        apply_entities:
          entities_from: judges
        as: apply_judges
      - id: apply_statutes
        apply_entities:
          entities_from: statutes
        as: apply_statutes
      - id: apply_legal_issues
        apply_entities:
          entities_from: legal_issues
        as: apply_legal_issues
      - id: apply_clients
        apply_entities:
          entities_from: clients
        as: apply_clients
      - id: apply_matters
        apply_entities:
          entities_from: matters
        as: apply_matters
      - id: apply_attorneys
        apply_entities:
          entities_from: attorneys
        as: apply_attorneys
      - id: apply_arguments
        apply_entities:
          entities_from: arguments
        as: apply_arguments
      - id: apply_opinion_court
        apply_relationships:
          relationships_from: opinion_court_edges
        as: apply_opinion_court
      - id: apply_opinion_judge
        apply_relationships:
          relationships_from: opinion_judge_edges
        as: apply_opinion_judge
      - id: apply_opinion_citations
        apply_relationships:
          relationships_from: opinion_citation_edges
        as: apply_opinion_citations
      - id: apply_matter_client
        apply_relationships:
          relationships_from: matter_client_edges
        as: apply_matter_client
      - id: apply_matter_attorney
        apply_relationships:
          relationships_from: matter_attorney_edges
        as: apply_matter_attorney
      - id: apply_matter_jurisdiction
        apply_relationships:
          relationships_from: matter_jurisdiction_edges
        as: apply_matter_jurisdiction
      - id: apply_argument_matter
        apply_relationships:
          relationships_from: argument_matter_edges
        as: apply_argument_matter
      - id: apply_argument_issue
        apply_relationships:
          relationships_from: argument_issue_edges
        as: apply_argument_issue
      - id: apply_argument_opinion
        apply_relationships:
          relationships_from: argument_opinion_edges
        as: apply_argument_opinion
      - id: apply_statute_issue
        apply_relationships:
          relationships_from: statute_issue_edges
        as: apply_statute_issue
    returns: apply_statute_issue

  ingest_docket:
    type: canonical
    description: >
      Load filings and deadlines arriving from a docket feed and attach them to
      their matters. Deadlines arrive here over time rather than in the base
      corpus; this is their canonical creation path before filing-response and
      review workflows run.
    contract_in: EmptyInput
    steps:
      - id: feed
        provider: load_docket_feed
        input: {}
        as: feed
      - id: filings
        make_entities:
          entity_type: Filing
          items: $steps.feed.filings
          entity_id: $item.filing_id
          properties:
            filing_id: $item.filing_id
            docket_number: $item.docket_number
            title: $item.title
            filing_type: $item.filing_type
            filed_at: $item.filed_at
        as: filings
      - id: deadlines
        make_entities:
          entity_type: Deadline
          items: $steps.feed.deadlines
          entity_id: $item.deadline_id
          properties:
            deadline_id: $item.deadline_id
            title: $item.title
            due_date: $item.due_date
            deadline_type: $item.deadline_type
            status: $item.status
        as: deadlines
      - id: filing_matter_edges
        make_relationships:
          relationship_type: filing_in_matter
          items: $steps.feed.filing_in_matter_edges
          from_type: Filing
          from_id: $item.filing_id
          to_type: Matter
          to_id: $item.matter_id
        as: filing_matter_edges
      - id: matter_deadline_edges
        make_relationships:
          relationship_type: matter_has_deadline
          items: $steps.feed.matter_has_deadline_edges
          from_type: Matter
          from_id: $item.matter_id
          to_type: Deadline
          to_id: $item.deadline_id
        as: matter_deadline_edges
      - id: apply_filings
        apply_entities:
          entities_from: filings
        as: apply_filings
      - id: apply_deadlines
        apply_entities:
          entities_from: deadlines
        as: apply_deadlines
      - id: apply_filing_matter
        apply_relationships:
          relationships_from: filing_matter_edges
        as: apply_filing_matter
      - id: apply_matter_deadline
        apply_relationships:
          relationships_from: matter_deadline_edges
        as: apply_matter_deadline
    returns: apply_matter_deadline

  ingest_case_outcomes:
    type: canonical
    description: >
      Load resolved case outcomes and attach them to the matters they resolve
      and the arguments they evaluated. Case outcomes are the firm-state result
      record (distinct from Cruxible Loop 2 outcomes) and have no other creation
      path; the argument track-record query reads them.
    contract_in: EmptyInput
    steps:
      - id: feed
        provider: load_case_outcome_feed
        input: {}
        as: feed
      - id: case_outcomes
        make_entities:
          entity_type: CaseOutcome
          items: $steps.feed.case_outcomes
          entity_id: $item.outcome_id
          properties:
            outcome_id: $item.outcome_id
            result: $item.result
            resolved_at: $item.resolved_at
            notes: $item.notes
        as: case_outcomes
      - id: outcome_matter_edges
        make_relationships:
          relationship_type: outcome_of_matter
          items: $steps.feed.outcome_of_matter_edges
          from_type: CaseOutcome
          from_id: $item.outcome_id
          to_type: Matter
          to_id: $item.matter_id
        as: outcome_matter_edges
      - id: outcome_argument_edges
        make_relationships:
          relationship_type: outcome_resolved_argument
          items: $steps.feed.outcome_resolved_argument_edges
          from_type: CaseOutcome
          from_id: $item.outcome_id
          to_type: Argument
          to_id: $item.argument_id
          properties:
            role: $item.role
            prevailed: $item.prevailed
            weight: $item.weight
            notes: $item.notes
        as: outcome_argument_edges
      - id: apply_case_outcomes
        apply_entities:
          entities_from: case_outcomes
        as: apply_case_outcomes
      - id: apply_outcome_matter
        apply_relationships:
          relationships_from: outcome_matter_edges
        as: apply_outcome_matter
      - id: apply_outcome_argument
        apply_relationships:
          relationships_from: outcome_argument_edges
        as: apply_outcome_argument
    returns: apply_outcome_argument

  refresh_stale_review_state:
    type: canonical
    description: >
      Re-evaluate open review items and pending deadlines against current matter
      state and close those that have gone stale (their matter closed or the
      obligation lapsed). Makes the stale_review_item / stale_deadline outcome
      codes and the ReviewItem/Deadline lifecycle status enums actionable.
    contract_in: EmptyInput
    steps:
      - id: review_items
        query:
          mode: collection
          result_shape: entity
          returns: ReviewItem
        as: review_items
      - id: deadlines
        query:
          mode: collection
          result_shape: entity
          returns: Deadline
        as: deadlines
      - id: matters
        query:
          mode: collection
          result_shape: entity
          returns: Matter
        as: matters
      - id: review_item_matter_edges
        query:
          mode: collection
          result_shape: relationship
          returns: review_item_for_matter
        as: review_item_matter_edges
      - id: matter_deadline_edges
        query:
          mode: collection
          result_shape: relationship
          returns: matter_has_deadline
        as: matter_deadline_edges
      - id: sweep
        provider: sweep_stale_review_state
        input:
          review_items: $steps.review_items.results
          deadlines: $steps.deadlines.results
          matters: $steps.matters.results
          review_item_matter_edges: $steps.review_item_matter_edges.results
          matter_deadline_edges: $steps.matter_deadline_edges.results
        as: sweep
      - id: closed_review_items
        make_entities:
          entity_type: ReviewItem
          items: $steps.sweep.review_items
          entity_id: $item.review_item_id
          properties:
            review_item_id: $item.review_item_id
            status: $item.status
        as: closed_review_items
      - id: closed_deadlines
        make_entities:
          entity_type: Deadline
          items: $steps.sweep.deadlines
          entity_id: $item.deadline_id
          properties:
            deadline_id: $item.deadline_id
            status: $item.status
        as: closed_deadlines
      - id: apply_closed_review_items
        apply_entities:
          entities_from: closed_review_items
        as: apply_closed_review_items
      - id: apply_closed_deadlines
        apply_entities:
          entities_from: closed_deadlines
        as: apply_closed_deadlines
    returns: apply_closed_deadlines

  propose_holdings_from_opinion:
    type: proposal
    description: Extract candidate holdings from monitored opinions.
    contract_in: EmptyInput
    steps:
      - id: opinions
        query:
          mode: collection
          result_shape: entity
          returns: Opinion
        as: opinions
      - id: holdings
        provider: extract_holdings_from_opinions
        input:
          opinions: $steps.opinions.results
        as: holdings
      - id: candidates
        make_candidates:
          relationship_type: opinion_has_holding
          items: $steps.holdings.results
          from_type: Opinion
          from_id: $item.opinion_id
          to_type: Holding
          to_id: $item.holding_id
          properties:
            locator: $item.locator
            rationale: $item.rationale
        as: candidates
      - id: signals
        map_signals:
          signal_source: holding_extractor
          items: $steps.holdings.results
          from_id: $item.opinion_id
          to_id: $item.holding_id
          evidence: $item.rationale
          enum:
            path: verdict
            map:
              support: support
              unsure: unsure
              contradict: contradict
        as: signals
      - id: proposal
        propose_relationship_group:
          relationship_type: opinion_has_holding
          candidates_from: candidates
          signals_from: [signals]
          thesis_text: These monitored opinions contain the proposed holdings.
          proposed_by: agent
        as: proposal
    returns: proposal

  propose_statute_interpretations:
    type: proposal
    description: Propose statute and rule interpretation links for reviewed holdings.
    contract_in: EmptyInput
    steps:
      - id: opinions
        query:
          mode: collection
          result_shape: entity
          returns: Opinion
        as: opinions
      - id: holdings
        query:
          mode: collection
          result_shape: entity
          returns: Holding
        as: holdings
      - id: statutes
        query:
          mode: collection
          result_shape: entity
          returns: Statute
        as: statutes
      - id: opinion_holding_edges
        query:
          mode: collection
          result_shape: relationship
          returns: opinion_has_holding
        as: opinion_holding_edges
      - id: interpretations
        provider: link_holdings_to_statutes
        input:
          opinions: $steps.opinions.results
          holdings: $steps.holdings.results
          statutes: $steps.statutes.results
          opinion_holding_edges: $steps.opinion_holding_edges.results
        as: interpretations
      - id: candidates
        make_candidates:
          relationship_type: holding_interprets_statute
          items: $steps.interpretations.items
          from_type: Holding
          from_id: $item.holding_id
          to_type: Statute
          to_id: $item.statute_id
          properties:
            interpretation_type: $item.interpretation_type
            rationale: $item.rationale
        as: candidates
      - id: signals
        map_signals:
          signal_source: statute_interpretation_extractor
          items: $steps.interpretations.items
          from_id: $item.holding_id
          to_id: $item.statute_id
          evidence: $item.rationale
          enum:
            path: verdict
            map:
              support: support
              unsure: unsure
              contradict: contradict
        as: signals
      - id: proposal
        propose_relationship_group:
          relationship_type: holding_interprets_statute
          candidates_from: candidates
          signals_from: [signals]
          thesis_text: These holdings interpret the proposed statutes or rules.
          proposed_by: agent
        as: proposal
    returns: proposal

  propose_holding_issue_links:
    type: proposal
    description: Map reviewed holdings to firm-tracked legal issues.
    contract_in: EmptyInput
    steps:
      - id: holdings
        query:
          mode: collection
          result_shape: entity
          returns: Holding
        as: holdings
      - id: issues
        query:
          mode: collection
          result_shape: entity
          returns: LegalIssue
        as: issues
      - id: statute_edges
        query:
          mode: collection
          result_shape: relationship
          returns: holding_interprets_statute
        as: statute_edges
      - id: issue_links
        provider: map_holdings_to_issues
        input:
          holdings: $steps.holdings.results
          issues: $steps.issues.results
          statute_edges: $steps.statute_edges.results
        as: issue_links
      - id: candidates
        make_candidates:
          relationship_type: holding_addresses_issue
