  propose_filing_response:
    type: proposal
    description: Classify filing response obligations and deadlines for tracked matters.
    contract_in: EmptyInput
    steps:
      - id: filings
        query: {mode: collection, result_shape: entity, returns: Filing}
        as: filings
      - id: matters
        query: {mode: collection, result_shape: entity, returns: Matter}
        as: matters
      - id: deadlines
        query: {mode: collection, result_shape: entity, returns: Deadline}
