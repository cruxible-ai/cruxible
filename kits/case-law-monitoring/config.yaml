version: "1.0"
name: case_law_monitoring
description: >
  Case-law monitoring domain overlay composed over the agent-operation base.
  The corpus layer is real public law: opinions, courts, judges, statutes, and
  the citation graph (CourtListener-sourced, digest-pinned seed; live refresh
  via a utility fetch). The firm layer is the practice: clients, matters,
  arguments, filings, deadlines, case outcomes. Governed edges carry the legal
  judgments an attorney reviews: holdings, statutory interpretations, citation
  treatment, argument support/risk, matter impact, filing obligations.

  Composition notes (this kit does NOT duplicate the operating layer):
  - Attorneys are base Actors; matter accountability is matter_owned_by_actor.
    Actors materialize only from credential mints, so the corpus seed loads
    matters unowned and onboarding assigns owners after minting — the
    matters_have_owner check nags until then, by design.
  - Review obligations are base WorkItems created by the agent and attached
    through governed seam edges (opinion_creates_work_item,
    work_item_targets_matter). A brief-update WorkItem closes through the
    base review gate — attorney signoff IS the ReviewRequest approval.
  - Holdings are judgment-born: a canonical apply step creates them as inert
    records from the extractor payload; only the governed opinion_has_holding
    edge makes them legally meaningful.
  - LLM-outside: extraction/classification providers propose with tri-state
    signals; nothing enters accepted state without resolution.

presets:
  policies:
    # Each governed surface keeps its own required signal source so trust
    # accumulates per judgment type; attorney_review is the shared advisory.
    holdings:
      signals:
        holding_extractor: {role: required, always_review_on_unsure: true, require_evidence_on_support: true}
        attorney_review: {role: advisory, always_review_on_unsure: true}
    interpretations:
      signals:
        statute_interpretation_extractor: {role: required, always_review_on_unsure: true, require_evidence_on_support: true}
        attorney_review: {role: advisory, always_review_on_unsure: true}
    issue_links:
      signals:
        issue_mapper: {role: required, always_review_on_unsure: true, require_evidence_on_support: true}
        attorney_review: {role: advisory, always_review_on_unsure: true}
    treatments:
      signals:
        citation_treatment_classifier: {role: required, always_review_on_unsure: true, require_evidence_on_support: true}
        attorney_review: {role: advisory, always_review_on_unsure: true}
    argument_impacts:
      signals:
        argument_impact_assessor: {role: required, always_review_on_unsure: true, require_evidence_on_support: true}
        attorney_review: {role: advisory, always_review_on_unsure: true}
    matter_scope:
      signals:
        matter_statute_match: {role: required, always_review_on_unsure: true, require_evidence_on_support: true}
        attorney_review: {role: advisory, always_review_on_unsure: true}
    matter_impacts:
      signals:
        matter_impact_assessor: {role: required, always_review_on_unsure: true, require_evidence_on_support: true}
        jurisdiction_overlap: {role: advisory, always_review_on_unsure: true}
        attorney_review: {role: advisory, always_review_on_unsure: true}
    filing_obligations:
      signals:
        filing_obligation_assessor: {role: required, always_review_on_unsure: true, require_evidence_on_support: true}
        docket_matter_match: {role: required, always_review_on_unsure: true, require_evidence_on_support: true}
        attorney_review: {role: advisory, always_review_on_unsure: true}
    work_routing:
      signals:
        review_router: {role: required, always_review_on_unsure: true, require_evidence_on_support: true}
        attorney_review: {role: advisory, always_review_on_unsure: true}

enums:
  court_level: [trial, appellate, supreme, administrative]
  precedential_status: [published, unpublished, precedential, nonprecedential, order]
  matter_type: [litigation, investigation, advisory, transaction, regulatory]
  matter_status: [active, stayed, closed, monitoring]
  matter_role: [lead, reviewer, responsible_attorney, watcher]
  filing_type: [complaint, motion, brief, order, notice, letter, memo]
  deadline_type: [filing, response, discovery, hearing, statute_of_limitations, client_update]
  deadline_status: [pending, met, missed, extended, waived, closed]
  argument_type: [claim, defense, counterclaim, affirmative_defense, motion, advisory_position]
  argument_position: [plaintiff, defense, petitioner, respondent, advisory, neutral]
  argument_status: [draft, filed, planned, abandoned, preserved]
  holding_type: [rule, exception, application, distinction, procedural]
  statute_interpretation_type: [broadens, narrows, clarifies, creates_exception, applies, distinguishes]
  issue_fit: [direct, analogous, adjacent, weak]
  opinion_treatment: [follows, distinguishes, criticizes, limits, overrules, abrogates]
  support_strength: [strong, moderate, weak, analogous]
  adverse_risk_type: [adverse_authority, distinction_required, waiver_risk, strategy_shift]
  matter_impact_level: [critical, high, medium, low, none]
  matter_impact_type: [argument_update, adverse_authority, filing_deadline, settlement_posture, monitoring_only]
  response_type: [answer, opposition, reply, motion_to_dismiss, no_action, client_update]
  obligation_type: [brief_update, client_alert, strategy_review, citation_check, deadline_check]
  judge_role: [author, panel_member, concurrence, dissent]
  citation_role: [primary, supporting, distinguishing, background]
  outcome_result: [won, lost, settled, dismissed, default_judgment, withdrawn, moot]
  outcome_argument_role: [primary_argument, alternative_argument, defensive, amicus, not_reached]
  outcome_weight: [adopted, distinguished, rejected, not_reached]

entity_types:
  Opinion:
    description: Published opinion, order, or precedential authority in the monitored corpus (CourtListener-sourced).
    id: opinion_id
    properties:
      case_name: string indexed
      citation: string indexed
      docket_number: string?
      date_filed: date
      jurisdiction: string indexed
      precedential_status: enum precedential_status?
      source_url: string?

  Court:
    description: Court or tribunal issuing opinions and hosting matters.
    id: court_id
    properties:
      name: string indexed
      jurisdiction: string indexed
      level: enum court_level?

  Judge:
    description: Judge, panel member, or adjudicator associated with an opinion.
    id: judge_id
    properties:
      name: string indexed
      court_hint: string?

  Statute:
    description: Statute, regulation, rule, or doctrinal source interpreted by opinions and relevant to matters.
    id: statute_id
    properties:
      title: string indexed
      section: string indexed
      jurisdiction: string?
      topic: string?

  LegalIssue:
    description: Practice-specific legal issue or doctrine tracked by the firm.
    id: issue_id
    properties:
      name: string indexed
      practice_area: string?
      description: string?

  Client:
    description: Firm client associated with one or more matters.
    id: client_id
    properties:
      name: string indexed
      industry: string?

  Matter:
    description: Firm matter, pending case, investigation, deal, or representation that legal developments may affect.
    id: matter_id
    properties:
      name: string indexed
      matter_type: enum matter_type?
      status: enum matter_status?
      jurisdiction: string?

  Filing:
    description: Filing, brief, motion, order, or docket entry associated with a matter.
    id: filing_id
    properties:
      title: string indexed
      docket_number: string?
      filing_type: enum filing_type?
      filed_at: date

  Deadline:
    description: Filing deadline, response obligation, hearing date, or other matter deadline.
    id: deadline_id
    properties:
      title: string indexed
      due_date: date
      deadline_type: enum deadline_type?
      status: enum deadline_status?

  Argument:
    description: Legal argument, position, theory, or cited-authority bundle used in a matter.
    id: argument_id
    properties:
      title: string indexed
      description: string?
      argument_type: enum argument_type?
      position: enum argument_position?
      status: enum argument_status?

  Holding:
    description: >
      Atomic holding or rule extracted from an opinion. Judgment-born: created
      inert by the canonical apply step; the governed opinion_has_holding edge
      is what makes it reviewed legal reasoning.
    id: holding_id
    properties:
      summary: string indexed
      holding_type: enum holding_type?
      scope: string?

  CaseOutcome:
    description: Resolved matter result. Distinct from Cruxible Loop 2 outcomes, which judge whether system decisions were correct.
    id: outcome_id
    properties:
      result: enum outcome_result
      resolved_at: date
      notes: string?

relationships:
  # --- Corpus anchors (deterministic, seed/fetch-loaded) ---
  - opinion_from_court: Opinion -> Court            # Opinion was issued by a court.
  - opinion_decided_by_judge: Opinion -> Judge      # Opinion was decided or joined by a judge.
    properties: {role: enum judge_role optional}
  - opinion_cites_opinion: Opinion -> Opinion       # Citation-graph edge; context is optional because citation APIs provide the edge, not prose.
    properties: {citation_context: string optional}

  # --- Firm state (deterministic, seed/docket-loaded) ---
  - filing_in_matter: Filing -> Matter              # Filing belongs to a firm matter.
  - matter_for_client: Matter -> Client             # Matter belongs to a firm client.
  - matter_in_jurisdiction: Matter -> Court         # Matter is pending in or primarily governed by a court.
  - matter_has_deadline: Matter -> Deadline         # Matter has a tracked deadline.
  - argument_in_matter: Argument -> Matter          # Argument belongs to a matter.
  - argument_raises_issue: Argument -> LegalIssue   # Argument raises a tracked legal issue.
  - argument_cites_opinion: Argument -> Opinion     # Argument relies on a cited opinion.
    properties: {citation_role: enum citation_role optional}
  - statute_governs_issue: Statute -> LegalIssue    # Statute or rule is relevant to a tracked issue.
  - outcome_of_matter: CaseOutcome -> Matter        # Outcome resolves or records the result of a matter.
  - outcome_resolved_argument: CaseOutcome -> Argument  # Outcome resolved or evaluated a specific argument.
    properties:
      role: enum outcome_argument_role?
      prevailed: bool?
      weight: enum outcome_weight?
      notes: string?

  # --- Ownership / accountability (base Actor; assigned post-mint, never seeded) ---
  - matter_owned_by_actor: Matter -> Actor          # Actor accountable for the matter (attorney or legal-ops agent).
    properties: {role: enum matter_role optional}

  # --- Operating-layer seams (review obligations are base WorkItems) ---
  - work_item_targets_matter: WorkItem -> Matter    # Work item advances or protects a matter.
  - opinion_creates_work_item: Opinion -> WorkItem  # Governed: an opinion creates a concrete review obligation.
    proposal_policy: work_routing
    basis: routing_basis
    properties: {obligation_type: enum obligation_type optional}

  # --- Governed legal judgments ---
  - matter_turns_on_statute: Matter -> Statute      # Governed: the matter's legal scope depends on this statute or doctrine.
    proposal_policy: matter_scope
    basis: scope_basis
  - opinion_has_holding: Opinion -> Holding         # Governed: the opinion contains this holding.
    proposal_policy: holdings
    basis: rationale
    properties: {locator: string optional}
  - holding_interprets_statute: Holding -> Statute  # Governed: the holding interprets this statute or rule.
    proposal_policy: interpretations
    basis: rationale
    properties: {interpretation_type: enum statute_interpretation_type}
  - holding_addresses_issue: Holding -> LegalIssue  # Governed: the holding materially addresses this tracked issue.
    proposal_policy: issue_links
    basis: rationale
    properties: {issue_fit: enum issue_fit optional}
  - opinion_treats_opinion: Opinion -> Opinion      # Governed: legally meaningful treatment of a cited opinion (the citator edge).
    proposal_policy: treatments
    basis: rationale
    properties: {treatment: enum opinion_treatment}
  - holding_supports_argument: Holding -> Argument  # Governed: the holding supports a firm argument.
    proposal_policy: argument_impacts
    basis: rationale
    properties: {support_strength: enum support_strength optional}
  - holding_undermines_argument: Holding -> Argument  # Governed: the holding undermines or creates risk for a firm argument.
    proposal_policy: argument_impacts
    basis: rationale
    properties: {risk_type: enum adverse_risk_type optional}
  - opinion_affects_matter: Opinion -> Matter       # Governed: a new opinion affects a firm matter.
    proposal_policy: matter_impacts
    basis: rationale
    properties:
      impact_level: enum matter_impact_level
      impact_type: enum matter_impact_type?
  - filing_requires_response: Filing -> Matter      # Governed: a filing creates a response obligation; deadline_date is optional because no_action carries none.
    proposal_policy: filing_obligations
    basis: rationale
    properties:
      response_type: enum response_type?
      deadline_date: date?

named_queries:
  matters_impacted_by_opinion:
    mode: traversal
    entry_point: Opinion
    returns: Matter
    relationship_state: reviewable
    description: Matters judged affected by an opinion, pending judgments visible.
    traverse:
      - relationship: opinion_affects_matter
        as: impacted_matter

  client_impact_watch:
    mode: traversal
    entry_point: Client
    returns: Opinion
    relationship_state: reviewable
    description: Opinions judged to affect a client's matters.
    traverse:
      - relationship: matter_for_client
        as: client_matter
      - relationship: opinion_affects_matter
        as: impacting_opinion

  matter_statutory_scope:
    mode: traversal
    entry_point: Matter
    returns: Statute
    relationship_state: reviewable
    description: Statutes and doctrines within the matter's accepted or proposed legal scope.
    traverse:
      - relationship: matter_turns_on_statute
        as: scope_statute

  adverse_authority_for_matter:
    mode: traversal
    entry_point: Matter
    returns: Opinion
    relationship_state: reviewable
    description: Opinions whose holdings undermine arguments in this matter.
    traverse:
      - relationship: argument_in_matter
        as: matter_argument
      - relationship: holding_undermines_argument
        as: adverse_holding
      - relationship: opinion_has_holding
        as: adverse_opinion

  supporting_authority_for_matter:
    mode: traversal
    entry_point: Matter
    returns: Opinion
    relationship_state: reviewable
    description: Opinions whose holdings support arguments in this matter.
    traverse:
      - relationship: argument_in_matter
        as: matter_argument
      - relationship: holding_supports_argument
        as: supporting_holding
      - relationship: opinion_has_holding
        as: supporting_opinion

  negative_treatment_for_cited_authorities:
    explicit: true
    mode: traversal
    description: >
      New opinions that negatively treat authorities cited by this matter's
      arguments, newest treatment first. follows is not negative treatment.
    entry_point: Matter
    returns: Opinion
    relationship_state: reviewable
    traversal:
      - relationship: argument_in_matter
        direction: incoming
      - relationship: argument_cites_opinion
        direction: outgoing
      - relationship: opinion_treats_opinion
        direction: incoming
        where:
          edge.properties.treatment:
            in: [distinguishes, criticizes, limits, overrules, abrogates]
    order_by:
      - by: $result.properties.date_filed
        direction: desc
        value_type: date

  supporting_authority_now_bad_law:
    explicit: true
    mode: traversal
    description: >
      The two-act alarm: reach the matter's supporting authorities, then
      surface opinions that overrule, abrogate, or limit them, newest first.
    entry_point: Matter
    returns: Opinion
    relationship_state: reviewable
    traversal:
      - relationship: argument_in_matter
        direction: incoming
      - relationship: holding_supports_argument
        direction: incoming
      - relationship: opinion_has_holding
        direction: incoming
      - relationship: opinion_treats_opinion
        direction: incoming
        where:
          edge.properties.treatment:
            in: [limits, overrules, abrogates]
    order_by:
      - by: $result.properties.date_filed
        direction: desc
        value_type: date

  precedent_chain_for_issue:
    mode: traversal
    entry_point: LegalIssue
    returns: Opinion
    relationship_state: reviewable
    description: Opinions with reviewed holdings addressing this issue.
    traverse:
      - relationship: holding_addresses_issue
        as: issue_holding
      - relationship: opinion_has_holding
        as: issue_opinion

  statutory_interpretations_for_issue:
    mode: traversal
    entry_point: LegalIssue
    returns: Statute
    relationship_state: reviewable
    description: Statutes interpreted by holdings addressing this issue.
    traverse:
      - relationship: holding_addresses_issue
        as: issue_holding
      - relationship: holding_interprets_statute
        as: interpreted_statute

  statute_interpretations_for_matter:
    mode: traversal
    entry_point: Matter
    returns: Opinion
    relationship_state: reviewable
    description: Opinions whose holdings interpret statutes in this matter's scope.
    traverse:
      - relationship: matter_turns_on_statute
        as: scope_statute
      - relationship: holding_interprets_statute
        as: interpreting_holding
      - relationship: opinion_has_holding
        as: interpreting_opinion

  work_items_for_matter:
    mode: traversal
    entry_point: Matter
    returns: WorkItem
    relationship_state: reviewable
    description: Open review obligations and other work targeting this matter.
    traverse:
      - relationship: work_item_targets_matter
        as: matter_work
        where: {status: {not_in: [closed]}}
    select:
      properties: [work_item_id, title, status, priority, type]

  opinion_work_items:
    mode: traversal
    entry_point: Opinion
    returns: WorkItem
    relationship_state: reviewable
    description: Review obligations created by this opinion.
    traverse:
      - relationship: opinion_creates_work_item
        as: created_work

  filing_response_obligations_for_matter:
    mode: traversal
    entry_point: Matter
    returns: Filing
    relationship_state: reviewable
    description: Filings judged to require a response or deadline for this matter.
    traverse:
      - relationship: filing_requires_response
        as: obligated_filing

  deadline_watch:
    mode: traversal
    entry_point: Actor
    returns: Deadline
    description: Deadlines across the matters this actor owns, soonest first.
    traverse:
      - relationship: matter_owned_by_actor
        as: owned_matter
      - relationship: matter_has_deadline
        as: matter_deadline
    order: due_date asc date

  upcoming_deadlines:
    mode: collection
    returns: Deadline
    description: All live deadlines still awaiting action, soonest first — the practice-wide docket view.
    where: {status: {in: [pending, extended]}}
    select:
      properties: [deadline_id, title, due_date, deadline_type, status]
      items:
        matters: matter_has_deadline<
    order: due_date asc date

  argument_track_record:
    mode: traversal
    entry_point: Argument
    returns: CaseOutcome
    description: Case outcomes where this argument was resolved or evaluated.
    traverse:
      - relationship: outcome_resolved_argument
        as: resolving_outcome

  case_outcomes_for_matter:
    mode: traversal
    entry_point: Matter
    returns: CaseOutcome
    description: Case outcomes recorded for this matter.
    traverse:
      - relationship: outcome_of_matter
        as: matter_outcome

  authorities_in_matter_jurisdiction:
    mode: traversal
    entry_point: Matter
    returns: Opinion
    description: Opinions issued by courts in the matter's jurisdiction.
    traverse:
      - relationship: matter_in_jurisdiction
        as: matter_court
      - relationship: opinion_from_court
        as: jurisdiction_opinion

  opinions_by_judge:
    mode: traversal
    entry_point: Judge
    returns: Opinion
    description: Opinions this judge authored or joined.
    traverse:
      - relationship: opinion_decided_by_judge
        as: judged_opinion

  matter_context:
    mode: traversal
    entry_point: Matter
    returns: AnyEntity
    relationship_state: reviewable
    description: >
      Everything attached to a matter: client, owner, arguments, scope,
      impacts, filings, deadlines, work, outcomes. all_adjacent expands
      against the composed config, so base seam edges are traversed too.
    include: all_adjacent
    select:
      properties: [matter_id, name, status]

  opinion_context:
    mode: traversal
    entry_point: Opinion
    returns: AnyEntity
    relationship_state: reviewable
    description: Court, judges, citations, treatments, holdings, impacts, and created work for one opinion.
    include: all_adjacent
    select:
      properties: [opinion_id, case_name, citation]

decision_policies:
  - name: matter_scope_requires_review
    description: Matter statutory-scope judgments are reviewed before downstream impact workflows rely on them.
    rationale: Incorrect matter-scope links make later opinion-impact assessments miss relevant authority or overstate irrelevant authority.
    applies_to: workflow
    workflow_name: propose_matter_statutory_scope
    relationship_type: matter_turns_on_statute
    effect: require_review

  - name: matter_impacts_require_review
    description: Matter impact judgments are reviewed before being treated as trusted work-product state.
    rationale: A false matter-impact edge creates unnecessary client work or misses a required legal update.
    applies_to: workflow
    workflow_name: propose_matter_impact
    relationship_type: opinion_affects_matter
    effect: require_review

  - name: negative_treatment_requires_review
    description: Treatment of cited authority requires attorney review before it affects matter strategy.
    rationale: Negative treatment is high leverage and can change active filings or client advice.
    applies_to: workflow
    workflow_name: propose_opinion_treatment
    relationship_type: opinion_treats_opinion
    effect: require_review

  - name: filing_obligations_require_review
    description: Filing response obligations are reviewed before being treated as trusted deadline state.
    rationale: Incorrect filing obligations create missed deadlines or unnecessary work.
    applies_to: workflow
    workflow_name: propose_filing_response
    relationship_type: filing_requires_response
    effect: require_review

quality_checks:
  - opinions_have_court:
      cardinality:
        entity: Opinion
        relationship: opinion_from_court
        direction: out
        min: 1
      description: Every opinion should be linked to an issuing court.
  - matters_have_owner:
      cardinality:
        entity: Matter
        relationship: matter_owned_by_actor
        direction: out
        min: 1
      description: Every matter should have an accountable actor; nags after seed until onboarding assigns owners.
  - matters_have_one_client:
      cardinality:
        entity: Matter
        relationship: matter_for_client
        direction: out
        min: 1
        max: 1
      description: Every matter belongs to exactly one firm client.
  - deadlines_have_matter:
      cardinality:
        entity: Deadline
        relationship: matter_has_deadline
        direction: in
        min: 1
      description: Every deadline should be attached to at least one matter.
  - case_outcomes_have_matter:
      cardinality:
        entity: CaseOutcome
        relationship: outcome_of_matter
        direction: out
        min: 1
        max: 1
      description: Every case outcome resolves exactly one matter.
      severity: error
  - holdings_belong_to_an_opinion:
      cardinality:
        entity: Holding
        relationship: opinion_has_holding
        direction: in
        min: 1
      description: A holding with no accepted or pending opinion edge is an orphaned extraction.
  - matter_impacts_have_level:
      property: opinion_affects_matter.impact_level
      rule: required
      severity: error
  - treatments_have_rationale:
      property: opinion_treats_opinion.rationale
      rule: non_empty
  - scope_links_have_basis:
      property: matter_turns_on_statute.scope_basis
      rule: non_empty

contracts:
  EmptyInput:
    fields: {}

  CorpusSeedOutput:
    description: Deterministic corpus + firm-state rows parsed from the pinned seed bundle.
    fields:
      opinions: {type: json}
      courts: {type: json}
      judges: {type: json}
      statutes: {type: json}
      legal_issues: {type: json}
      clients: {type: json}
      matters: {type: json}
      arguments: {type: json}
      opinion_texts: {type: json, optional: true, default: []}
      opinion_from_court_edges: {type: json}
      opinion_decided_by_judge_edges: {type: json}
      opinion_cites_opinion_edges: {type: json}
      matter_for_client_edges: {type: json}
      matter_in_jurisdiction_edges: {type: json}
      argument_in_matter_edges: {type: json}
      argument_raises_issue_edges: {type: json}
      argument_cites_opinion_edges: {type: json}
      statute_governs_issue_edges: {type: json}

  DocketFeedOutput:
    description: Filings and deadlines arriving from a docket feed with their matter edges.
    fields:
      filings: {type: json}
      deadlines: {type: json}
      filing_in_matter_edges: {type: json}
      matter_has_deadline_edges: {type: json}

  CaseOutcomeFeedOutput:
    description: Resolved case outcomes and their matter and argument edges.
    fields:
      case_outcomes: {type: json}
      outcome_of_matter_edges: {type: json}
      outcome_resolved_argument_edges: {type: json}

  StaleDeadlineSweepInput:
    fields:
      as_of: {type: string}
      deadlines: {type: json}
      matters: {type: json}
      matter_deadline_edges: {type: json}

  StaleDeadlineSweepOutput:
    description: Deadline status updates for lapsed or matter-closed deadlines.
    fields:
      deadlines: {type: json}

  OpinionAnalysisInput:
    fields:
      opinions: {type: json}

  HoldingCandidates:
    description: >
      Extractor output shared by the canonical apply step and the governed
      proposal: one row per candidate holding with opinion_id, holding_id,
      summary, holding_type, scope, locator, rationale, verdict. Utility
      analyze output pipes into apply/propose unchanged: core strips its own
      source_metadata envelope at workflow-input validation.
    fields:
      items: {type: json}

  StatuteInterpretationInput:
    fields:
      holdings: {type: json}
      statutes: {type: json}
      opinion_holding_edges: {type: json}

  IssueMappingInput:
    fields:
      holdings: {type: json}
      issues: {type: json}
      statute_edges: {type: json}
      statute_issue_edges: {type: json}

  OpinionTreatmentInput:
    fields:
      opinions: {type: json}
      citation_edges: {type: json}

  ArgumentImpactInput:
    fields:
      holdings: {type: json}
      arguments: {type: json}
      holding_issue_edges: {type: json}
      argument_issue_edges: {type: json}

  MatterScopeInput:
    fields:
      matters: {type: json}
      statutes: {type: json}

  MatterImpactInput:
    fields:
      opinions: {type: json}
      matters: {type: json}
      support_edges: {type: json}
      undermine_edges: {type: json}
      opinion_holding_edges: {type: json}
      argument_matter_edges: {type: json}
      treatment_edges: {type: json}
      matter_statute_edges: {type: json}
      opinion_court_edges: {type: json}
      matter_jurisdiction_edges: {type: json}

  FilingResponseInput:
    fields:
      filings: {type: json}
      matters: {type: json}
      deadlines: {type: json}
      filing_in_matter_edges: {type: json}
      matter_deadline_edges: {type: json}

  WorkRoutingInput:
    fields:
      opinions: {type: json}
      matters: {type: json}
      matter_impact_edges: {type: json}
      treatment_edges: {type: json}
      argument_citation_edges: {type: json}
      argument_matter_edges: {type: json}

  WorkItemCandidates:
    description: >
      Router output shared by the canonical apply step and the two governed
      link proposals: one row per suggested obligation with work_item_id,
      title, work_item_type (base enum value), priority, opinion_id,
      matter_id, obligation_type, rationale, verdict. Utility analyze output
      pipes unchanged: core strips its own source_metadata envelope at
      workflow-input validation.
    fields:
      items: {type: json}

  JudgmentItems:
    description: Generic tri-state judgment rows produced by an assessor provider.
    fields:
      items: {type: json}

artifacts:
  corpus_seed_bundle:
    kind: directory
    uri: ./data/seed
    digest: sha256:c31e43b55fd04b64a748c2ddc5eee81609daad963b6e135f91cd6c0abb3415ec
    metadata:
      description: >
        Digest-pinned two-act corpus: real public opinions (CourtListener
        metadata, Chevron-deference cluster) plus the synthetic firm layer.
        Act two (the update that brings in the overruling opinion) ships as a
        second fixture consumed by refresh_corpus when offline.

providers:
  load_corpus_seed:
    description: Parse the pinned corpus bundle into corpus + firm rows.
    contract_in: EmptyInput
    contract_out: CorpusSeedOutput
    ref: kit://providers/case_law_monitoring.py::load_corpus_seed
    version: "0.2.0"
    deterministic: true
    artifact: corpus_seed_bundle

  load_corpus_update:
    description: >
      Parse the pinned act-two corpus update fixture into corpus rows. Live
      acquisition deliberately lives outside the workflow boundary: fetch
      fresh opinions with scripts/fetch_courtlistener.py, register the texts
      as source artifacts, and apply the reviewed rows via sync_corpus_update.
    contract_in: EmptyInput
    contract_out: CorpusSeedOutput
    ref: kit://providers/case_law_monitoring.py::load_corpus_update
    version: "0.2.0"
    deterministic: true
    artifact: corpus_seed_bundle

  load_docket_feed:
    description: Load filings and deadlines arriving from a docket feed.
    contract_in: EmptyInput
    contract_out: DocketFeedOutput
    ref: kit://providers/case_law_monitoring.py::load_docket_feed
    version: "0.2.0"
    deterministic: true
    artifact: corpus_seed_bundle

  load_case_outcome_feed:
    description: Load resolved case outcomes with matter and argument edges.
    contract_in: EmptyInput
    contract_out: CaseOutcomeFeedOutput
    ref: kit://providers/case_law_monitoring.py::load_case_outcome_feed
    version: "0.2.0"
    deterministic: true
    artifact: corpus_seed_bundle

  sweep_stale_deadlines:
    description: Identify pending deadlines that lapsed or whose matter closed.
    contract_in: StaleDeadlineSweepInput
    contract_out: StaleDeadlineSweepOutput
    ref: kit://providers/case_law_monitoring.py::sweep_stale_deadlines
    version: "0.2.0"
    deterministic: true

  extract_holdings_from_opinions:
    description: Extract candidate holdings from corpus opinions (deterministic heuristics over opinion metadata and curated holding text).
    contract_in: OpinionAnalysisInput
    contract_out: HoldingCandidates
    ref: kit://providers/case_law_monitoring.py::extract_holdings_from_opinions
    version: "0.2.0"
    deterministic: true

  link_holdings_to_statutes:
    description: Propose statute/rule interpretation links for applied holdings.
    contract_in: StatuteInterpretationInput
    contract_out: JudgmentItems
    ref: kit://providers/case_law_monitoring.py::link_holdings_to_statutes
    version: "0.2.0"
    deterministic: true

  map_holdings_to_issues:
    description: Map applied holdings to firm-tracked legal issues.
    contract_in: IssueMappingInput
    contract_out: JudgmentItems
    ref: kit://providers/case_law_monitoring.py::map_holdings_to_issues
    version: "0.2.0"
    deterministic: true

  classify_opinion_treatment:
    description: Classify legally meaningful treatment along the citation graph.
    contract_in: OpinionTreatmentInput
    contract_out: JudgmentItems
    ref: kit://providers/case_law_monitoring.py::classify_opinion_treatment
    version: "0.2.0"
    deterministic: true

  assess_argument_impact:
    description: Assess whether holdings support or undermine firm arguments via shared issues.
    contract_in: ArgumentImpactInput
    contract_out: JudgmentItems
    ref: kit://providers/case_law_monitoring.py::assess_argument_impact
    version: "0.2.0"
    deterministic: true

  scope_matters_to_statutes:
    description: >
      Match tracked matters to governing statutes and doctrines using optional
      curated hint keywords from the seed bundle, falling back to plain token
      overlap. All matches are unsure and review-gated.
    contract_in: MatterScopeInput
    contract_out: JudgmentItems
    ref: kit://providers/case_law_monitoring.py::scope_matters_to_statutes
    version: "0.2.0"
    deterministic: true
    artifact: corpus_seed_bundle

  assess_matter_impact:
    description: Assess whether opinions affect firm matters via argument impact, treatment, scope, and jurisdiction overlap.
    contract_in: MatterImpactInput
    contract_out: JudgmentItems
    ref: kit://providers/case_law_monitoring.py::assess_matter_impact
    version: "0.2.0"
    deterministic: true

  assess_filing_response_obligations:
    description: Assess whether filings require responses, deadlines, or client updates.
    contract_in: FilingResponseInput
    contract_out: JudgmentItems
    ref: kit://providers/case_law_monitoring.py::assess_filing_response_obligations
    version: "0.2.0"
    deterministic: true

  route_review_work:
    description: Suggest review-obligation work items from accepted matter impacts and negative treatments.
    contract_in: WorkRoutingInput
    contract_out: WorkItemCandidates
    ref: kit://providers/case_law_monitoring.py::route_review_work
    version: "0.2.0"
    deterministic: true

workflows:
  build_corpus:
    type: canonical
    description: >
      Load the pinned corpus (opinions, courts, judges, statutes, citation
      graph) and firm layer (clients, matters, arguments, issues). Matters
      load unowned; onboarding assigns matter_owned_by_actor after actors are
      minted.
    contract_in: EmptyInput
    steps:
      - id: seed
        provider: load_corpus_seed
        input: {}
        as: seed
      - id: opinions
        make_entities:
          entity_type: Opinion
          items: $steps.seed.opinions
          entity_id: $item.opinion_id
          properties: auto
        as: opinions
      - id: courts
        make_entities:
          entity_type: Court
          items: $steps.seed.courts
          entity_id: $item.court_id
          properties: auto
        as: courts
      - id: judges
        make_entities:
          entity_type: Judge
          items: $steps.seed.judges
          entity_id: $item.judge_id
          properties: auto
        as: judges
      - id: statutes
        make_entities:
          entity_type: Statute
          items: $steps.seed.statutes
          entity_id: $item.statute_id
          properties: auto
        as: statutes
      - id: legal_issues
        make_entities:
          entity_type: LegalIssue
          items: $steps.seed.legal_issues
          entity_id: $item.issue_id
          properties: auto
        as: legal_issues
      - id: clients
        make_entities:
          entity_type: Client
          items: $steps.seed.clients
          entity_id: $item.client_id
          properties: auto
        as: clients
      - id: matters
        make_entities:
          entity_type: Matter
          items: $steps.seed.matters
          entity_id: $item.matter_id
          properties: auto
        as: matters
      - id: arguments
        make_entities:
          entity_type: Argument
          items: $steps.seed.arguments
          entity_id: $item.argument_id
          properties: auto
        as: arguments
      - id: opinion_court_edges
        make_relationships:
          relationship_type: opinion_from_court
          items: $steps.seed.opinion_from_court_edges
          from_type: Opinion
          from_id: $item.opinion_id
          to_type: Court
          to_id: $item.court_id
        as: opinion_court_edges
      - id: opinion_judge_edges
        make_relationships:
          relationship_type: opinion_decided_by_judge
          items: $steps.seed.opinion_decided_by_judge_edges
          from_type: Opinion
          from_id: $item.opinion_id
          to_type: Judge
          to_id: $item.judge_id
          properties: auto
        as: opinion_judge_edges
      - id: citation_edges
        make_relationships:
          relationship_type: opinion_cites_opinion
          items: $steps.seed.opinion_cites_opinion_edges
          from_type: Opinion
          from_id: $item.source_opinion_id
          to_type: Opinion
          to_id: $item.cited_opinion_id
          properties: auto
        as: citation_edges
      - id: matter_client_edges
        make_relationships:
          relationship_type: matter_for_client
          items: $steps.seed.matter_for_client_edges
          from_type: Matter
          from_id: $item.matter_id
          to_type: Client
          to_id: $item.client_id
        as: matter_client_edges
      - id: matter_jurisdiction_edges
        make_relationships:
          relationship_type: matter_in_jurisdiction
          items: $steps.seed.matter_in_jurisdiction_edges
          from_type: Matter
          from_id: $item.matter_id
          to_type: Court
          to_id: $item.court_id
        as: matter_jurisdiction_edges
      - id: argument_matter_edges
        make_relationships:
          relationship_type: argument_in_matter
          items: $steps.seed.argument_in_matter_edges
          from_type: Argument
          from_id: $item.argument_id
          to_type: Matter
          to_id: $item.matter_id
        as: argument_matter_edges
      - id: argument_issue_edges
        make_relationships:
          relationship_type: argument_raises_issue
          items: $steps.seed.argument_raises_issue_edges
          from_type: Argument
          from_id: $item.argument_id
          to_type: LegalIssue
          to_id: $item.issue_id
        as: argument_issue_edges
      - id: argument_opinion_edges
        make_relationships:
          relationship_type: argument_cites_opinion
          items: $steps.seed.argument_cites_opinion_edges
          from_type: Argument
          from_id: $item.argument_id
          to_type: Opinion
          to_id: $item.opinion_id
          properties: auto
        as: argument_opinion_edges
      - id: statute_issue_edges
        make_relationships:
          relationship_type: statute_governs_issue
          items: $steps.seed.statute_governs_issue_edges
          from_type: Statute
          from_id: $item.statute_id
          to_type: LegalIssue
          to_id: $item.issue_id
        as: statute_issue_edges
      - id: apply_corpus
        apply_all:
          entities_from:
            - opinions
            - courts
            - judges
            - statutes
            - legal_issues
            - clients
            - matters
            - arguments
          relationships_from:
            - opinion_court_edges
            - opinion_judge_edges
            - citation_edges
            - matter_client_edges
            - matter_jurisdiction_edges
            - argument_matter_edges
            - argument_issue_edges
            - statute_issue_edges
            - argument_opinion_edges
        as: apply_corpus
    returns: apply_corpus

  refresh_corpus:
    type: utility
    description: >
      Act two / the maintenance loop: load the bundled corpus update fixture
      and return corpus rows for review. Apply through sync_corpus_update;
      then run the treatment and impact proposal chain to see the law change
      propagate. For fresh opinions, acquire outside the workflow boundary
      (scripts/fetch_courtlistener.py, then register the opinion texts as
      source artifacts) and feed the reviewed JSON to sync_corpus_update.
    contract_in: EmptyInput
    steps:
      - id: fetched
        provider: load_corpus_update
        as: fetched
    returns: fetched

  sync_corpus_update:
    type: canonical
    description: >
      Apply reviewed corpus rows (from refresh_corpus) as opinions, courts,
      judges, and citation edges. Opinion texts arriving with the update are
      pinned as source artifacts in the same apply, so treatment evidence
      dereferences without a separate CLI registration pass.
    contract_in: CorpusSeedOutput
    steps:
      - id: pin_texts
        register_source_artifacts:
          items: $input.opinion_texts
          artifact_id: $item.source_artifact_id
          content: $item.plain_text
          kind: markdown
          label: $item.opinion_id
          original_uri: $item.source_url
          retention: manifest_only
        as: pinned
      - id: opinions
        make_entities:
          entity_type: Opinion
          items: $input.opinions
          entity_id: $item.opinion_id
          properties: auto
        as: opinions
      - id: courts
        make_entities:
          entity_type: Court
          items: $input.courts
          entity_id: $item.court_id
          properties: auto
        as: courts
      - id: judges
        make_entities:
          entity_type: Judge
          items: $input.judges
          entity_id: $item.judge_id
          properties: auto
        as: judges
      - id: opinion_court_edges
        make_relationships:
          relationship_type: opinion_from_court
          items: $input.opinion_from_court_edges
          from_type: Opinion
          from_id: $item.opinion_id
          to_type: Court
          to_id: $item.court_id
        as: opinion_court_edges
      - id: opinion_judge_edges
        make_relationships:
          relationship_type: opinion_decided_by_judge
          items: $input.opinion_decided_by_judge_edges
          from_type: Opinion
          from_id: $item.opinion_id
          to_type: Judge
          to_id: $item.judge_id
          properties: auto
        as: opinion_judge_edges
      - id: citation_edges
        make_relationships:
          relationship_type: opinion_cites_opinion
          items: $input.opinion_cites_opinion_edges
          from_type: Opinion
          from_id: $item.source_opinion_id
          to_type: Opinion
          to_id: $item.cited_opinion_id
          properties: auto
        as: citation_edges
      - id: apply_update
        apply_all:
          entities_from: [opinions, courts, judges]
          relationships_from: [opinion_court_edges, opinion_judge_edges, citation_edges]
        as: apply_update
    returns: apply_update

  ingest_docket:
    type: canonical
    description: Load filings and deadlines from the docket feed and attach them to matters.
    contract_in: EmptyInput
    steps:
      - id: feed
        provider: load_docket_feed
        input: {}
        as: feed
      - id: filings
        make_entities:
          entity_type: Filing
          items: $steps.feed.filings
          entity_id: $item.filing_id
          properties: auto
        as: filings
      - id: deadlines
        make_entities:
          entity_type: Deadline
          items: $steps.feed.deadlines
          entity_id: $item.deadline_id
          properties: auto
        as: deadlines
      - id: filing_matter_edges
        make_relationships:
          relationship_type: filing_in_matter
          items: $steps.feed.filing_in_matter_edges
          from_type: Filing
          from_id: $item.filing_id
          to_type: Matter
          to_id: $item.matter_id
        as: filing_matter_edges
      - id: matter_deadline_edges
        make_relationships:
          relationship_type: matter_has_deadline
          items: $steps.feed.matter_has_deadline_edges
          from_type: Matter
          from_id: $item.matter_id
          to_type: Deadline
          to_id: $item.deadline_id
        as: matter_deadline_edges
      - id: apply_docket
        apply_all:
          entities_from: [filings, deadlines]
          relationships_from: [filing_matter_edges, matter_deadline_edges]
        as: apply_docket
    returns: apply_docket

  ingest_case_outcomes:
    type: canonical
    description: Load resolved case outcomes and attach them to matters and arguments.
    contract_in: EmptyInput
    steps:
      - id: feed
        provider: load_case_outcome_feed
        input: {}
        as: feed
      - id: case_outcomes
        make_entities:
          entity_type: CaseOutcome
          items: $steps.feed.case_outcomes
          entity_id: $item.outcome_id
          properties: auto
        as: case_outcomes
      - id: outcome_matter_edges
        make_relationships:
          relationship_type: outcome_of_matter
          items: $steps.feed.outcome_of_matter_edges
          from_type: CaseOutcome
          from_id: $item.outcome_id
          to_type: Matter
          to_id: $item.matter_id
        as: outcome_matter_edges
      - id: outcome_argument_edges
        make_relationships:
          relationship_type: outcome_resolved_argument
          items: $steps.feed.outcome_resolved_argument_edges
          from_type: CaseOutcome
          from_id: $item.outcome_id
          to_type: Argument
          to_id: $item.argument_id
          properties: auto
        as: outcome_argument_edges
      - id: apply_outcomes
        apply_all:
          entities_from: [case_outcomes]
          relationships_from: [outcome_matter_edges, outcome_argument_edges]
        as: apply_outcomes
    returns: apply_outcomes

  refresh_stale_deadlines:
    type: canonical
    description: >
      Close deadlines that lapsed or whose matter closed. Work items are NOT
      auto-closed: base WorkItems close only through the review gate.
    contract_in: EmptyInput
    steps:
      - id: deadlines
        query: {mode: collection, result_shape: entity, returns: Deadline}
        as: deadlines
      - id: matters
        query: {mode: collection, result_shape: entity, returns: Matter}
        as: matters
      - id: matter_deadline_edges
        query: {mode: collection, result_shape: relationship, returns: matter_has_deadline}
        as: matter_deadline_edges
      - id: sweep
        provider: sweep_stale_deadlines
        input:
          as_of: "2024-07-15"
          deadlines: $steps.deadlines.results
          matters: $steps.matters.results
          matter_deadline_edges: $steps.matter_deadline_edges.results
        as: sweep
      - id: closed_deadlines
        make_entities:
          entity_type: Deadline
          items: $steps.sweep.deadlines
          entity_id: $item.deadline_id
          properties:
            deadline_id: $item.deadline_id
            status: $item.status
        as: closed_deadlines
      - id: apply_closed
        apply_entities:
          entities_from: closed_deadlines
        as: apply_closed
    returns: apply_closed

  # ── Holdings pipeline (judgment-born entities: analyze → apply → propose) ──

  analyze_opinions_for_holdings:
    type: utility
    description: Run the holding extractor over the corpus and return candidate rows for the apply + propose pair.
    contract_in: EmptyInput
    steps:
      - id: opinions
        query: {mode: collection, result_shape: entity, returns: Opinion}
        as: opinions
      - id: candidates
        provider: extract_holdings_from_opinions
        input:
          opinions: $steps.opinions.results
        as: candidates
    returns: candidates

  apply_candidate_holdings:
    type: canonical
    description: Apply extractor candidates as inert Holding entities; the governed edge proposal makes them meaningful.
    contract_in: HoldingCandidates
    steps:
      - id: holdings
        make_entities:
          entity_type: Holding
          items: $input.items
          entity_id: $item.holding_id
          properties: auto
        as: holdings
      - id: apply_holdings
        apply_entities:
          entities_from: holdings
        as: apply_holdings
    returns: apply_holdings

  propose_holdings_from_opinion:
    type: proposal
    description: Propose the governed opinion_has_holding edges from the same extractor payload.
    contract_in: HoldingCandidates
    steps:
      - id: candidates
        make_candidates:
          relationship_type: opinion_has_holding
          items: $input.items
          from_type: Opinion
          from_id: $item.opinion_id
          to_type: Holding
          to_id: $item.holding_id
          properties: auto
          evidence:
            refs: $item.evidence_refs
            rationale: $item.rationale
        as: candidates
      - id: signals
        map_signals:
          signal_source: holding_extractor
          items: $input.items
          from_id: $item.opinion_id
          to_id: $item.holding_id
          evidence: $item.rationale
          evidence_refs: $item.evidence_refs
          enum:
            path: verdict
            map: {support: support, unsure: unsure, contradict: contradict}
        as: signals
      - id: proposal
        propose_relationship_group:
          relationship_type: opinion_has_holding
          candidates_from: candidates
          signals_from: [signals]
          thesis_text: These corpus opinions contain the proposed holdings.
          proposed_by: agent
        as: proposal
    returns: proposal

  # ── Graph-reading proposal chain (endpoints all exist canonically) ──

  propose_statute_interpretations:
    type: proposal
    description: Propose statute interpretation links for applied holdings.
    contract_in: EmptyInput
    steps:
      - id: holdings
        query: {mode: collection, result_shape: entity, returns: Holding}
        as: holdings
      - id: statutes
        query: {mode: collection, result_shape: entity, returns: Statute}
        as: statutes
      - id: opinion_holding_edges
        query: {mode: collection, result_shape: relationship, returns: opinion_has_holding}
        as: opinion_holding_edges
      - id: judgments
        provider: link_holdings_to_statutes
        input:
          holdings: $steps.holdings.results
          statutes: $steps.statutes.results
          opinion_holding_edges: $steps.opinion_holding_edges.results
        as: judgments
      - id: candidates
        make_candidates:
          relationship_type: holding_interprets_statute
          items: $steps.judgments.items
          from_type: Holding
          from_id: $item.holding_id
          to_type: Statute
          to_id: $item.statute_id
          properties: auto
        as: candidates
      - id: signals
        map_signals:
          signal_source: statute_interpretation_extractor
          items: $steps.judgments.items
          from_id: $item.holding_id
          to_id: $item.statute_id
          evidence: $item.rationale
          enum:
            path: verdict
            map: {support: support, unsure: unsure, contradict: contradict}
        as: signals
      - id: proposal
        propose_relationship_group:
          relationship_type: holding_interprets_statute
          candidates_from: candidates
          signals_from: [signals]
          thesis_text: These holdings interpret the proposed statutes or rules.
          proposed_by: agent
        as: proposal
    returns: proposal

  propose_holding_issue_links:
    type: proposal
    description: Map applied holdings to firm-tracked legal issues.
    contract_in: EmptyInput
    steps:
      - id: holdings
        query: {mode: collection, result_shape: entity, returns: Holding}
        as: holdings
      - id: issues
        query: {mode: collection, result_shape: entity, returns: LegalIssue}
        as: issues
      - id: statute_edges
        query: {mode: collection, result_shape: relationship, returns: holding_interprets_statute}
        as: statute_edges
      - id: statute_issue_edges
        query: {mode: collection, result_shape: relationship, returns: statute_governs_issue}
        as: statute_issue_edges
      - id: judgments
        provider: map_holdings_to_issues
        input:
          holdings: $steps.holdings.results
          issues: $steps.issues.results
          statute_edges: $steps.statute_edges.results
          statute_issue_edges: $steps.statute_issue_edges.results
        as: judgments
      - id: candidates
        make_candidates:
          relationship_type: holding_addresses_issue
          items: $steps.judgments.items
          from_type: Holding
          from_id: $item.holding_id
          to_type: LegalIssue
          to_id: $item.issue_id
          properties: auto
        as: candidates
      - id: signals
        map_signals:
          signal_source: issue_mapper
          items: $steps.judgments.items
          from_id: $item.holding_id
          to_id: $item.issue_id
          evidence: $item.rationale
          enum:
            path: verdict
            map: {support: support, unsure: unsure, contradict: contradict}
        as: signals
      - id: proposal
        propose_relationship_group:
          relationship_type: holding_addresses_issue
          candidates_from: candidates
          signals_from: [signals]
          thesis_text: These holdings materially address the proposed legal issues.
          proposed_by: agent
        as: proposal
    returns: proposal

  propose_opinion_treatment:
    type: proposal
    description: Classify how corpus opinions treat cited authorities (the citator loop).
    contract_in: EmptyInput
    steps:
      - id: opinions
        query: {mode: collection, result_shape: entity, returns: Opinion}
        as: opinions
      - id: citation_edges
        query: {mode: collection, result_shape: relationship, returns: opinion_cites_opinion}
        as: citation_edges
      - id: judgments
        provider: classify_opinion_treatment
        input:
          opinions: $steps.opinions.results
          citation_edges: $steps.citation_edges.results
        as: judgments
      - id: candidates
        make_candidates:
          relationship_type: opinion_treats_opinion
