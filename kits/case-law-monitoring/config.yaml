          proposed_by: agent
        as: proposal
    returns: proposal

  # ── Review-work pipeline (base WorkItems: analyze → apply → propose links) ──

  analyze_review_work:
    type: utility
    description: Suggest review-obligation work items from accepted matter impacts and negative treatments.
    contract_in: EmptyInput
    steps:
      - id: opinions
        query: {mode: collection, result_shape: entity, returns: Opinion}
        as: opinions
      - id: matters
        query: {mode: collection, result_shape: entity, returns: Matter}
        as: matters
      - id: matter_impact_edges
        query: {mode: collection, result_shape: relationship, returns: opinion_affects_matter, relationship_state: accepted}
        as: matter_impact_edges
      - id: treatment_edges
        query: {mode: collection, result_shape: relationship, returns: opinion_treats_opinion, relationship_state: accepted}
        as: treatment_edges
      - id: argument_citation_edges
        query: {mode: collection, result_shape: relationship, returns: argument_cites_opinion}
        as: argument_citation_edges
      - id: argument_matter_edges
        query: {mode: collection, result_shape: relationship, returns: argument_in_matter}
        as: argument_matter_edges
      - id: suggestions
        provider: route_review_work
        input:
          opinions: $steps.opinions.results
          matters: $steps.matters.results
          matter_impact_edges: $steps.matter_impact_edges.results
          treatment_edges: $steps.treatment_edges.results
          argument_citation_edges: $steps.argument_citation_edges.results
          argument_matter_edges: $steps.argument_matter_edges.results
        as: suggestions
    returns: suggestions

  apply_review_work_items:
    type: canonical
    description: >
      Apply suggested review obligations as base WorkItems (planned,
      unowned). They enter the operating layer's own queues and close through
      its review gate; the governed seam proposals attach them to opinions
      and matters.
    contract_in: WorkItemCandidates
    steps:
      - id: work_items
        make_entities:
          entity_type: WorkItem
          items: $input.items
          entity_id: $item.work_item_id
          properties:
            work_item_id: $item.work_item_id
            title: $item.title
            type: $item.work_item_type
            status: planned
            priority: $item.priority
        as: work_items
      - id: matter_links
        make_relationships:
          relationship_type: work_item_targets_matter
          items: $input.items
          from_type: WorkItem
          from_id: $item.work_item_id
          to_type: Matter
          to_id: $item.matter_id
        as: matter_links
      - id: apply_work
        apply_all:
          entities_from: [work_items]
          relationships_from: [matter_links]
        as: apply_work
    returns: apply_work

  propose_opinion_work_links:
    type: proposal
    description: Propose the governed opinion-to-work-item obligation edges from the router payload.
    contract_in: WorkItemCandidates
    steps:
      - id: candidates
        make_candidates:
          relationship_type: opinion_creates_work_item
          items: $input.items
          from_type: Opinion
          from_id: $item.opinion_id
          to_type: WorkItem
          to_id: $item.work_item_id
          properties:
            obligation_type: $item.obligation_type
            routing_basis: $item.rationale
        as: candidates
      - id: signals
        map_signals:
          signal_source: review_router
          items: $input.items
          from_id: $item.opinion_id
          to_id: $item.work_item_id
          evidence: $item.rationale
          enum:
            path: verdict
            map: {support: support, unsure: unsure, contradict: contradict}
        as: signals
      - id: proposal
        propose_relationship_group:
          relationship_type: opinion_creates_work_item
          candidates_from: candidates
          signals_from: [signals]
          thesis_text: These opinions create the proposed review obligations.
          proposed_by: agent
        as: proposal
    returns: proposal

feedback_profiles:
  matter_turns_on_statute:
    version: 1
    reason_codes:
      wrong_statute_link:
        description: The statute or doctrine is not relevant to this matter's legal issues.
        remediation_hint: provider_fix
        required_scope_keys: [statute]
      issue_not_in_matter:
        description: The issue used to justify this scope is not part of the matter.
        remediation_hint: quality_check
        required_scope_keys: [matter]
    scope_keys:
      matter: FROM.matter_id
      statute: TO.statute_id

  opinion_has_holding:
    version: 1
    reason_codes:
      overbroad_holding:
        description: Holding is broader than the opinion supports.
        remediation_hint: provider_fix
        required_scope_keys: [holding_type]
      missed_scope_limitation:
        description: Holding omits an important limitation or procedural posture.
        remediation_hint: constraint
        required_scope_keys: [holding_type]
      duplicate_holding:
        description: Holding duplicates an existing accepted holding.
        remediation_hint: decision_policy
        required_scope_keys: [holding_type]
    scope_keys:
      opinion: FROM.opinion_id
      holding: TO.holding_id
      holding_type: TO.holding_type

  holding_interprets_statute:
    version: 1
    reason_codes:
      wrong_statute:
        description: Holding does not interpret this statute or rule.
        remediation_hint: provider_fix
        required_scope_keys: [interpretation_type]
      wrong_interpretation_type:
        description: Interpretation type is wrong.
        remediation_hint: provider_fix
        required_scope_keys: [interpretation_type]
    scope_keys:
      holding: FROM.holding_id
      statute: TO.statute_id
      interpretation_type: EDGE.interpretation_type

  holding_addresses_issue:
    version: 1
    reason_codes:
      issue_too_broad:
        description: Holding is related but does not directly address the tracked issue.
        remediation_hint: decision_policy
        required_scope_keys: [issue_fit]
      wrong_practice_area:
        description: Holding belongs to a different practice-area framing.
        remediation_hint: provider_fix
        required_scope_keys: [issue_fit]
    scope_keys:
      holding: FROM.holding_id
      issue: TO.issue_id
      issue_fit: EDGE.issue_fit

  opinion_treats_opinion:
    version: 1
    reason_codes:
      not_meaningful_treatment:
        description: Citation does not meaningfully treat the cited authority.
        remediation_hint: provider_fix
        required_scope_keys: [treatment]
      wrong_treatment_type:
        description: Treatment type is incorrect.
        remediation_hint: provider_fix
        required_scope_keys: [treatment]
      citation_context_mismatch:
        description: Treatment holds only in a different doctrinal or procedural context.
        remediation_hint: constraint
        required_scope_keys: [treatment]
    scope_keys:
      source_opinion: FROM.opinion_id
      cited_opinion: TO.opinion_id
      treatment: EDGE.treatment

  holding_supports_argument:
    version: 1
    reason_codes:
      tangential_support:
        description: Holding is related but does not materially support this argument.
        remediation_hint: decision_policy
        required_scope_keys: [support_strength]
      factually_distinguishable:
        description: Holding depends on facts too different from the matter argument.
        remediation_hint: constraint
        required_scope_keys: [support_strength]
    scope_keys:
      holding: FROM.holding_id
      argument: TO.argument_id
      support_strength: EDGE.support_strength

  holding_undermines_argument:
    version: 1
    reason_codes:
      no_material_risk:
        description: Holding does not materially undermine the argument.
        remediation_hint: decision_policy
        required_scope_keys: [risk_type]
      wrong_direction:
        description: Holding supports or is neutral to the argument rather than undermining it.
        remediation_hint: provider_fix
        required_scope_keys: [risk_type]
      distinguishable_authority:
        description: Holding is distinguishable and should not be treated as adverse.
        remediation_hint: constraint
        required_scope_keys: [risk_type]
    scope_keys:
      holding: FROM.holding_id
      argument: TO.argument_id
      risk_type: EDGE.risk_type

  opinion_affects_matter:
    version: 1
    reason_codes:
      no_material_impact:
        description: Opinion does not materially affect this matter.
        remediation_hint: decision_policy
        required_scope_keys: [impact_level]
      wrong_impact_level:
        description: Impact level is overstated or understated.
        remediation_hint: decision_policy
        required_scope_keys: [impact_level]
      matter_posture_mismatch:
        description: Opinion affects a posture or claim type not present in this matter.
        remediation_hint: constraint
        required_scope_keys: [impact_level]
    scope_keys:
      opinion: FROM.opinion_id
      matter: TO.matter_id
      impact_level: EDGE.impact_level

  opinion_creates_work_item:
    version: 1
    reason_codes:
      unnecessary_review:
        description: The opinion does not create a real review obligation.
        remediation_hint: decision_policy
        required_scope_keys: [obligation_type]
      wrong_obligation_type:
        description: The obligation type is incorrect.
        remediation_hint: provider_fix
        required_scope_keys: [obligation_type]
    scope_keys:
      opinion: FROM.opinion_id
      work_item: TO.work_item_id
      obligation_type: EDGE.obligation_type

  filing_requires_response:
    version: 1
    reason_codes:
      no_response_required:
        description: This filing does not create a response obligation for the matter.
        remediation_hint: constraint
        required_scope_keys: [response_type]
      deadline_extraction_error:
        description: The response deadline was incorrectly extracted or normalized.
        remediation_hint: provider_fix
        required_scope_keys: [response_type]
      wrong_matter_routing:
        description: The filing was routed to the wrong tracked matter.
        remediation_hint: quality_check
        required_scope_keys: [response_type]
    scope_keys:
      filing: FROM.filing_id
      matter: TO.matter_id
      response_type: EDGE.response_type

outcome_profiles:
  matter_scope_resolution:
    anchor_type: resolution
    relationship_type: matter_turns_on_statute
    version: 1
    outcome_codes:
      scope_confirmed:
        description: Later review confirmed the matter-scope link.
        remediation_hint: unknown
        required_scope_keys: [relationship_type]
      scope_too_broad:
        description: The accepted scope link was broader than the matter required.
        remediation_hint: trust_adjustment
        required_scope_keys: [relationship_type]
      missed_core_statute:
        description: A core statute or doctrine was missed during scoping.
        remediation_hint: require_review
        required_scope_keys: [relationship_type]
    scope_keys:
      relationship_type: RESOLUTION.relationship_type

  matter_impact_resolution:
    anchor_type: resolution
    relationship_type: opinion_affects_matter
    version: 1
    outcome_codes:
      strategy_updated:
        description: Matter strategy, filings, or client advice changed because of this opinion.
        remediation_hint: unknown
        required_scope_keys: [relationship_type]
      no_actual_impact:
        description: The accepted impact did not change the matter.
        remediation_hint: trust_adjustment
        required_scope_keys: [relationship_type]
      missed_matter:
        description: An affected matter was missed by the workflow.
        remediation_hint: require_review
        required_scope_keys: [relationship_type]
    scope_keys:
      relationship_type: RESOLUTION.relationship_type

  treatment_resolution:
    anchor_type: resolution
    relationship_type: opinion_treats_opinion
    version: 1
    outcome_codes:
      treatment_confirmed:
        description: Attorney review or later citation history confirmed the treatment.
        remediation_hint: unknown
        required_scope_keys: [relationship_type]
      treatment_overstated:
        description: Later review showed the treatment was overstated.
        remediation_hint: trust_adjustment
        required_scope_keys: [relationship_type]
      negative_treatment_missed:
        description: Negative treatment existed but was missed by the workflow.
        remediation_hint: workflow_fix
        required_scope_keys: [relationship_type]
    scope_keys:
      relationship_type: RESOLUTION.relationship_type

  filing_response_resolution:
    anchor_type: resolution
    relationship_type: filing_requires_response
    version: 1
    outcome_codes:
      response_obligation_confirmed:
        description: Later matter activity confirmed the obligation applied.
        remediation_hint: unknown
        required_scope_keys: [relationship_type]
      false_deadline:
        description: The accepted obligation or deadline was incorrect.
        remediation_hint: trust_adjustment
        required_scope_keys: [relationship_type]
      missed_deadline:
        description: A real response obligation was missed.
        remediation_hint: require_review
        required_scope_keys: [relationship_type]
    scope_keys:
      relationship_type: RESOLUTION.relationship_type

  argument_support_resolution:
    anchor_type: resolution
    relationship_type: holding_supports_argument
    version: 1
    outcome_codes:
      support_held_up:
        description: The supporting holding held up in briefing or argument.
        remediation_hint: unknown
        required_scope_keys: [relationship_type]
      support_overstated:
        description: The holding did not materially help the argument.
        remediation_hint: trust_adjustment
        required_scope_keys: [relationship_type]
      missed_supporting_authority:
        description: A holding that would have supported the argument was missed.
        remediation_hint: require_review
        required_scope_keys: [relationship_type]
    scope_keys:
      relationship_type: RESOLUTION.relationship_type

  argument_risk_resolution:
    anchor_type: resolution
    relationship_type: holding_undermines_argument
    version: 1
    outcome_codes:
      risk_materialized:
        description: The adverse holding required a real strategy change.
        remediation_hint: unknown
        required_scope_keys: [relationship_type]
      risk_overstated:
