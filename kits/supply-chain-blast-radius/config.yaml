version: "1.0"
name: supply_chain_blast_radius
extends: ../agent-operation/config.yaml
description: >
  Supply-chain incident blast-radius domain overlay composed over the
  agent-operation base. Deterministic base world of suppliers, components,
  assemblies (recursive BOM), products, and shipments — the launch seed is a
  real open-hardware BOM with fictional suppliers in real geographies.
  Incidents arrive as entities and cascade through three staged governed
  workflows: incident -> supplier -> component/direct assembly. Product and
  shipment risk are derived context surfaces over accepted upstream impacts,
  BOM structure, buffers, and shipment state — never direct incident-product
  edges. Governed edges are rule-centric (bucket signatures carry the cascade
  rule, not the incident), so trust accumulates on rules across incidents.
  Operating-layer seams: work items address incidents; risks attach to
  suppliers through the governed path.

presets:
  policies:
    standard_supply:
      signals:
        source_evidence: {role: required, always_review_on_unsure: true}
        maintainer_judgment: {role: advisory, always_review_on_unsure: true}

enums:
  component_kind: [raw_material, part]
  # Base owns lifecycle_status; catalog lifecycle gets its own vocabulary.
  catalog_status: [active, deprecated, obsolete]
  criticality: [critical, standard, low]
  shipment_status: [in_flight, delivered, cancelled]
  location_type: [plant, warehouse, supplier, in_transit]
  inventory_item_type: [component, assembly, product]
  buffer_item_type: [component, assembly]
  rate_period: [day, week, month]
  duration_unit: [days, weeks, months]
  buffer_state: [no_buffer, partial_buffer, sufficient_buffer, unknown]
  incident_severity: [critical, high, medium, low]
  incident_scope_type: [supplier, geography]
  incident_status: [open, monitoring, closed]
  qualification_status: [qualified, conditional, expired, disqualified]
  sourcing_role: [primary, secondary, tertiary, emergency, inactive]
  activation_state: [active, standby, constrained, unavailable]
  supplier_match_basis: [direct, geography]
  alternate_state: [no_alternate, alternate_in_scope, alternate_viable]
  bom_depth_bucket: [direct, tier_2, tier_3_plus]
  proposal_verdict: [support, unsure, contradict]
  product_exposure_basis: [component_bom_path, direct_assembly_bom_path, mixed_paths]

entity_types:
  Supplier:
    description: External supplier of raw materials, parts, or assemblies.
    id: supplier_id
    properties:
      name: string indexed
      primary_geography: string
      tier_hint:
        type: string
        optional: true
        description: Operator-supplied hint (tier-1/2/3); true tier is computed via BOM traversal.

  Component:
    description: Raw material or discrete part that rolls up into assemblies. manufacturer/mpn carry the real-world part identity from open-hardware BOMs; the Supplier edge carries who we buy it from.
    id: component_id
    properties:
      name: string indexed
      component_kind: enum component_kind
      manufacturer: string?
      mpn: string?
      revision: string?
      lifecycle_status: enum catalog_status
      criticality: enum criticality
      category: string

  Assembly:
    description: Buildable subassembly or assembly composed of components and lower-level assemblies.
    id: assembly_id
    properties:
      name: string indexed
      revision: string?
      lifecycle_status: enum catalog_status
      criticality: enum criticality
      category: string

  Product:
    description: Finished good shipped to customers.
    id: product_id
    properties:
      sku: string indexed
      name: string
      lifecycle_status: enum catalog_status

  Shipment:
    description: Outbound shipment of products to a customer.
    id: shipment_id
    properties:
      customer_id: string indexed
      status: enum shipment_status
      ship_date: date
      eta: date

  Location:
    description: Plant, warehouse, supplier, or in-transit location holding inventory.
    id: location_id
    properties:
      name: string indexed
      location_type: enum location_type
      geography: string

  InventoryPosition:
    description: Time-stamped inventory evidence for an item at a location.
    id: inventory_position_id
    properties:
      item_type: enum inventory_item_type
      item_id: string indexed
      location_id: string indexed
      quantity_on_hand: float?
      quantity_allocated: float?
      net_available: float?
      unit_of_measure: string
      as_of: date

  BufferAssessment:
    description: Reusable coverage assessment of whether inventory covers expected demand for an item in a product/BOM context.
    id: buffer_assessment_id
    properties:
      item_type: enum buffer_item_type
      item_id: string indexed
      product_id: string indexed
      bom_variant_id: string
      net_available: float?
      required_per_unit: float?
      open_demand_units: float?
      estimated_consumption_rate: float?
      rate_period: enum rate_period
      coverage_duration: float?
      coverage_unit: enum duration_unit
      horizon_duration: float?
      horizon_unit: enum duration_unit
      buffer_state: enum buffer_state
      unit_of_measure: string
      as_of: date
      rationale: string

  Incident:
    description: Supplier-side disruption or geography-level supply event.
    id: incident_id
    properties:
      title: string indexed
      severity: enum incident_severity
      scope_type: enum incident_scope_type
      scope_id: string?
      status: enum incident_status
      reported_at: date
      # Optional: open incidents have no closed_at; feed rows must still carry
      # the keys (null when unset) because ingest maps them unconditionally.
      closed_at: date?
      summary: string?

relationships:
  # --- Sourcing (deterministic seed state) ---
  - supplier_supplies_component: Supplier -> Component  # Qualified sourcing path; capacity, posture, and timing live on the edge.
    properties:
      lead_time_days: int?
      qualification_status: enum qualification_status
      sourcing_role: enum sourcing_role
      priority_rank: int?
      allocation_pct: float?
      activation_state: enum activation_state
      capacity_units_per_week: int?
      effective_from: date
      effective_to: date?
      last_verified_at: date
  - supplier_supplies_assembly: Supplier -> Assembly  # Directly supplied assembly; same sourcing posture as component supply.
    properties:
      lead_time_days: int?
      qualification_status: enum qualification_status
      sourcing_role: enum sourcing_role
      priority_rank: int?
      allocation_pct: float?
      activation_state: enum activation_state
      capacity_units_per_week: int?
      effective_from: date
      effective_to: date?
      last_verified_at: date

  # --- BOM structure ---
  - component_part_of_assembly: Component -> Assembly  # BOM edge for a raw material or part.
    properties:
      quantity: int?
      bom_variant_id: string
      plant_id: string
      effective_from: date
      effective_to: date?
  - assembly_part_of_assembly: Assembly -> Assembly  # Recursive BOM edge, child assembly into parent.
    properties:
      quantity: int?
      bom_variant_id: string
      plant_id: string
      effective_from: date
      effective_to: date?
  - assembly_part_of_product: Assembly -> Product  # Top-level BOM edge into a finished product.
    properties:
      quantity: int?
      bom_variant_id: string
      plant_id: string
      effective_from: date
      effective_to: date?

  # --- Fulfillment + inventory evidence ---
  - product_in_shipment: Product -> Shipment  # Product is contained in a shipment.
    properties:
      qty: int?
  - component_inventory_position: Component -> InventoryPosition
  - assembly_inventory_position: Assembly -> InventoryPosition
  - product_inventory_position: Product -> InventoryPosition
  - inventory_position_location: InventoryPosition -> Location
  - component_buffer_assessment: Component -> BufferAssessment
  - assembly_buffer_assessment: Assembly -> BufferAssessment
  - product_buffer_assessment: Product -> BufferAssessment
  - buffer_assessment_inventory: BufferAssessment -> InventoryPosition

  # --- Operating-layer seams ---
  - work_item_addresses_incident: WorkItem -> Incident  # Work item responds to or mitigates an incident.
  - risk_attaches_to_supplier: Risk -> Supplier  # Governed: an operational risk attaches to a supplier.
    proposal_policy: standard_supply
    basis: impact_basis

  # --- Governed cascade judgments (rule-centric trust; auto-resolve on all-support) ---
  - incident_impacts_supplier: Incident -> Supplier  # Governed: the incident materially impacts this supplier.
    properties:
      match_basis: "enum supplier_match_basis?"
      rationale: string
    proposal_policy:
      signals:
        incident_supplier_scope_match:
          role: required
          always_review_on_unsure: true
      auto_resolve_when: all_support
  - incident_impacts_component: Incident -> Component  # Governed: the incident impacts this component via impacted suppliers.
    properties:
      alternate_state: "enum alternate_state?"
      rationale: string
    proposal_policy:
      signals:
        incident_component_cascade:
          role: required
          always_review_on_unsure: true
      auto_resolve_when: all_support
  - incident_impacts_assembly: Incident -> Assembly  # Governed: the incident impacts this directly supplied assembly.
    properties:
      impacted_supplier_id: string?
      alternate_state: "enum alternate_state?"
      rationale: string
    proposal_policy:
      signals:
        incident_assembly_cascade:
          role: required
          always_review_on_unsure: true
      auto_resolve_when: all_support

named_queries:
  incident_impacted_suppliers:
    mode: traversal
    entry_point: Incident
    returns: Supplier
    relationship_state: reviewable
    description: Suppliers judged impacted by this incident, pending judgments visible.
    traverse:
      - relationship: incident_impacts_supplier
        as: impacted_supplier

  incident_impacted_components:
    mode: traversal
    entry_point: Incident
    returns: Component
    relationship_state: reviewable
    description: Components judged impacted via the supplier cascade.
    traverse:
      - relationship: incident_impacts_component
        as: impacted_component

  incident_impacted_assemblies:
    mode: traversal
    entry_point: Incident
    returns: Assembly
    relationship_state: reviewable
    description: Directly supplied assemblies judged impacted.
    traverse:
      - relationship: incident_impacts_assembly
        as: impacted_assembly

  incident_work_items:
    mode: traversal
    entry_point: Incident
    returns: WorkItem
    relationship_state: reviewable
    description: Open response work addressing this incident.
    traverse:
      - relationship: work_item_addresses_incident
        as: response_work
        where: {status: {not_in: [closed]}}
    select:
      properties: [work_item_id, title, status, priority, type]

  incident_context:
    mode: traversal
    entry_point: Incident
    returns: AnyEntity
    relationship_state: reviewable
    description: The incident war room — impacted suppliers/components/assemblies, response work, and anything else adjacent in the composed graph.
    include: all_adjacent
    select:
      properties: [incident_id, title, severity, status]

  supplier_context:
    mode: traversal
    entry_point: Supplier
    returns: AnyEntity
    relationship_state: reviewable
    description: Everything attached to a supplier — supplied items, impacting incidents, attached risks.
    include: all_adjacent
    select:
      properties: [supplier_id, name, primary_geography]

  supplier_supplied_components:
    mode: traversal
    entry_point: Supplier
    returns: Component
    description: Components this supplier is qualified to supply.
    traverse:
      - relationship: supplier_supplies_component
        as: supplied_component

  supplier_supplied_assemblies:
    mode: traversal
    entry_point: Supplier
    returns: Assembly
    description: Assemblies this supplier supplies directly.
    traverse:
      - relationship: supplier_supplies_assembly
        as: supplied_assembly

  supplier_impacting_incidents:
    mode: traversal
    entry_point: Supplier
    returns: Incident
    relationship_state: reviewable
    description: Incidents judged to impact this supplier.
    traverse:
      - relationship: incident_impacts_supplier
        as: impacting_incident

  assembly_impacting_incidents:
    mode: traversal
    entry_point: Assembly
    returns: Incident
    relationship_state: reviewable
    description: Incidents judged to impact this assembly directly.
    traverse:
      - relationship: incident_impacts_assembly
        as: impacting_incident

  component_parent_assemblies:
    mode: traversal
    entry_point: Component
    returns: Assembly
    description: Direct and higher-level parent assemblies in the BOM.
    traverse:
      - relationship: [component_part_of_assembly, assembly_part_of_assembly]
        as: parent_assembly
        direction: outgoing
        max_depth: 8

  assembly_child_components:
    mode: traversal
    entry_point: Assembly
    returns: Component
    description: Direct child components of this assembly.
    traverse:
      - relationship: component_part_of_assembly
        as: child_component

  assembly_child_assemblies:
    mode: traversal
    entry_point: Assembly
    returns: Assembly
    description: Direct child assemblies of this assembly.
    traverse:
      - relationship: assembly_part_of_assembly
        as: child_assembly
        direction: incoming

  product_top_level_assemblies:
    mode: traversal
    entry_point: Product
    returns: Assembly
    description: Top-level assemblies in this product's BOM.
    traverse:
      - relationship: assembly_part_of_product
        as: top_assembly

  product_shipments:
    mode: traversal
    entry_point: Product
    returns: Shipment
    description: Shipments containing this product.
    traverse:
      - relationship: product_in_shipment
        as: shipment

  shipment_products:
    mode: traversal
    entry_point: Shipment
    returns: Product
    description: Products contained in this shipment.
    traverse:
      - relationship: product_in_shipment
        as: shipped_product

  product_buffer_assessments:
    mode: traversal
    entry_point: Product
    returns: BufferAssessment
    description: Current buffer assessments in this product's context.
    traverse:
      - relationship: product_buffer_assessment
        as: assessment

  component_inventory_positions:
    mode: traversal
    entry_point: Component
    returns: InventoryPosition
    description: Inventory positions for this component.
    traverse:
      - relationship: component_inventory_position
        as: position

  assembly_inventory_positions:
    mode: traversal
    entry_point: Assembly
    returns: InventoryPosition
    description: Inventory positions for this assembly.
    traverse:
      - relationship: assembly_inventory_position
        as: position

  incident_exposed_assembly_context:
    explicit: true
    mode: traversal
    relationship_state: reviewable
    description: >
      Starting from an incident, derive assembly context exposed by accepted
      supplier, component, or direct assembly impacts through supply and BOM
      structure. This is a query/view, not governed state. The supply/BOM hop
      is required false so a directly impacted assembly is itself included
      even when it has no parent assembly (same pattern as
      incident_exposed_shipments).
    entry_point: Incident
    returns: Assembly
    traversal:
      - relationship: [incident_impacts_supplier, incident_impacts_component, incident_impacts_assembly]
        direction: outgoing
      - relationship: [supplier_supplies_assembly, component_part_of_assembly, assembly_part_of_assembly]
        direction: outgoing
        max_depth: 8
        required: false

  incident_component_exposed_products:
    explicit: true
    mode: traversal
    relationship_state: reviewable
    description: >
      Starting from an incident, derive finished products exposed through
      accepted component impacts and the component/assembly BOM hierarchy.
      This is context for an agentic product or shipment judgment, not
      governed graph state.
    entry_point: Incident
    returns: Product
    traversal:
      - relationship: incident_impacts_component
        direction: outgoing
      - relationship: [component_part_of_assembly, assembly_part_of_assembly]
        direction: outgoing
        max_depth: 8
      - relationship: assembly_part_of_product
        direction: outgoing

  incident_direct_assembly_exposed_products:
    explicit: true
    mode: traversal
    relationship_state: reviewable
    description: >
      Starting from an incident, derive finished products exposed through
      accepted direct assembly impacts where the assembly is a top-level
      product assembly.
    entry_point: Incident
    returns: Product
    traversal:
      - relationship: incident_impacts_assembly
        direction: outgoing
      - relationship: assembly_part_of_product
        direction: outgoing

  incident_nested_assembly_exposed_products:
    explicit: true
    mode: traversal
    relationship_state: reviewable
    description: >
      Starting from an incident, derive finished products exposed through
      accepted direct assembly impacts and higher-level parent assemblies.
    entry_point: Incident
    returns: Product
    traversal:
      - relationship: incident_impacts_assembly
        direction: outgoing
      - relationship: assembly_part_of_assembly
        direction: outgoing
        max_depth: 8
      - relationship: assembly_part_of_product
        direction: outgoing

  incident_exposed_shipments:
    explicit: true
    mode: traversal
    relationship_state: reviewable
    description: >
      Starting from an incident, derive outbound shipments exposed through
      accepted component and direct assembly impacts, the component/assembly
      BOM hierarchy, exposed finished products, and the product_in_shipment
      fulfillment edge. This is the terminal (shipment) derived exposure
      surface — context for an agentic shipment judgment, not governed graph
      state. No direct incident-shipment edge is created. The BOM-up hop is
      required false so directly impacted top-level assemblies reach products
      and shipments without an intermediate BOM rollup.
    entry_point: Incident
    returns: Shipment
    traversal:
      - relationship: [incident_impacts_component, incident_impacts_assembly]
        direction: outgoing
      - relationship: [component_part_of_assembly, assembly_part_of_assembly]
        direction: outgoing
        max_depth: 8
        required: false
      - relationship: assembly_part_of_product
        direction: outgoing
      - relationship: product_in_shipment
        direction: outgoing

  single_source_components_for_incident:
    explicit: true
    mode: traversal
    relationship_state: reviewable
    description: >
      Starting from an incident, find impacted components that have only one
      viable supplier path. Surfaces the "no viable alternate supplier"
      enrichment for the operator summary.
    entry_point: Incident
    returns: Component
    traversal:
      - relationship: incident_impacts_component
        direction: outgoing
        filter:
          alternate_state: no_alternate

  single_source_assemblies_for_incident:
    explicit: true
    mode: traversal
    relationship_state: reviewable
    description: >
      Starting from an incident, find impacted directly supplied assemblies
      that have only one viable supplier path.
    entry_point: Incident
    returns: Assembly
    traversal:
      - relationship: incident_impacts_assembly
        direction: outgoing
        filter:
          alternate_state: no_alternate

  product_component_impacting_incidents:
    explicit: true
    mode: traversal
    relationship_state: reviewable
    description: Starting from a product, find incidents that impact components in its BOM.
    entry_point: Product
    returns: Incident
    traversal:
      - relationship: assembly_part_of_product
        direction: incoming
      - relationship: [assembly_part_of_assembly, component_part_of_assembly]
        direction: incoming
        max_depth: 8
      - relationship: incident_impacts_component
        direction: incoming

  product_direct_assembly_impacting_incidents:
    explicit: true
    mode: traversal
    relationship_state: reviewable
    description: Starting from a product, find incidents that directly impact top-level assemblies in its BOM.
    entry_point: Product
    returns: Incident
    traversal:
      - relationship: assembly_part_of_product
        direction: incoming
      - relationship: incident_impacts_assembly
        direction: incoming

  product_nested_assembly_impacting_incidents:
    explicit: true
    mode: traversal
    relationship_state: reviewable
    description: Starting from a product, find incidents that directly impact nested assemblies in its BOM.
    entry_point: Product
    returns: Incident
    traversal:
      - relationship: assembly_part_of_product
        direction: incoming
      - relationship: assembly_part_of_assembly
        direction: incoming
        max_depth: 8
      - relationship: incident_impacts_assembly
        direction: incoming

quality_checks:
  - components_have_supplier:
      cardinality:
        entity: Component
        relationship: supplier_supplies_component
        direction: in
        min: 1
      description: Every component should have at least one supplier (orphan detector).
  - critical_components_have_redundancy:
      cardinality:
        entity: Component
        relationship: supplier_supplies_component
        direction: in
        min: 2
      description: Critical components should have at least two supplier options (single-source flag).
  - name: components_have_kind
    kind: property
    description: Every component should declare whether it is a raw material or part.
    target: entity
    entity_type: Component
    property: component_kind
    rule: required
    severity: error
  - products_have_assembly_bom:
      cardinality:
        entity: Product
        relationship: assembly_part_of_product
        direction: in
        min: 1
      description: Products should have at least one top-level assembly in their BOM.
      severity: error
  - supplier_risk_attachments_have_basis:
      property: risk_attaches_to_supplier.impact_basis
      rule: non_empty

# ─── Contracts ───────────────────────────────────────────────────────
#
# Deliberately thin (type: json + prose row contracts) after the compact
# rewrite: the 1,100-line json_schema catalog validated shapes the providers
# already own. Providers document and enforce their row shapes; descriptions
# here name the required keys.

contracts:
  EmptyInput:
    fields: {}

  SupplyChainSeedData:
    description: >
      Base-world rows from the seed bundle. suppliers[supplier_id, name,
      primary_geography, tier_hint]; components[component_id, name,
      component_kind, manufacturer?, mpn?, revision, lifecycle_status,
      criticality, category]; assemblies/products/shipments and the edge
      tables mirror the relationship properties one-to-one.
    fields:
      suppliers: {type: json}
      components: {type: json}
      assemblies: {type: json}
      products: {type: json}
      shipments: {type: json}
      supplier_supplies_component: {type: json}
      supplier_supplies_assembly: {type: json}
      component_part_of_assembly: {type: json}
      assembly_part_of_assembly: {type: json}
      assembly_part_of_product: {type: json}
      product_in_shipment: {type: json}

  IncidentFeedData:
    description: >
      Incident rows[incident_id, title, severity, scope_type, scope_id,
      status, reported_at, closed_at (null when open), summary (nullable)].
    fields:
      incidents: {type: json}

  InventoryFetchInput:
    description: Optional filters for the inventory source; empty means everything current.
    fields:
      item_ids: {type: json, optional: true, default: []}
      item_types: {type: json, optional: true, default: []}
      location_ids: {type: json, optional: true, default: []}
      as_of: {type: string, optional: true, default: ""}

  InventoryFetchResults:
    description: >
      locations[location_id, name, location_type, geography];
      inventory_positions[inventory_position_id, item_type, item_id,
      location_id, quantity_on_hand?, quantity_allocated?, net_available,
      unit_of_measure, as_of]; plus the four edge tables keyed by their
      endpoint ids.
    fields:
      locations: {type: json}
      inventory_positions: {type: json}
      component_inventory_positions: {type: json}
      assembly_inventory_positions: {type: json}
      product_inventory_positions: {type: json}
      inventory_position_locations: {type: json}

  BufferCoverageRefreshInput:
    fields:
      demand_context: {type: json, optional: true, default: {}}

  BufferAssessmentInput:
    description: Entity and edge rows (query-result shaped) for coverage math, plus optional demand context.
    fields:
      components: {type: json}
      assemblies: {type: json}
      products: {type: json}
      inventory_positions: {type: json}
      component_inventory_position_edges: {type: json}
      assembly_inventory_position_edges: {type: json}
      component_part_of_assembly_edges: {type: json}
      assembly_part_of_assembly_edges: {type: json}
      assembly_part_of_product_edges: {type: json}
      demand_context: {type: json, optional: true}

  BufferAssessmentResults:
    description: >
      buffer_assessments rows mirror the BufferAssessment properties; the
      four edge tables key assessed items, products, and inventory evidence.
    fields:
      buffer_assessments: {type: json}
      component_buffer_assessments: {type: json}
      assembly_buffer_assessments: {type: json}
      product_buffer_assessments: {type: json}
      buffer_assessment_inventory: {type: json}

  IncidentScopeAssessmentInput:
    fields:
      incidents: {type: json}
      suppliers: {type: json}

  IncidentScopeAssessmentResults:
    description: items[incident_id, supplier_id, match_basis, rationale, verdict].
    fields:
      items: {type: json}

  IncidentComponentCascadeInput:
    fields:
      impacted_supplier_edges: {type: json}
      supplier_supplies_component_edges: {type: json}
      components: {type: json}

  IncidentComponentCascadeResults:
    description: items[incident_id, component_id, alternate_state, rationale, verdict].
    fields:
      items: {type: json}

  IncidentAssemblyCascadeInput:
    fields:
      impacted_supplier_edges: {type: json}
      supplier_supplies_assembly_edges: {type: json}
      assemblies: {type: json}

  IncidentAssemblyCascadeResults:
    description: items[incident_id, assembly_id, impacted_supplier_id, alternate_state, rationale, verdict].
    fields:
      items: {type: json}

  IncidentProductExposureInput:
    description: Accepted impact edges, BOM edges, buffer context, and catalog entities for derived product exposure.
    fields:
      impacted_component_edges: {type: json}
      impacted_assembly_edges: {type: json}
      component_part_of_assembly_edges: {type: json}
      assembly_part_of_assembly_edges: {type: json}
      assembly_part_of_product_edges: {type: json}
      buffer_assessments: {type: json}
      component_buffer_assessment_edges: {type: json}
      assembly_buffer_assessment_edges: {type: json}
      product_buffer_assessment_edges: {type: json}
      assemblies: {type: json}
      products: {type: json}

  IncidentProductExposureResults:
    description: items[incident_id, product_id, bom_depth_bucket, buffer_state, exposure_basis, exposure_path_summary, contributing_path_count, rationale, verdict].
    fields:
      items: {type: json}

artifacts:
  supply_chain_seed_bundle:
    kind: directory
    uri: ./data/seed
    digest: sha256:9915f747ad2696e38c9c5047251245e4f7c2ff31c81bec8c8ac9a6f1fe41889a
    metadata:
      description: >
        Seed bundle: real open-hardware BOM (components with manufacturer/mpn,
        nested assemblies, product) with fictional suppliers in real
        geographies, plus incidents, inventory fixture, and demand context.

providers:
  load_supply_chain_seed_data:
    description: Load base-world entities and deterministic edges from the seed bundle.
    contract_in: EmptyInput
    contract_out: SupplyChainSeedData
    ref: kit://providers/supply_chain_blast_radius.py::load_seed_data
    version: "1.0.0"
    deterministic: true
    artifact: supply_chain_seed_bundle

  load_incident_feed:
    description: Load incident records from the bundled feed for ingestion as Incident entities.
    contract_in: EmptyInput
    contract_out: IncidentFeedData
    ref: kit://providers/supply_chain_blast_radius.py::load_incident_feed
    version: "1.0.0"
    deterministic: true
    artifact: supply_chain_seed_bundle

  assess_incident_supplier_scope:
    description: Match each open incident's scope to suppliers via direct or geography basis.
    contract_in: IncidentScopeAssessmentInput
    contract_out: IncidentScopeAssessmentResults
    ref: kit://providers/supply_chain_blast_radius.py::assess_incident_supplier_scope
    version: "1.0.0"
    deterministic: true

  fetch_inventory_positions:
    description: >
      Fetch inventory positions from an internal inventory API using
      provider-managed auth. When base_url is null (the default), reads the
      bundled inventory fixture instead — the offline/demo mode.
    contract_in: InventoryFetchInput
    contract_out: InventoryFetchResults
    ref: kit://providers/supply_chain_blast_radius.py::fetch_inventory_positions
    version: "1.0.0"
    deterministic: false
    side_effects: false
    config:
      base_url: null
      timeout_s: 20

  assess_buffer_coverage:
    description: Compute reusable buffer coverage assessments from inventory, BOM, and demand context.
    contract_in: BufferAssessmentInput
    contract_out: BufferAssessmentResults
    ref: kit://providers/supply_chain_blast_radius.py::assess_buffer_coverage
    version: "1.0.0"
    deterministic: true

  assess_incident_component_cascade:
    description: Cascade impacted suppliers to components, downgrading where viable alternate sourcing exists.
    contract_in: IncidentComponentCascadeInput
    contract_out: IncidentComponentCascadeResults
    ref: kit://providers/supply_chain_blast_radius.py::assess_incident_component_cascade
    version: "1.0.0"
    deterministic: true

  assess_incident_assembly_cascade:
    description: Cascade impacted suppliers to directly supplied assemblies, downgrading where viable alternate sourcing exists.
    contract_in: IncidentAssemblyCascadeInput
    contract_out: IncidentAssemblyCascadeResults
    ref: kit://providers/supply_chain_blast_radius.py::assess_incident_assembly_cascade
    version: "1.0.0"
    deterministic: true

  assess_incident_product_exposure:
    description: Roll accepted impacts through the BOM hierarchy to derived product exposure context.
    contract_in: IncidentProductExposureInput
    contract_out: IncidentProductExposureResults
    ref: kit://providers/supply_chain_blast_radius.py::assess_incident_product_exposure
    version: "1.0.0"
    deterministic: true

workflows:

  build_seed_state:
    type: canonical
    description: Load base-world suppliers, components, assemblies, products, shipments, and deterministic edges.
    contract_in: EmptyInput
    steps:
      - id: seed
        provider: load_supply_chain_seed_data
        input: {}
        as: seed

      # --- Entities ---
      - id: suppliers
        make_entities:
          entity_type: Supplier
          items: $steps.seed.suppliers
          entity_id: $item.supplier_id
          properties: auto
        as: suppliers
      - id: components
        make_entities:
          entity_type: Component
          items: $steps.seed.components
          entity_id: $item.component_id
          properties: auto
        as: components
      - id: assemblies
        make_entities:
          entity_type: Assembly
          items: $steps.seed.assemblies
          entity_id: $item.assembly_id
          properties: auto
        as: assemblies
      - id: products
        make_entities:
          entity_type: Product
          items: $steps.seed.products
          entity_id: $item.product_id
          properties: auto
        as: products
      - id: shipments
        make_entities:
          entity_type: Shipment
          items: $steps.seed.shipments
          entity_id: $item.shipment_id
          properties: auto
        as: shipments

      # --- Relationships ---
      - id: supplies_edges
        make_relationships:
          relationship_type: supplier_supplies_component
          items: $steps.seed.supplier_supplies_component
          from_type: Supplier
          from_id: $item.supplier_id
          to_type: Component
          to_id: $item.component_id
          properties: auto
        as: supplies_edges
      - id: assembly_supply_edges
        make_relationships:
          relationship_type: supplier_supplies_assembly
          items: $steps.seed.supplier_supplies_assembly
          from_type: Supplier
          from_id: $item.supplier_id
          to_type: Assembly
          to_id: $item.assembly_id
          properties: auto
        as: assembly_supply_edges
      - id: component_assembly_edges
        make_relationships:
          relationship_type: component_part_of_assembly
          items: $steps.seed.component_part_of_assembly
          from_type: Component
          from_id: $item.component_id
          to_type: Assembly
          to_id: $item.assembly_id
          properties: auto
        as: component_assembly_edges
      - id: assembly_recursive_edges
        make_relationships:
          relationship_type: assembly_part_of_assembly
          items: $steps.seed.assembly_part_of_assembly
          from_type: Assembly
          from_id: $item.child_assembly_id
          to_type: Assembly
          to_id: $item.parent_assembly_id
          properties: auto
        as: assembly_recursive_edges
      - id: assembly_product_edges
        make_relationships:
          relationship_type: assembly_part_of_product
          items: $steps.seed.assembly_part_of_product
          from_type: Assembly
          from_id: $item.assembly_id
          to_type: Product
          to_id: $item.product_id
          properties: auto
        as: assembly_product_edges
      - id: shipment_edges
        make_relationships:
          relationship_type: product_in_shipment
          items: $steps.seed.product_in_shipment
          from_type: Product
          from_id: $item.product_id
          to_type: Shipment
          to_id: $item.shipment_id
          properties: auto
        as: shipment_edges

      # --- Apply ---
      - id: apply_suppliers
        apply_entities:
          entities_from: suppliers
        as: apply_suppliers
      - id: apply_components
        apply_entities:
          entities_from: components
        as: apply_components
      - id: apply_assemblies
        apply_entities:
          entities_from: assemblies
        as: apply_assemblies
      - id: apply_products
        apply_entities:
          entities_from: products
        as: apply_products
      - id: apply_shipments
        apply_entities:
          entities_from: shipments
        as: apply_shipments
      - id: apply_supplies
        apply_relationships:
          relationships_from: supplies_edges
        as: apply_supplies
      - id: apply_assembly_supply
        apply_relationships:
          relationships_from: assembly_supply_edges
        as: apply_assembly_supply
      - id: apply_component_assembly
        apply_relationships:
          relationships_from: component_assembly_edges
        as: apply_component_assembly
      - id: apply_assembly_recursive
        apply_relationships:
          relationships_from: assembly_recursive_edges
        as: apply_assembly_recursive
      - id: apply_assembly_product
        apply_relationships:
          relationships_from: assembly_product_edges
        as: apply_assembly_product
      - id: apply_shipment_edges
        apply_relationships:
          relationships_from: shipment_edges
        as: apply_shipment_edges
    returns: apply_shipment_edges

  ingest_incidents:
    type: canonical
    description: >
      Load incident records arriving from an external incident feed and apply them
      as Incident entities. Incidents arrive over time rather than in the base seed;
      this is their canonical creation path before the governed incident cascade runs.
    contract_in: EmptyInput
    steps:
      - id: feed
        provider: load_incident_feed
        input: {}
        as: feed
      - id: incidents
        make_entities:
          entity_type: Incident
          items: $steps.feed.incidents
          entity_id: $item.incident_id
          properties: auto
        as: incidents
      - id: apply_incidents
        apply_entities:
          entities_from: incidents
        as: apply_incidents
    returns: apply_incidents

  sync_inventory_positions:
    type: canonical
    description: Apply fetched or curated inventory positions and their locations into graph state.
    contract_in: InventoryFetchResults
    steps:
      - id: locations
        make_entities:
          entity_type: Location
          items: $input.locations
          entity_id: $item.location_id
          properties: auto
        as: locations
      - id: inventory_positions
        make_entities:
          entity_type: InventoryPosition
          items: $input.inventory_positions
          entity_id: $item.inventory_position_id
          properties: auto
        as: inventory_positions
      - id: component_inventory_edges
        make_relationships:
          relationship_type: component_inventory_position
          items: $input.component_inventory_positions
          from_type: Component
          from_id: $item.component_id
          to_type: InventoryPosition
          to_id: $item.inventory_position_id
        as: component_inventory_edges
      - id: assembly_inventory_edges
        make_relationships:
          relationship_type: assembly_inventory_position
          items: $input.assembly_inventory_positions
          from_type: Assembly
          from_id: $item.assembly_id
          to_type: InventoryPosition
          to_id: $item.inventory_position_id
        as: assembly_inventory_edges
      - id: product_inventory_edges
        make_relationships:
          relationship_type: product_inventory_position
          items: $input.product_inventory_positions
          from_type: Product
          from_id: $item.product_id
          to_type: InventoryPosition
          to_id: $item.inventory_position_id
        as: product_inventory_edges
      - id: inventory_location_edges
        make_relationships:
          relationship_type: inventory_position_location
          items: $input.inventory_position_locations
          from_type: InventoryPosition
          from_id: $item.inventory_position_id
          to_type: Location
          to_id: $item.location_id
        as: inventory_location_edges
      - id: apply_locations
        apply_entities:
          entities_from: locations
        as: apply_locations
      - id: apply_inventory_positions
        apply_entities:
          entities_from: inventory_positions
        as: apply_inventory_positions
      - id: apply_component_inventory
        apply_relationships:
          relationships_from: component_inventory_edges
        as: apply_component_inventory
      - id: apply_assembly_inventory
        apply_relationships:
          relationships_from: assembly_inventory_edges
        as: apply_assembly_inventory
      - id: apply_product_inventory
        apply_relationships:
          relationships_from: product_inventory_edges
        as: apply_product_inventory
      - id: apply_inventory_locations
        apply_relationships:
          relationships_from: inventory_location_edges
        as: apply_inventory_locations
    returns: apply_inventory_locations

  sync_product_buffer_assessments:
    type: canonical
    description: Apply reviewed buffer coverage assessments into graph state.
    contract_in: BufferAssessmentResults
    steps:
      - id: buffer_assessments
        make_entities:
          entity_type: BufferAssessment
          items: $input.buffer_assessments
          entity_id: $item.buffer_assessment_id
          properties: auto
        as: buffer_assessments
      - id: component_buffer_edges
        make_relationships:
          relationship_type: component_buffer_assessment
          items: $input.component_buffer_assessments
          from_type: Component
          from_id: $item.component_id
          to_type: BufferAssessment
          to_id: $item.buffer_assessment_id
        as: component_buffer_edges
      - id: assembly_buffer_edges
        make_relationships:
          relationship_type: assembly_buffer_assessment
          items: $input.assembly_buffer_assessments
          from_type: Assembly
          from_id: $item.assembly_id
          to_type: BufferAssessment
          to_id: $item.buffer_assessment_id
        as: assembly_buffer_edges
      - id: product_buffer_edges
        make_relationships:
          relationship_type: product_buffer_assessment
          items: $input.product_buffer_assessments
          from_type: Product
          from_id: $item.product_id
          to_type: BufferAssessment
          to_id: $item.buffer_assessment_id
        as: product_buffer_edges
      - id: buffer_inventory_edges
        make_relationships:
          relationship_type: buffer_assessment_inventory
          items: $input.buffer_assessment_inventory
          from_type: BufferAssessment
          from_id: $item.buffer_assessment_id
          to_type: InventoryPosition
          to_id: $item.inventory_position_id
        as: buffer_inventory_edges
      - id: apply_buffer_assessments
        apply_entities:
          entities_from: buffer_assessments
        as: apply_buffer_assessments
      - id: apply_component_buffers
        apply_relationships:
          relationships_from: component_buffer_edges
        as: apply_component_buffers
      - id: apply_assembly_buffers
        apply_relationships:
          relationships_from: assembly_buffer_edges
        as: apply_assembly_buffers
      - id: apply_product_buffers
        apply_relationships:
          relationships_from: product_buffer_edges
        as: apply_product_buffers
      - id: apply_buffer_inventory
        apply_relationships:
          relationships_from: buffer_inventory_edges
        as: apply_buffer_inventory
    returns: apply_buffer_inventory

  # ── Utility: live inventory API context ─────────────────────────────

  refresh_inventory_positions:
    type: utility
    description: >
      Fetch inventory positions from an internal inventory API. This is a
      utility context workflow because live API data is non-deterministic;
      provider auth is handled inside the kit-specific provider.
    contract_in: InventoryFetchInput
    steps:
      - id: inventory
        provider: fetch_inventory_positions
        input:
          item_ids: $input.item_ids
          item_types: $input.item_types
          location_ids: $input.location_ids
          as_of: $input.as_of
        as: inventory
    returns: inventory

  refresh_buffer_assessments:
    type: utility
    description: >
      Compute reusable buffer coverage assessments from current graph inventory,
      BOM, and optional demand context. Results can be used by agents or
      synced into canonical graph state through sync_product_buffer_assessments.
    contract_in: BufferCoverageRefreshInput
    steps:
      - id: components
        query:
          mode: collection
          result_shape: entity
          returns: Component
        as: components
      - id: assemblies
        query:
          mode: collection
          result_shape: entity
          returns: Assembly
        as: assemblies
      - id: products
        query:
          mode: collection
          result_shape: entity
          returns: Product
        as: products
      - id: inventory_positions
        query:
          mode: collection
          result_shape: entity
          returns: InventoryPosition
        as: inventory_positions
      - id: component_inventory
        query:
          mode: collection
          result_shape: relationship
          returns: component_inventory_position
        as: component_inventory
      - id: assembly_inventory
        query:
          mode: collection
          result_shape: relationship
          returns: assembly_inventory_position
        as: assembly_inventory
      - id: component_assembly
        query:
          mode: collection
          result_shape: relationship
          returns: component_part_of_assembly
        as: component_assembly
      - id: assembly_recursive
        query:
          mode: collection
          result_shape: relationship
          returns: assembly_part_of_assembly
        as: assembly_recursive
      - id: assembly_product
        query:
          mode: collection
          result_shape: relationship
          returns: assembly_part_of_product
        as: assembly_product
      - id: assessments
        provider: assess_buffer_coverage
        input:
          components: $steps.components.results
          assemblies: $steps.assemblies.results
          products: $steps.products.results
          inventory_positions: $steps.inventory_positions.results
          component_inventory_position_edges: $steps.component_inventory.results
          assembly_inventory_position_edges: $steps.assembly_inventory.results
          component_part_of_assembly_edges: $steps.component_assembly.results
          assembly_part_of_assembly_edges: $steps.assembly_recursive.results
          assembly_part_of_product_edges: $steps.assembly_product.results
          demand_context: $input.demand_context
        as: assessments
    returns: assessments

  # ── Stage 1: incident → supplier ───────────────────────────────────

  propose_incident_impacts_supplier:
    type: proposal
    description: >
      Match every open incident's scope to suppliers via direct supplier
      or geography basis. Bucket signature is rule-centric
      (rule_id=incident_scope_match_to_supplier), so trust accumulates
      across many incidents.
    contract_in: EmptyInput
    steps:
      - id: incidents
        query:
          mode: collection
          result_shape: entity
          returns: Incident
          where:
            result.properties.status:
              eq: open
        as: incidents
      - id: suppliers
        query:
          mode: collection
          result_shape: entity
          returns: Supplier
        as: suppliers
      - id: assessments
        provider: assess_incident_supplier_scope
        input:
          incidents: $steps.incidents.results
          suppliers: $steps.suppliers.results
        as: assessments
      - id: candidates
        make_candidates:
          relationship_type: incident_impacts_supplier
          items: $steps.assessments.items
          from_type: Incident
          from_id: $item.incident_id
          to_type: Supplier
          to_id: $item.supplier_id
          properties: auto
        as: candidates
      - id: signals
        map_signals:
          signal_source: incident_supplier_scope_match
          items: $steps.assessments.items
          from_id: $item.incident_id
          to_id: $item.supplier_id
          evidence: $item.rationale
          enum:
            path: verdict
            map:
              support: support
              unsure: unsure
              contradict: contradict
        as: signals
      - id: proposal
        propose_relationship_group:
          relationship_type: incident_impacts_supplier
          candidates_from: candidates
          signals_from: [signals]
          thesis_text: >
            Open incidents match suppliers via direct supplier or
            geography scope.
          proposed_by: agent
        as: proposal
    returns: proposal

  # ── Stage 2: supplier → component ──────────────────────────────────

  propose_incident_impacts_component:
    type: proposal
    description: >
      Cascade resolved incident_impacts_supplier edges through
      supplier_supplies_component to candidate component impacts.
      Records alternate_state to capture whether viable alternate
      sourcing exists outside incident scope.
    contract_in: EmptyInput
    steps:
      - id: impacted_supplier_edges
        query:
          mode: collection
          result_shape: relationship
          returns: incident_impacts_supplier
          where:
            source.properties.status:
              eq: open
        as: impacted_supplier_edges
      - id: supplies_edges
        query:
          mode: collection
          result_shape: relationship
          returns: supplier_supplies_component
        as: supplies_edges
      - id: components
        query:
          mode: collection
          result_shape: entity
          returns: Component
        as: components
      - id: assessments
        provider: assess_incident_component_cascade
        input:
          impacted_supplier_edges: $steps.impacted_supplier_edges.results
          supplier_supplies_component_edges: $steps.supplies_edges.results
          components: $steps.components.results
        as: assessments
      - id: candidates
        make_candidates:
          relationship_type: incident_impacts_component
          items: $steps.assessments.items
          from_type: Incident
          from_id: $item.incident_id
          to_type: Component
          to_id: $item.component_id
          properties: auto
        as: candidates
      - id: signals
        map_signals:
          signal_source: incident_component_cascade
          items: $steps.assessments.items
          from_id: $item.incident_id
          to_id: $item.component_id
          evidence: $item.rationale
          enum:
            path: verdict
            map:
              support: support
              unsure: unsure
              contradict: contradict
        as: signals
      - id: proposal
        propose_relationship_group:
          relationship_type: incident_impacts_component
          candidates_from: candidates
          signals_from: [signals]
          thesis_text: >
            Components are impacted via the supplier cascade,
            adjusted for alternate sourcing coverage.
          proposed_by: agent
        as: proposal
    returns: proposal

  # ── Stage 3: supplier → directly supplied assembly ─────────────────

  propose_incident_impacts_assembly:
    type: proposal
    description: >
      Cascade resolved incident_impacts_supplier edges through
      supplier_supplies_assembly to candidate direct assembly impacts.
      Records alternate_state to capture whether viable alternate
      sourcing exists outside incident scope.
    contract_in: EmptyInput
    steps:
      - id: impacted_supplier_edges
        query:
          mode: collection
          result_shape: relationship
          returns: incident_impacts_supplier
          where:
            source.properties.status:
              eq: open
        as: impacted_supplier_edges
      - id: assembly_supply_edges
        query:
          mode: collection
          result_shape: relationship
          returns: supplier_supplies_assembly
        as: assembly_supply_edges
      - id: assemblies
        query:
          mode: collection
          result_shape: entity
          returns: Assembly
        as: assemblies
      - id: assessments
        provider: assess_incident_assembly_cascade
        input:
          impacted_supplier_edges: $steps.impacted_supplier_edges.results
          supplier_supplies_assembly_edges: $steps.assembly_supply_edges.results
          assemblies: $steps.assemblies.results
        as: assessments
      - id: candidates
        make_candidates:
          relationship_type: incident_impacts_assembly
          items: $steps.assessments.items
          from_type: Incident
          from_id: $item.incident_id
          to_type: Assembly
          to_id: $item.assembly_id
          properties: auto
        as: candidates
      - id: signals
        map_signals:
          signal_source: incident_assembly_cascade
          items: $steps.assessments.items
          from_id: $item.incident_id
          to_id: $item.assembly_id
          evidence: $item.rationale
          enum:
            path: verdict
            map:
              support: support
              unsure: unsure
              contradict: contradict
        as: signals
      - id: proposal
        propose_relationship_group:
          relationship_type: incident_impacts_assembly
          candidates_from: candidates
          signals_from: [signals]
          thesis_text: >
            Directly supplied assemblies are impacted via the supplier
            cascade, adjusted for alternate sourcing coverage.
          proposed_by: agent
        as: proposal
    returns: proposal

  # ── Utility: upstream impact → product exposure context ─────────────

  assess_incident_product_exposure:
    type: utility
    description: >
      Roll resolved impacted components and directly impacted assemblies
      through the assembly BOM hierarchy to finished products, using
      buffer assessments as inventory coverage context. This returns
      ephemeral context for agentic product and shipment decisions; it
      does not create an incident-product edge.
    contract_in: EmptyInput
    steps:
      - id: impacted_component_edges
        query:
          mode: collection
          result_shape: relationship
          returns: incident_impacts_component
        as: impacted_component_edges
      - id: impacted_assembly_edges
        query:
          mode: collection
          result_shape: relationship
          returns: incident_impacts_assembly
        as: impacted_assembly_edges
      - id: component_assembly
        query:
          mode: collection
          result_shape: relationship
          returns: component_part_of_assembly
        as: component_assembly
      - id: assembly_recursive
        query:
          mode: collection
          result_shape: relationship
          returns: assembly_part_of_assembly
        as: assembly_recursive
      - id: assembly_product
        query:
          mode: collection
          result_shape: relationship
          returns: assembly_part_of_product
        as: assembly_product
      - id: buffer_assessments
        query:
          mode: collection
          result_shape: entity
          returns: BufferAssessment
        as: buffer_assessments
      - id: component_buffers
        query:
          mode: collection
          result_shape: relationship
          returns: component_buffer_assessment
        as: component_buffers
      - id: assembly_buffers
        query:
          mode: collection
          result_shape: relationship
          returns: assembly_buffer_assessment
        as: assembly_buffers
      - id: product_buffers
        query:
          mode: collection
          result_shape: relationship
          returns: product_buffer_assessment
        as: product_buffers
      - id: assemblies
        query:
          mode: collection
          result_shape: entity
          returns: Assembly
        as: assemblies
      - id: products
        query:
          mode: collection
          result_shape: entity
          returns: Product
        as: products
      - id: assessments
        provider: assess_incident_product_exposure
        input:
          impacted_component_edges: $steps.impacted_component_edges.results
          impacted_assembly_edges: $steps.impacted_assembly_edges.results
          component_part_of_assembly_edges: $steps.component_assembly.results
          assembly_part_of_assembly_edges: $steps.assembly_recursive.results
          assembly_part_of_product_edges: $steps.assembly_product.results
          buffer_assessments: $steps.buffer_assessments.results
          component_buffer_assessment_edges: $steps.component_buffers.results
          assembly_buffer_assessment_edges: $steps.assembly_buffers.results
          product_buffer_assessment_edges: $steps.product_buffers.results
          assemblies: $steps.assemblies.results
          products: $steps.products.results
        as: assessments
    returns: assessments

# ─── Feedback profiles ───────────────────────────────────────────────
#
# Per-relationship feedback vocabulary used when reviewers reject or
# qualify resolutions. scope_keys pull from the resolved edge's
# endpoints/properties — they are NOT bucket signature fields. Cruxible derives
# bucket signatures from workflow/proposal structure and consumed signal sources.

feedback_profiles:
  risk_attaches_to_supplier:
    version: 1
    reason_codes:
      wrong_supplier:
        description: The risk concerns a different supplier.
        remediation_hint: quality_check
        required_scope_keys: [supplier]
      risk_not_material:
        description: The risk does not materially threaten this supplier's deliveries.
        remediation_hint: decision_policy
        required_scope_keys: [supplier]
    scope_keys:
      risk: FROM.risk_id
      supplier: TO.supplier_id

  incident_impacts_supplier:
    version: 1
    reason_codes:
      wrong_supplier_scope_match:
        description: Rule matched the wrong supplier for the incident scope.
        remediation_hint: provider_fix
        required_scope_keys: [supplier, match_basis]
      geography_stale:
        description: Supplier's primary_geography was outdated; supplier is no longer in scope.
        remediation_hint: provider_fix
        required_scope_keys: [supplier, match_basis]
      supplier_recently_cleared:
        description: Supplier was cleared for a similar incident recently and should not have been re-flagged.
        remediation_hint: decision_policy
        required_scope_keys: [supplier]
    scope_keys:
      incident: FROM.incident_id
      supplier: TO.supplier_id
      match_basis: EDGE.match_basis

  incident_impacts_component:
    version: 1
    reason_codes:
      alternate_supplier_available:
        description: Component has a viable alternate supplier outside incident scope; cascade should have stopped.
        remediation_hint: provider_fix
        required_scope_keys: [component]
      component_decommissioned:
        description: Component is no longer in active use.
        remediation_hint: quality_check
        required_scope_keys: [component]
      supplier_substitution_planned:
        description: A planned substitution mitigates this cascade.
        remediation_hint: decision_policy
        required_scope_keys: [component, alternate_state]
    scope_keys:
      incident: FROM.incident_id
      component: TO.component_id
      alternate_state: EDGE.alternate_state

  incident_impacts_assembly:
    version: 1
    reason_codes:
      alternate_supplier_available:
        description: Assembly has a viable alternate supplier outside incident scope; cascade should have stopped.
        remediation_hint: provider_fix
        required_scope_keys: [assembly]
      assembly_decommissioned:
        description: Assembly is no longer in active use.
        remediation_hint: quality_check
        required_scope_keys: [assembly]
      wrong_supplier_assembly_scope:
        description: Rule matched the wrong directly supplied assembly for the impacted supplier.
        remediation_hint: provider_fix
        required_scope_keys: [assembly, impacted_supplier]
      sourcing_plan_stale:
        description: Supplier sourcing posture was stale at cascade time.
        remediation_hint: provider_fix
        required_scope_keys: [assembly, impacted_supplier]
    scope_keys:
      incident: FROM.incident_id
      assembly: TO.assembly_id
      impacted_supplier: EDGE.impacted_supplier_id
      alternate_state: EDGE.alternate_state

# ─── Outcome profiles (Loop 2) ───────────────────────────────────────
#
# Feedback profiles capture reviewer corrections before/at resolution.
# Outcome profiles capture whether accepted judgments worked downstream
# once actual supplier recovery, production, shipment, or customer impact
# is known. These are the trust-calibration inputs for the next incident.

outcome_profiles:
  incident_supplier_resolution:
    anchor_type: resolution
    relationship_type: incident_impacts_supplier
    version: 1
    outcome_codes:
      confirmed_supplier_disruption:
        description: Later operations data confirmed the supplier was materially disrupted.
        remediation_hint: trust_adjustment
        required_scope_keys: [relationship_type]
      supplier_unaffected:
        description: Later operations data showed the supplier was not materially disrupted.
        remediation_hint: require_review
        required_scope_keys: [relationship_type]
      scope_data_stale:
        description: Supplier or geography scope data was stale at resolution time.
        remediation_hint: provider_fix
        required_scope_keys: [relationship_type]
    scope_keys:
      relationship_type: RESOLUTION.relationship_type

  incident_component_resolution:
    anchor_type: resolution
    relationship_type: incident_impacts_component
    version: 1
    outcome_codes:
      confirmed_component_shortage:
        description: Later operations data confirmed component supply was constrained.
        remediation_hint: trust_adjustment
        required_scope_keys: [relationship_type]
      alternate_covered_need:
        description: Alternate sourcing prevented the predicted component impact.
        remediation_hint: require_review
        required_scope_keys: [relationship_type]
      missed_component_impact:
        description: A component impact was discovered after the proposal chain ran.
        remediation_hint: workflow_fix
        required_scope_keys: [relationship_type]
    scope_keys:
      relationship_type: RESOLUTION.relationship_type

  incident_assembly_resolution:
    anchor_type: resolution
    relationship_type: incident_impacts_assembly
    version: 1
    outcome_codes:
      confirmed_assembly_constraint:
        description: Later operations data confirmed assembly supply was constrained.
        remediation_hint: trust_adjustment
        required_scope_keys: [relationship_type]
      assembly_unaffected:
        description: The assembly remained unaffected despite the accepted impact judgment.
        remediation_hint: require_review
        required_scope_keys: [relationship_type]
      missed_assembly_impact:
        description: An assembly impact was discovered after the proposal chain ran.
        remediation_hint: workflow_fix
        required_scope_keys: [relationship_type]
    scope_keys:
      relationship_type: RESOLUTION.relationship_type

  impacted_assemblies_query:
    anchor_type: receipt
    surface_type: query
    surface_name: incident_impacted_assemblies
    version: 1
    outcome_codes:
      missing_impacted_assembly:
        description: Query omitted a directly supplied assembly later confirmed impacted.
        remediation_hint: graph_fix
        required_scope_keys: [query]
      false_positive_assembly:
        description: Query returned an assembly later confirmed not directly impacted.
        remediation_hint: graph_fix
        required_scope_keys: [query]
    scope_keys:
      query: SURFACE.name

  component_exposed_products_query:
    anchor_type: receipt
    surface_type: query
    surface_name: incident_component_exposed_products
    version: 1
    outcome_codes:
      missing_impacted_product:
        description: Component-path exposure query omitted a product later confirmed to be impacted.
        remediation_hint: graph_fix
        required_scope_keys: [query]
      false_positive_product:
        description: Component-path exposure query returned a product later confirmed to be unaffected.
        remediation_hint: graph_fix
        required_scope_keys: [query]
    scope_keys:
      query: SURFACE.name

  direct_assembly_exposed_products_query:
    anchor_type: receipt
    surface_type: query
    surface_name: incident_direct_assembly_exposed_products
    version: 1
    outcome_codes:
      missing_impacted_product:
        description: Direct-assembly exposure query omitted a product later confirmed to be impacted.
        remediation_hint: graph_fix
        required_scope_keys: [query]
      false_positive_product:
        description: Direct-assembly exposure query returned a product later confirmed to be unaffected.
        remediation_hint: graph_fix
        required_scope_keys: [query]
    scope_keys:
      query: SURFACE.name

  nested_assembly_exposed_products_query:
    anchor_type: receipt
    surface_type: query
    surface_name: incident_nested_assembly_exposed_products
    version: 1
    outcome_codes:
      missing_impacted_product:
        description: Nested-assembly exposure query omitted a product later confirmed to be impacted.
        remediation_hint: graph_fix
        required_scope_keys: [query]
      false_positive_product:
        description: Nested-assembly exposure query returned a product later confirmed to be unaffected.
        remediation_hint: graph_fix
        required_scope_keys: [query]
    scope_keys:
      query: SURFACE.name

  exposed_shipments_query:
    anchor_type: receipt
    surface_type: query
    surface_name: incident_exposed_shipments
    version: 1
    outcome_codes:
      missing_impacted_shipment:
        description: Terminal shipment exposure query omitted a shipment later confirmed to be impacted.
        remediation_hint: graph_fix
        required_scope_keys: [query]
      false_positive_shipment:
        description: Terminal shipment exposure query returned a shipment later confirmed to be unaffected.
        remediation_hint: graph_fix
        required_scope_keys: [query]
    scope_keys:
      query: SURFACE.name

  # Loop 2 for the reusable buffer judgment. BufferAssessment is produced by the
  # refresh_buffer_assessments workflow (buffer_state + rationale are graded), not a
  # governed edge — so it has no resolution to anchor on and no relationship-scoped
  # feedback profile. Calibration is receipt-anchored on the workflow surface: did the
  # buffer-state call hold once real consumption and recovery played out?
  buffer_assessment_refresh:
    anchor_type: receipt
    surface_type: workflow
    surface_name: refresh_buffer_assessments
    version: 1
    outcome_codes:
      buffer_held:
        description: Assessment called sufficient_buffer and inventory did in fact cover demand through the horizon.
        remediation_hint: trust_adjustment
        required_scope_keys: [surface]
      buffer_ran_out:
        description: Assessment looked sufficient or partial but the item ran out before the coverage horizon.
        remediation_hint: provider_fix
        required_scope_keys: [surface]
      consumption_rate_wrong:
        description: Actual consumption diverged materially from the estimated_consumption_rate, miscalling coverage_duration.
        remediation_hint: provider_fix
        required_scope_keys: [surface]
      overstated_shortfall:
        description: Assessment called no_buffer or partial_buffer but on-hand inventory comfortably covered demand.
        remediation_hint: require_review
        required_scope_keys: [surface]
    scope_keys:
      surface: SURFACE.name

  # Loop 2 for the rich derived product-exposure judgment. assess_incident_product_exposure
  # emits verdict / bom_depth_bucket / buffer_state / exposure_basis as ephemeral context
  # (not a governed edge), so calibration is receipt-anchored on the workflow surface: did
  # the derived product-exposure call match what actually happened to the product?
  product_exposure_assessment:
    anchor_type: receipt
    surface_type: workflow
    surface_name: assess_incident_product_exposure
    version: 1
    outcome_codes:
      confirmed_product_exposure:
        description: Product flagged exposed was in fact materially affected by the incident.
        remediation_hint: trust_adjustment
        required_scope_keys: [surface]
      product_unaffected:
        description: Product flagged exposed turned out unaffected once buffer and BOM reality played out.
        remediation_hint: require_review
        required_scope_keys: [surface]
      missed_product_exposure:
        description: A product later confirmed exposed was not surfaced by the exposure assessment.
        remediation_hint: workflow_fix
        required_scope_keys: [surface]
      buffer_state_misread:
        description: The buffer_state attributed to the product was wrong, flipping the exposure conclusion.
        remediation_hint: provider_fix
        required_scope_keys: [surface]
      bom_depth_miscount:
        description: The bom_depth_bucket was wrong, mis-weighting the exposure path.
        remediation_hint: provider_fix
        required_scope_keys: [surface]
    scope_keys:
      surface: SURFACE.name
