# ─── Artifacts ───────────────────────────────────────────────────────
#
# The seed bundle is a placeholder artifact until real seed CSVs are authored.
# It keeps the canonical seed workflow structurally valid while making the
# missing provider/data implementation explicit.

artifacts:
  supply_chain_seed_bundle:
    kind: directory
    uri: ./data/seed
    sha256: sha256:9915f747ad2696e38c9c5047251245e4f7c2ff31c81bec8c8ac9a6f1fe41889a

# ─── Providers ───────────────────────────────────────────────────────
#
# Providers include deterministic seed/cascade assessors plus a
# kit-specific inventory API adapter. The inventory fetch is non-deterministic
# operational evidence and reads auth inside the provider implementation, not
# from workflow payloads.

providers:
  load_supply_chain_seed_data:
    description: Load all base-world entities and deterministic edges from the seed bundle.
    contract_in: EmptyInput
    contract_out: SupplyChainSeedData
    ref: kit://providers/supply_chain_blast_radius.py::load_seed_data
    version: "1.0.0"
    deterministic: true
    artifact: supply_chain_seed_bundle

  assess_incident_supplier_scope:
    description: Match each open incident's scope to suppliers via direct supplier or geography basis.
    contract_in: IncidentScopeAssessmentInput
    contract_out: IncidentScopeAssessmentResults
    ref: kit://providers/supply_chain_blast_radius.py::assess_incident_supplier_scope
    version: "1.0.0"
    deterministic: true

  fetch_inventory_positions:
    description: Fetch inventory positions from an internal inventory API using provider-managed auth.
    contract_in: InventoryFetchInput
    contract_out: InventoryFetchResults
    ref: kit://providers/supply_chain_blast_radius.py::fetch_inventory_positions
    version: "1.0.0"
    deterministic: false
    side_effects: false
    config:
      base_url: null
      timeout_s: 20

  assess_buffer_coverage:
    description: Compute reusable buffer coverage assessments from inventory, BOM, and demand context.
    contract_in: BufferAssessmentInput
    contract_out: BufferAssessmentResults
    ref: kit://providers/supply_chain_blast_radius.py::assess_buffer_coverage
    version: "1.0.0"
    deterministic: true

  assess_incident_component_cascade:
    description: Cascade impacted suppliers to components, downgrading where viable alternate sourcing exists.
    contract_in: IncidentComponentCascadeInput
    contract_out: IncidentComponentCascadeResults
    ref: kit://providers/supply_chain_blast_radius.py::assess_incident_component_cascade
    version: "1.0.0"
    deterministic: true

  assess_incident_assembly_cascade:
    description: Cascade impacted suppliers to directly supplied assemblies, downgrading where viable alternate sourcing exists.
    contract_in: IncidentAssemblyCascadeInput
    contract_out: IncidentAssemblyCascadeResults
    ref: kit://providers/supply_chain_blast_radius.py::assess_incident_assembly_cascade
    version: "1.0.0"
    deterministic: true

  assess_incident_product_exposure:
    description: Roll impacted components and directly impacted assemblies through assembly BOM hierarchy to derived product exposure context.
    contract_in: IncidentProductExposureInput
    contract_out: IncidentProductExposureResults
    ref: kit://providers/supply_chain_blast_radius.py::assess_incident_product_exposure
    version: "1.0.0"
    deterministic: true

# ─── Workflows ───────────────────────────────────────────────────────
#
# Workflows include canonical graph syncs, three governed propose stages,
# and utility context refresh/assessment stages. Governed propose workflows
# are contract_in: EmptyInput and operate on the current graph state
# (KEV pattern). Operators run them in order; the skill orchestrates and
# pauses for human review between governed stages.

workflows:

  build_seed_state:
    type: canonical
    description: Load base-world suppliers, components, assemblies, products, shipments, and deterministic edges.
    contract_in: EmptyInput
    steps:
      - id: seed
        provider: load_supply_chain_seed_data
        input: {}
        as: seed

      # --- Entities ---
      - id: suppliers
        make_entities:
          entity_type: Supplier
          items: $steps.seed.suppliers
          entity_id: $item.supplier_id
          properties:
            supplier_id: $item.supplier_id
            name: $item.name
            primary_geography: $item.primary_geography
            tier_hint: $item.tier_hint
        as: suppliers
      - id: components
        make_entities:
          entity_type: Component
          items: $steps.seed.components
          entity_id: $item.component_id
          properties:
            component_id: $item.component_id
            name: $item.name
            component_kind: $item.component_kind
            revision: $item.revision
            lifecycle_status: $item.lifecycle_status
            criticality: $item.criticality
            category: $item.category
        as: components
      - id: assemblies
        make_entities:
          entity_type: Assembly
          items: $steps.seed.assemblies
          entity_id: $item.assembly_id
          properties:
            assembly_id: $item.assembly_id
            name: $item.name
            revision: $item.revision
            lifecycle_status: $item.lifecycle_status
            criticality: $item.criticality
            category: $item.category
        as: assemblies
      - id: products
        make_entities:
          entity_type: Product
          items: $steps.seed.products
          entity_id: $item.product_id
          properties:
            product_id: $item.product_id
            sku: $item.sku
            name: $item.name
            lifecycle_status: $item.lifecycle_status
        as: products
      - id: shipments
        make_entities:
          entity_type: Shipment
          items: $steps.seed.shipments
          entity_id: $item.shipment_id
          properties:
            shipment_id: $item.shipment_id
            customer_id: $item.customer_id
            status: $item.status
            ship_date: $item.ship_date
            eta: $item.eta
        as: shipments

      # --- Relationships ---
      - id: supplies_edges
        make_relationships:
          relationship_type: supplier_supplies_component
          items: $steps.seed.supplier_supplies_component
          from_type: Supplier
          from_id: $item.supplier_id
          to_type: Component
          to_id: $item.component_id
          properties:
            lead_time_days: $item.lead_time_days
            qualification_status: $item.qualification_status
            sourcing_role: $item.sourcing_role
            priority_rank: $item.priority_rank
            allocation_pct: $item.allocation_pct
            activation_state: $item.activation_state
            capacity_units_per_week: $item.capacity_units_per_week
            effective_from: $item.effective_from
            effective_to: $item.effective_to
            last_verified_at: $item.last_verified_at
        as: supplies_edges
      - id: assembly_supply_edges
        make_relationships:
          relationship_type: supplier_supplies_assembly
          items: $steps.seed.supplier_supplies_assembly
          from_type: Supplier
          from_id: $item.supplier_id
          to_type: Assembly
          to_id: $item.assembly_id
          properties:
            lead_time_days: $item.lead_time_days
            qualification_status: $item.qualification_status
            sourcing_role: $item.sourcing_role
            priority_rank: $item.priority_rank
            allocation_pct: $item.allocation_pct
            activation_state: $item.activation_state
            capacity_units_per_week: $item.capacity_units_per_week
            effective_from: $item.effective_from
            effective_to: $item.effective_to
            last_verified_at: $item.last_verified_at
        as: assembly_supply_edges
      - id: component_assembly_edges
        make_relationships:
          relationship_type: component_part_of_assembly
          items: $steps.seed.component_part_of_assembly
          from_type: Component
          from_id: $item.component_id
          to_type: Assembly
          to_id: $item.assembly_id
          properties:
            quantity: $item.quantity
            bom_variant_id: $item.bom_variant_id
            plant_id: $item.plant_id
            effective_from: $item.effective_from
            effective_to: $item.effective_to
        as: component_assembly_edges
      - id: assembly_recursive_edges
        make_relationships:
          relationship_type: assembly_part_of_assembly
          items: $steps.seed.assembly_part_of_assembly
          from_type: Assembly
          from_id: $item.child_assembly_id
          to_type: Assembly
          to_id: $item.parent_assembly_id
          properties:
            quantity: $item.quantity
            bom_variant_id: $item.bom_variant_id
            plant_id: $item.plant_id
            effective_from: $item.effective_from
            effective_to: $item.effective_to
        as: assembly_recursive_edges
      - id: assembly_product_edges
        make_relationships:
          relationship_type: assembly_part_of_product
          items: $steps.seed.assembly_part_of_product
          from_type: Assembly
          from_id: $item.assembly_id
          to_type: Product
          to_id: $item.product_id
          properties:
            quantity: $item.quantity
            bom_variant_id: $item.bom_variant_id
            plant_id: $item.plant_id
            effective_from: $item.effective_from
            effective_to: $item.effective_to
        as: assembly_product_edges
      - id: shipment_edges
        make_relationships:
          relationship_type: product_in_shipment
          items: $steps.seed.product_in_shipment
          from_type: Product
          from_id: $item.product_id
          to_type: Shipment
          to_id: $item.shipment_id
          properties:
            qty: $item.qty
        as: shipment_edges

      # --- Apply ---
      - id: apply_suppliers
        apply_entities:
          entities_from: suppliers
        as: apply_suppliers
      - id: apply_components
        apply_entities:
          entities_from: components
        as: apply_components
      - id: apply_assemblies
        apply_entities:
          entities_from: assemblies
        as: apply_assemblies
      - id: apply_products
        apply_entities:
          entities_from: products
        as: apply_products
      - id: apply_shipments
        apply_entities:
          entities_from: shipments
        as: apply_shipments
      - id: apply_supplies
        apply_relationships:
          relationships_from: supplies_edges
        as: apply_supplies
      - id: apply_assembly_supply
        apply_relationships:
          relationships_from: assembly_supply_edges
        as: apply_assembly_supply
      - id: apply_component_assembly
        apply_relationships:
          relationships_from: component_assembly_edges
        as: apply_component_assembly
      - id: apply_assembly_recursive
        apply_relationships:
          relationships_from: assembly_recursive_edges
        as: apply_assembly_recursive
      - id: apply_assembly_product
        apply_relationships:
          relationships_from: assembly_product_edges
        as: apply_assembly_product
      - id: apply_shipment_edges
        apply_relationships:
          relationships_from: shipment_edges
        as: apply_shipment_edges
    returns: apply_shipment_edges

  sync_inventory_positions:
    type: canonical
    description: Apply fetched or curated inventory positions and their locations into graph state.
    contract_in: InventoryFetchResults
    steps:
      - id: locations
        make_entities:
          entity_type: Location
          items: $input.locations
          entity_id: $item.location_id
          properties:
            location_id: $item.location_id
            name: $item.name
            location_type: $item.location_type
            geography: $item.geography
        as: locations
      - id: inventory_positions
        make_entities:
          entity_type: InventoryPosition
          items: $input.inventory_positions
          entity_id: $item.inventory_position_id
          properties:
            inventory_position_id: $item.inventory_position_id
            item_type: $item.item_type
            item_id: $item.item_id
            location_id: $item.location_id
            quantity_on_hand: $item.quantity_on_hand
            quantity_allocated: $item.quantity_allocated
            net_available: $item.net_available
            unit_of_measure: $item.unit_of_measure
            as_of: $item.as_of
        as: inventory_positions
      - id: component_inventory_edges
        make_relationships:
          relationship_type: component_inventory_position
          items: $input.component_inventory_positions
          from_type: Component
          from_id: $item.component_id
          to_type: InventoryPosition
          to_id: $item.inventory_position_id
        as: component_inventory_edges
      - id: assembly_inventory_edges
        make_relationships:
          relationship_type: assembly_inventory_position
          items: $input.assembly_inventory_positions
          from_type: Assembly
          from_id: $item.assembly_id
          to_type: InventoryPosition
          to_id: $item.inventory_position_id
        as: assembly_inventory_edges
      - id: product_inventory_edges
        make_relationships:
          relationship_type: product_inventory_position
          items: $input.product_inventory_positions
          from_type: Product
          from_id: $item.product_id
          to_type: InventoryPosition
          to_id: $item.inventory_position_id
        as: product_inventory_edges
      - id: inventory_location_edges
        make_relationships:
          relationship_type: inventory_position_location
          items: $input.inventory_position_locations
          from_type: InventoryPosition
          from_id: $item.inventory_position_id
          to_type: Location
          to_id: $item.location_id
        as: inventory_location_edges
      - id: apply_locations
        apply_entities:
          entities_from: locations
        as: apply_locations
      - id: apply_inventory_positions
        apply_entities:
          entities_from: inventory_positions
        as: apply_inventory_positions
      - id: apply_component_inventory
        apply_relationships:
          relationships_from: component_inventory_edges
        as: apply_component_inventory
      - id: apply_assembly_inventory
        apply_relationships:
          relationships_from: assembly_inventory_edges
        as: apply_assembly_inventory
      - id: apply_product_inventory
        apply_relationships:
          relationships_from: product_inventory_edges
        as: apply_product_inventory
      - id: apply_inventory_locations
        apply_relationships:
          relationships_from: inventory_location_edges
        as: apply_inventory_locations
    returns: apply_inventory_locations

  sync_product_buffer_assessments:
    type: canonical
    description: Apply reviewed buffer coverage assessments into graph state.
    contract_in: BufferAssessmentResults
    steps:
      - id: buffer_assessments
        make_entities:
          entity_type: BufferAssessment
          items: $input.buffer_assessments
          entity_id: $item.buffer_assessment_id
          properties:
            buffer_assessment_id: $item.buffer_assessment_id
            item_type: $item.item_type
            item_id: $item.item_id
            product_id: $item.product_id
            bom_variant_id: $item.bom_variant_id
            net_available: $item.net_available
            required_per_unit: $item.required_per_unit
            open_demand_units: $item.open_demand_units
            estimated_consumption_rate: $item.estimated_consumption_rate
            rate_period: $item.rate_period
            coverage_duration: $item.coverage_duration
            coverage_unit: $item.coverage_unit
            horizon_duration: $item.horizon_duration
            horizon_unit: $item.horizon_unit
            buffer_state: $item.buffer_state
            unit_of_measure: $item.unit_of_measure
            as_of: $item.as_of
            rationale: $item.rationale
        as: buffer_assessments
      - id: component_buffer_edges
        make_relationships:
          relationship_type: component_buffer_assessment
          items: $input.component_buffer_assessments
          from_type: Component
          from_id: $item.component_id
          to_type: BufferAssessment
          to_id: $item.buffer_assessment_id
        as: component_buffer_edges
      - id: assembly_buffer_edges
        make_relationships:
          relationship_type: assembly_buffer_assessment
          items: $input.assembly_buffer_assessments
          from_type: Assembly
          from_id: $item.assembly_id
          to_type: BufferAssessment
          to_id: $item.buffer_assessment_id
        as: assembly_buffer_edges
      - id: product_buffer_edges
        make_relationships:
          relationship_type: product_buffer_assessment
          items: $input.product_buffer_assessments
          from_type: Product
          from_id: $item.product_id
          to_type: BufferAssessment
          to_id: $item.buffer_assessment_id
        as: product_buffer_edges
      - id: buffer_inventory_edges
        make_relationships:
          relationship_type: buffer_assessment_inventory
          items: $input.buffer_assessment_inventory
          from_type: BufferAssessment
          from_id: $item.buffer_assessment_id
          to_type: InventoryPosition
          to_id: $item.inventory_position_id
        as: buffer_inventory_edges
      - id: apply_buffer_assessments
        apply_entities:
          entities_from: buffer_assessments
        as: apply_buffer_assessments
      - id: apply_component_buffers
        apply_relationships:
          relationships_from: component_buffer_edges
        as: apply_component_buffers
      - id: apply_assembly_buffers
        apply_relationships:
          relationships_from: assembly_buffer_edges
        as: apply_assembly_buffers
      - id: apply_product_buffers
        apply_relationships:
          relationships_from: product_buffer_edges
        as: apply_product_buffers
      - id: apply_buffer_inventory
        apply_relationships:
          relationships_from: buffer_inventory_edges
        as: apply_buffer_inventory
    returns: apply_buffer_inventory

  # ── Utility: live inventory API context ─────────────────────────────

  refresh_inventory_positions:
    type: utility
    description: >
      Fetch inventory positions from an internal inventory API. This is a
      utility context workflow because live API data is non-deterministic;
      provider auth is handled inside the kit-specific provider.
    contract_in: InventoryFetchInput
    steps:
      - id: inventory
        provider: fetch_inventory_positions
        input:
          item_ids: $input.item_ids
          item_types: $input.item_types
          location_ids: $input.location_ids
          as_of: $input.as_of
        as: inventory
    returns: inventory

  refresh_buffer_assessments:
    type: utility
    description: >
      Compute reusable buffer coverage assessments from current graph inventory,
      BOM, and optional demand context. Results can be used by agents or
      synced into canonical graph state through sync_product_buffer_assessments.
    contract_in: BufferCoverageRefreshInput
    steps:
      - id: components
        list_entities:
          entity_type: Component
        as: components
      - id: assemblies
        list_entities:
          entity_type: Assembly
        as: assemblies
      - id: products
        list_entities:
          entity_type: Product
        as: products
      - id: inventory_positions
        list_entities:
          entity_type: InventoryPosition
        as: inventory_positions
      - id: component_inventory
        list_relationships:
          relationship_type: component_inventory_position
        as: component_inventory
      - id: assembly_inventory
        list_relationships:
          relationship_type: assembly_inventory_position
        as: assembly_inventory
      - id: component_assembly
        list_relationships:
          relationship_type: component_part_of_assembly
        as: component_assembly
      - id: assembly_recursive
        list_relationships:
          relationship_type: assembly_part_of_assembly
        as: assembly_recursive
      - id: assembly_product
        list_relationships:
          relationship_type: assembly_part_of_product
        as: assembly_product
      - id: assessments
        provider: assess_buffer_coverage
        input:
          components: $steps.components.items
          assemblies: $steps.assemblies.items
          products: $steps.products.items
          inventory_positions: $steps.inventory_positions.items
          component_inventory_position_edges: $steps.component_inventory.items
          assembly_inventory_position_edges: $steps.assembly_inventory.items
          component_part_of_assembly_edges: $steps.component_assembly.items
          assembly_part_of_assembly_edges: $steps.assembly_recursive.items
          assembly_part_of_product_edges: $steps.assembly_product.items
          demand_context: $input.demand_context
        as: assessments
    returns: assessments

  # ── Stage 1: incident → supplier ───────────────────────────────────

  propose_incident_impacts_supplier:
    type: proposal
    description: >
      Match every open incident's scope to suppliers via direct supplier
      or geography basis. Bucket signature is rule-centric
      (rule_id=incident_scope_match_to_supplier), so trust accumulates
      across many incidents.
    contract_in: EmptyInput
    steps:
      - id: incidents
        list_entities:
          entity_type: Incident
        as: incidents
      - id: suppliers
        list_entities:
          entity_type: Supplier
        as: suppliers
      - id: assessments
        provider: assess_incident_supplier_scope
        input:
          incidents: $steps.incidents.items
          suppliers: $steps.suppliers.items
        as: assessments
      - id: candidates
        make_candidates:
          relationship_type: incident_impacts_supplier
          items: $steps.assessments.items
          from_type: Incident
          from_id: $item.incident_id
          to_type: Supplier
          to_id: $item.supplier_id
          properties:
            match_basis: $item.match_basis
            rationale: $item.rationale
        as: candidates
      - id: signals
        map_signals:
          signal_source: incident_supplier_scope_match
          items: $steps.assessments.items
          from_id: $item.incident_id
          to_id: $item.supplier_id
          evidence: $item.rationale
          enum:
            path: verdict
            map:
              support: support
              unsure: unsure
              contradict: contradict
        as: signals
      - id: proposal
        propose_relationship_group:
          relationship_type: incident_impacts_supplier
          candidates_from: candidates
          signals_from: [signals]
          thesis_text: >
            Open incidents match suppliers via direct supplier or
            geography scope.
          proposed_by: agent
        as: proposal
    returns: proposal

  # ── Stage 2: supplier → component ──────────────────────────────────

  propose_incident_impacts_component:
    type: proposal
    description: >
      Cascade resolved incident_impacts_supplier edges through
      supplier_supplies_component to candidate component impacts.
      Records alternate_state to capture whether viable alternate
      sourcing exists outside incident scope.
    contract_in: EmptyInput
    steps:
      - id: impacted_supplier_edges
        list_relationships:
          relationship_type: incident_impacts_supplier
        as: impacted_supplier_edges
      - id: supplies_edges
        list_relationships:
          relationship_type: supplier_supplies_component
        as: supplies_edges
      - id: components
        list_entities:
          entity_type: Component
        as: components
      - id: assessments
        provider: assess_incident_component_cascade
        input:
          impacted_supplier_edges: $steps.impacted_supplier_edges.items
          supplier_supplies_component_edges: $steps.supplies_edges.items
          components: $steps.components.items
        as: assessments
      - id: candidates
        make_candidates:
          relationship_type: incident_impacts_component
          items: $steps.assessments.items
          from_type: Incident
          from_id: $item.incident_id
          to_type: Component
          to_id: $item.component_id
          properties:
            alternate_state: $item.alternate_state
            rationale: $item.rationale
        as: candidates
      - id: signals
        map_signals:
          signal_source: incident_component_cascade
          items: $steps.assessments.items
          from_id: $item.incident_id
          to_id: $item.component_id
          evidence: $item.rationale
          enum:
            path: verdict
            map:
              support: support
              unsure: unsure
              contradict: contradict
        as: signals
      - id: proposal
        propose_relationship_group:
          relationship_type: incident_impacts_component
          candidates_from: candidates
          signals_from: [signals]
          thesis_text: >
            Components are impacted via the supplier cascade,
            adjusted for alternate sourcing coverage.
          proposed_by: agent
        as: proposal
    returns: proposal

  # ── Stage 3: supplier → directly supplied assembly ─────────────────

  propose_incident_impacts_assembly:
    type: proposal
    description: >
      Cascade resolved incident_impacts_supplier edges through
      supplier_supplies_assembly to candidate direct assembly impacts.
      Records alternate_state to capture whether viable alternate
      sourcing exists outside incident scope.
    contract_in: EmptyInput
    steps:
      - id: impacted_supplier_edges
        list_relationships:
          relationship_type: incident_impacts_supplier
        as: impacted_supplier_edges
      - id: assembly_supply_edges
        list_relationships:
          relationship_type: supplier_supplies_assembly
        as: assembly_supply_edges
      - id: assemblies
        list_entities:
          entity_type: Assembly
        as: assemblies
      - id: assessments
        provider: assess_incident_assembly_cascade
        input:
          impacted_supplier_edges: $steps.impacted_supplier_edges.items
          supplier_supplies_assembly_edges: $steps.assembly_supply_edges.items
          assemblies: $steps.assemblies.items
        as: assessments
      - id: candidates
        make_candidates:
          relationship_type: incident_impacts_assembly
          items: $steps.assessments.items
          from_type: Incident
          from_id: $item.incident_id
          to_type: Assembly
          to_id: $item.assembly_id
          properties:
            impacted_supplier_id: $item.impacted_supplier_id
            alternate_state: $item.alternate_state
            rationale: $item.rationale
        as: candidates
      - id: signals
        map_signals:
          signal_source: incident_assembly_cascade
          items: $steps.assessments.items
          from_id: $item.incident_id
          to_id: $item.assembly_id
          evidence: $item.rationale
          enum:
            path: verdict
            map:
              support: support
              unsure: unsure
              contradict: contradict
        as: signals
      - id: proposal
        propose_relationship_group:
          relationship_type: incident_impacts_assembly
          candidates_from: candidates
          signals_from: [signals]
          thesis_text: >
            Directly supplied assemblies are impacted via the supplier
            cascade, adjusted for alternate sourcing coverage.
          proposed_by: agent
        as: proposal
    returns: proposal

  # ── Utility: upstream impact → product exposure context ─────────────

  assess_incident_product_exposure:
    type: utility
    description: >
      Roll resolved impacted components and directly impacted assemblies
      through the assembly BOM hierarchy to finished products, using
      buffer assessments as inventory coverage context. This returns
      ephemeral context for agentic product and shipment decisions; it
      does not create an incident-product edge.
    contract_in: EmptyInput
    steps:
      - id: impacted_component_edges
        list_relationships:
          relationship_type: incident_impacts_component
        as: impacted_component_edges
      - id: impacted_assembly_edges
        list_relationships:
          relationship_type: incident_impacts_assembly
        as: impacted_assembly_edges
      - id: component_assembly
        list_relationships:
          relationship_type: component_part_of_assembly
        as: component_assembly
      - id: assembly_recursive
        list_relationships:
          relationship_type: assembly_part_of_assembly
        as: assembly_recursive
      - id: assembly_product
        list_relationships:
          relationship_type: assembly_part_of_product
        as: assembly_product
      - id: buffer_assessments
        list_entities:
          entity_type: BufferAssessment
        as: buffer_assessments
      - id: component_buffers
        list_relationships:
          relationship_type: component_buffer_assessment
        as: component_buffers
      - id: assembly_buffers
        list_relationships:
          relationship_type: assembly_buffer_assessment
        as: assembly_buffers
      - id: product_buffers
        list_relationships:
          relationship_type: product_buffer_assessment
        as: product_buffers
      - id: assemblies
        list_entities:
          entity_type: Assembly
        as: assemblies
      - id: products
        list_entities:
          entity_type: Product
        as: products
      - id: assessments
        provider: assess_incident_product_exposure
        input:
          impacted_component_edges: $steps.impacted_component_edges.items
          impacted_assembly_edges: $steps.impacted_assembly_edges.items
          component_part_of_assembly_edges: $steps.component_assembly.items
          assembly_part_of_assembly_edges: $steps.assembly_recursive.items
          assembly_part_of_product_edges: $steps.assembly_product.items
          buffer_assessments: $steps.buffer_assessments.items
          component_buffer_assessment_edges: $steps.component_buffers.items
          assembly_buffer_assessment_edges: $steps.assembly_buffers.items
          product_buffer_assessment_edges: $steps.product_buffers.items
          assemblies: $steps.assemblies.items
          products: $steps.products.items
        as: assessments
    returns: assessments

# ─── Feedback profiles ───────────────────────────────────────────────
#
# Per-relationship feedback vocabulary used when reviewers reject or
# qualify resolutions. scope_keys pull from the resolved edge's
# endpoints/properties — they are NOT bucket signature fields. Cruxible derives
# bucket signatures from workflow/proposal structure and consumed signal sources.

feedback_profiles:
  incident_impacts_supplier:
    version: 1
    reason_codes:
      wrong_supplier_scope_match:
        description: Rule matched the wrong supplier for the incident scope.
        remediation_hint: provider_fix
        required_scope_keys: [supplier, match_basis]
      geography_stale:
        description: Supplier's primary_geography was outdated; supplier is no longer in scope.
        remediation_hint: provider_fix
        required_scope_keys: [supplier, match_basis]
      supplier_recently_cleared:
        description: Supplier was cleared for a similar incident recently and should not have been re-flagged.
        remediation_hint: decision_policy
        required_scope_keys: [supplier]
    scope_keys:
      incident: FROM.incident_id
      supplier: TO.supplier_id
      match_basis: EDGE.match_basis

  incident_impacts_component:
    version: 1
    reason_codes:
      alternate_supplier_available:
        description: Component has a viable alternate supplier outside incident scope; cascade should have stopped.
        remediation_hint: provider_fix
        required_scope_keys: [component]
      component_decommissioned:
        description: Component is no longer in active use.
        remediation_hint: quality_check
        required_scope_keys: [component]
      supplier_substitution_planned:
        description: A planned substitution mitigates this cascade.
        remediation_hint: decision_policy
        required_scope_keys: [component, alternate_state]
    scope_keys:
      incident: FROM.incident_id
      component: TO.component_id
      alternate_state: EDGE.alternate_state

  incident_impacts_assembly:
    version: 1
    reason_codes:
      alternate_supplier_available:
        description: Assembly has a viable alternate supplier outside incident scope; cascade should have stopped.
        remediation_hint: provider_fix
        required_scope_keys: [assembly]
      assembly_decommissioned:
        description: Assembly is no longer in active use.
        remediation_hint: quality_check
        required_scope_keys: [assembly]
      wrong_supplier_assembly_scope:
        description: Rule matched the wrong directly supplied assembly for the impacted supplier.
        remediation_hint: provider_fix
        required_scope_keys: [assembly, impacted_supplier]
      sourcing_plan_stale:
        description: Supplier sourcing posture was stale at cascade time.
        remediation_hint: provider_fix
        required_scope_keys: [assembly, impacted_supplier]
    scope_keys:
      incident: FROM.incident_id
      assembly: TO.assembly_id
      impacted_supplier: EDGE.impacted_supplier_id
      alternate_state: EDGE.alternate_state

# ─── Outcome profiles (Loop 2) ───────────────────────────────────────
#
# Feedback profiles capture reviewer corrections before/at resolution.
# Outcome profiles capture whether accepted judgments worked downstream
# once actual supplier recovery, production, shipment, or customer impact
# is known. These are the trust-calibration inputs for the next incident.

outcome_profiles:
  incident_supplier_resolution:
    anchor_type: resolution
    relationship_type: incident_impacts_supplier
    version: 1
    outcome_codes:
      confirmed_supplier_disruption:
        description: Later operations data confirmed the supplier was materially disrupted.
        remediation_hint: trust_adjustment
        required_scope_keys: [relationship_type]
      supplier_unaffected:
        description: Later operations data showed the supplier was not materially disrupted.
        remediation_hint: require_review
        required_scope_keys: [relationship_type]
      scope_data_stale:
        description: Supplier or geography scope data was stale at resolution time.
        remediation_hint: provider_fix
        required_scope_keys: [relationship_type]
    scope_keys:
      relationship_type: RESOLUTION.relationship_type

  incident_component_resolution:
    anchor_type: resolution
    relationship_type: incident_impacts_component
    version: 1
    outcome_codes:
      confirmed_component_shortage:
        description: Later operations data confirmed component supply was constrained.
        remediation_hint: trust_adjustment
        required_scope_keys: [relationship_type]
      alternate_covered_need:
        description: Alternate sourcing prevented the predicted component impact.
        remediation_hint: require_review
        required_scope_keys: [relationship_type]
      missed_component_impact:
        description: A component impact was discovered after the proposal chain ran.
        remediation_hint: workflow_fix
        required_scope_keys: [relationship_type]
    scope_keys:
      relationship_type: RESOLUTION.relationship_type

  incident_assembly_resolution:
    anchor_type: resolution
    relationship_type: incident_impacts_assembly
    version: 1
    outcome_codes:
      confirmed_assembly_constraint:
        description: Later operations data confirmed assembly supply was constrained.
        remediation_hint: trust_adjustment
        required_scope_keys: [relationship_type]
      assembly_unaffected:
        description: The assembly remained unaffected despite the accepted impact judgment.
        remediation_hint: require_review
        required_scope_keys: [relationship_type]
      missed_assembly_impact:
        description: An assembly impact was discovered after the proposal chain ran.
        remediation_hint: workflow_fix
        required_scope_keys: [relationship_type]
    scope_keys:
      relationship_type: RESOLUTION.relationship_type

  impacted_assemblies_query:
    anchor_type: receipt
    surface_type: query
    surface_name: incident_impacted_assemblies
    version: 1
    outcome_codes:
      missing_impacted_assembly:
        description: Query omitted a directly supplied assembly later confirmed impacted.
        remediation_hint: graph_fix
        required_scope_keys: [query]
      false_positive_assembly:
        description: Query returned an assembly later confirmed not directly impacted.
        remediation_hint: graph_fix
        required_scope_keys: [query]
    scope_keys:
      query: SURFACE.name

  component_exposed_products_query:
    anchor_type: receipt
    surface_type: query
    surface_name: incident_component_exposed_products
    version: 1
    outcome_codes:
      missing_impacted_product:
        description: Component-path exposure query omitted a product later confirmed to be impacted.
        remediation_hint: graph_fix
        required_scope_keys: [query]
      false_positive_product:
        description: Component-path exposure query returned a product later confirmed to be unaffected.
        remediation_hint: graph_fix
        required_scope_keys: [query]
    scope_keys:
      query: SURFACE.name

  direct_assembly_exposed_products_query:
    anchor_type: receipt
    surface_type: query
    surface_name: incident_direct_assembly_exposed_products
    version: 1
    outcome_codes:
      missing_impacted_product:
        description: Direct-assembly exposure query omitted a product later confirmed to be impacted.
        remediation_hint: graph_fix
        required_scope_keys: [query]
      false_positive_product:
        description: Direct-assembly exposure query returned a product later confirmed to be unaffected.
        remediation_hint: graph_fix
        required_scope_keys: [query]
    scope_keys:
      query: SURFACE.name

  nested_assembly_exposed_products_query:
    anchor_type: receipt
    surface_type: query
    surface_name: incident_nested_assembly_exposed_products
    version: 1
    outcome_codes:
      missing_impacted_product:
        description: Nested-assembly exposure query omitted a product later confirmed to be impacted.
        remediation_hint: graph_fix
        required_scope_keys: [query]
      false_positive_product:
        description: Nested-assembly exposure query returned a product later confirmed to be unaffected.
        remediation_hint: graph_fix
        required_scope_keys: [query]
    scope_keys:
      query: SURFACE.name
