version: "1.0"
name: supply_chain_blast_radius
kind: world_model
description: >
  Supply chain incident blast-radius kit. Deterministic base world of
  suppliers, components, assemblies (with recursive BOM hierarchy),
  products, and shipments. Incidents arrive as new entities
  and cascade through three staged governed-relationship workflows:
  incident → supplier → component/direct assembly. Product and shipment
  risk are derived context surfaces over accepted upstream impacts, BOM,
  buffer, and deterministic shipment state, rather than direct incident-product
  or incident-shipment edges.
  Each governed edge is rule-centric (the bucket signature
  carries rule_id + rule_version, not incident_id), so trust
  accumulates on rules across many incidents rather than starting fresh
  per incident.

# ─── Shared enum vocabularies ────────────────────────────────────────

enums:
  component_kind:
    values: [raw_material, part]
    description: Non-assembly component role in the BOM.
  lifecycle_status:
    values: [active, deprecated, obsolete]
    description: Catalog lifecycle state for components, assemblies, and products.
  criticality:
    values: [critical, standard, low]
    description: Internal materiality tier for component and assembly blast-radius context.
  shipment_status:
    values: [in_flight, delivered, cancelled]
    description: Operational shipment state used by shipment review workflows.
  location_type:
    values: [plant, warehouse, supplier, in_transit]
    description: Location category for inventory evidence.
  inventory_item_type:
    values: [component, assembly, product]
    description: Item type represented by an inventory position.
  buffer_item_type:
    values: [component, assembly]
    description: Item type assessed for reusable buffer coverage.
  rate_period:
    values: [day, week, month]
    description: Time period denominator for consumption rates.
  duration_unit:
    values: [days, weeks, months]
    description: Time unit for coverage and planning horizons.
  buffer_state:
    values: [no_buffer, partial_buffer, sufficient_buffer, unknown]
    description: Inventory buffer conclusion used by product exposure assessment.
  incident_severity:
    values: [critical, high, medium, low]
    description: Incident severity band.
  incident_scope_type:
    values: [supplier, geography]
    description: Incident scope basis.
  incident_status:
    values: [open, monitoring, closed]
    description: Incident lifecycle state.
  qualification_status:
    values: [qualified, conditional, expired, disqualified]
    description: Supplier qualification posture for a supplied item.
  sourcing_role:
    values: [primary, secondary, tertiary, emergency, inactive]
    description: Sourcing priority role for a supplied item.
  activation_state:
    values: [active, standby, constrained, unavailable]
    description: Operational availability state for a sourcing path.
  supplier_match_basis:
    values: [direct, geography]
    description: How an incident scope matched a supplier.
  alternate_state:
    values: [no_alternate, alternate_in_scope, alternate_viable]
    description: Alternate sourcing coverage at cascade time.
  bom_depth_bucket:
    values: [direct, tier_2, tier_3_plus]
    description: Discretized BOM traversal depth.
  proposal_verdict:
    values: [support, unsure, contradict]
    description: Provider verdict mapped into governed proposal signals.
  product_exposure_basis:
    values: [component_bom_path, direct_assembly_bom_path, mixed_paths]
    description: Dominant upstream evidence path for derived product exposure context.

# ─── Entity types ────────────────────────────────────────────────────

entity_types:
  Supplier:
    description: External supplier of raw materials or discrete components.
    properties:
      supplier_id:
        type: string
        primary_key: true
      name:
        type: string
        indexed: true
      primary_geography:
        type: string
        optional: true
      tier_hint:
        type: string
        optional: true
        description: Operator-supplied hint (tier-1, tier-2, tier-3); not authoritative — true tier is computed via BOM traversal.

  Component:
    description: A raw material or discrete part that rolls up into assemblies.
    properties:
      component_id:
        type: string
        primary_key: true
      name:
        type: string
        indexed: true
      component_kind:
        type: string
        enum_ref: component_kind
        description: Explicit BOM role for non-assembly components.
      revision:
        type: string
        optional: true
        description: Component revision used by the seed BOM.
      lifecycle_status:
        type: string
        optional: true
        enum_ref: lifecycle_status
      criticality:
        type: string
        optional: true
        enum_ref: criticality
      category:
        type: string
        optional: true

  Assembly:
    description: A buildable subassembly or assembly composed of Components and/or lower-level Assemblies.
    properties:
      assembly_id:
        type: string
        primary_key: true
      name:
        type: string
        indexed: true
      revision:
        type: string
        optional: true
        description: Assembly revision used by the seed BOM.
      lifecycle_status:
        type: string
        optional: true
        enum_ref: lifecycle_status
      criticality:
        type: string
        optional: true
        enum_ref: criticality
      category:
        type: string
        optional: true

  Product:
    description: Finished good shipped to customers.
    properties:
      product_id:
        type: string
        primary_key: true
      sku:
        type: string
        indexed: true
      name:
        type: string
      lifecycle_status:
        type: string
        optional: true
        enum_ref: lifecycle_status

  Shipment:
    description: A specific outbound shipment of products to a customer.
    properties:
      shipment_id:
        type: string
        primary_key: true
      customer_id:
        type: string
        indexed: true
      status:
        type: string
        optional: true
        enum_ref: shipment_status
      ship_date:
        type: date
        optional: true
      eta:
        type: date
        optional: true

  Location:
    description: Plant, warehouse, supplier, or in-transit location where inventory may sit.
    properties:
      location_id:
        type: string
        primary_key: true
      name:
        type: string
        indexed: true
      location_type:
        type: string
        optional: true
        enum_ref: location_type
      geography:
        type: string
        optional: true

  InventoryPosition:
    description: Time-stamped inventory evidence for a component, assembly, or product at a location.
    properties:
      inventory_position_id:
        type: string
        primary_key: true
      item_type:
        type: string
        enum_ref: inventory_item_type
      item_id:
        type: string
        indexed: true
      location_id:
        type: string
        indexed: true
      quantity_on_hand:
        type: float
        optional: true
      quantity_allocated:
        type: float
        optional: true
      net_available:
        type: float
        optional: true
      unit_of_measure:
        type: string
        optional: true
      as_of:
        type: date
        optional: true

  BufferAssessment:
    description: Reusable operational assessment of whether inventory covers expected demand for a component or assembly in a product/BOM context.
    properties:
      buffer_assessment_id:
        type: string
        primary_key: true
      item_type:
        type: string
        enum_ref: buffer_item_type
      item_id:
        type: string
        indexed: true
      product_id:
        type: string
        indexed: true
      bom_variant_id:
        type: string
        optional: true
      net_available:
        type: float
        optional: true
      required_per_unit:
        type: float
        optional: true
      open_demand_units:
        type: float
        optional: true
      estimated_consumption_rate:
        type: float
        optional: true
        description: Expected consumption quantity per rate_period.
      rate_period:
        type: string
        optional: true
        enum_ref: rate_period
      coverage_duration:
        type: float
        optional: true
        description: Computed duration the net available inventory covers.
      coverage_unit:
        type: string
        optional: true
        enum_ref: duration_unit
      horizon_duration:
        type: float
        optional: true
      horizon_unit:
        type: string
        optional: true
        enum_ref: duration_unit
      buffer_state:
        type: string
        optional: true
        enum_ref: buffer_state
      unit_of_measure:
        type: string
        optional: true
      as_of:
        type: date
        optional: true
      rationale:
        type: string
        optional: true

  Incident:
    description: A supplier-side disruption or geography-level supply event.
    properties:
      incident_id:
        type: string
        primary_key: true
      title:
        type: string
        indexed: true
      severity:
        type: string
        optional: true
        enum_ref: incident_severity
      scope_type:
        type: string
        optional: true
        enum_ref: incident_scope_type
      scope_id:
        type: string
        optional: true
        description: Identifier of the in-scope supplier or geography string.
      status:
        type: string
        optional: true
        enum_ref: incident_status
      reported_at:
        type: date
        optional: true
      closed_at:
        type: date
        optional: true
      summary:
        type: string
        optional: true

# ─── Deterministic relationships ─────────────────────────────────────

relationships:
  - name: supplier_supplies_component
    description: A supplier can provide a component. Properties capture qualification, sourcing posture, capacity, and timing.
    from: Supplier
    to: Component
    properties:
      lead_time_days:
        type: int
        optional: true
      qualification_status:
        type: string
        optional: true
        enum_ref: qualification_status
      sourcing_role:
        type: string
        optional: true
        enum_ref: sourcing_role
      priority_rank:
        type: int
        optional: true
      allocation_pct:
        type: float
        optional: true
      activation_state:
        type: string
        optional: true
        enum_ref: activation_state
      capacity_units_per_week:
        type: int
        optional: true
      effective_from:
        type: date
        optional: true
      effective_to:
        type: date
        optional: true
      last_verified_at:
        type: date
        optional: true

  - name: supplier_supplies_assembly
    description: A supplier can provide a buildable assembly directly. Properties capture qualification, sourcing posture, capacity, and timing.
    from: Supplier
    to: Assembly
    properties:
      lead_time_days:
        type: int
        optional: true
      qualification_status:
        type: string
        optional: true
        enum_ref: qualification_status
      sourcing_role:
        type: string
        optional: true
        enum_ref: sourcing_role
      priority_rank:
        type: int
        optional: true
      allocation_pct:
        type: float
        optional: true
      activation_state:
        type: string
        optional: true
        enum_ref: activation_state
      capacity_units_per_week:
        type: int
        optional: true
      effective_from:
        type: date
        optional: true
      effective_to:
        type: date
        optional: true
      last_verified_at:
        type: date
        optional: true

  - name: component_part_of_assembly
    description: BOM edge linking a raw material or part into an assembly.
    from: Component
    to: Assembly
    properties:
      quantity:
        type: int
        optional: true
      bom_variant_id:
        type: string
        optional: true
      plant_id:
        type: string
        optional: true
      effective_from:
        type: date
        optional: true
      effective_to:
        type: date
        optional: true

  - name: assembly_part_of_assembly
    description: Recursive BOM edge linking a child assembly into a parent assembly.
    from: Assembly
    to: Assembly
    properties:
      quantity:
        type: int
        optional: true
      bom_variant_id:
        type: string
        optional: true
      plant_id:
        type: string
        optional: true
      effective_from:
        type: date
        optional: true
      effective_to:
        type: date
        optional: true

  - name: assembly_part_of_product
    description: Top-level BOM edge linking an assembly into a finished product.
    from: Assembly
    to: Product
    properties:
      quantity:
        type: int
        optional: true
      bom_variant_id:
        type: string
        optional: true
      plant_id:
        type: string
        optional: true
      effective_from:
        type: date
        optional: true
      effective_to:
        type: date
        optional: true

  - name: product_in_shipment
    description: Fulfillment edge linking a product to shipments that contain it.
    from: Product
    to: Shipment
    properties:
      qty:
        type: int
        optional: true

  - name: component_inventory_position
    description: Inventory evidence for a component.
    from: Component
    to: InventoryPosition

  - name: assembly_inventory_position
    description: Inventory evidence for an assembly.
    from: Assembly
    to: InventoryPosition

  - name: product_inventory_position
    description: Inventory evidence for a finished product.
    from: Product
    to: InventoryPosition

  - name: inventory_position_location
    description: Location where an inventory position was observed.
    from: InventoryPosition
    to: Location

  - name: component_buffer_assessment
    description: Buffer coverage assessment for a component in a product/BOM context.
    from: Component
    to: BufferAssessment

  - name: assembly_buffer_assessment
    description: Buffer coverage assessment for an assembly in a product/BOM context.
    from: Assembly
    to: BufferAssessment

  - name: product_buffer_assessment
    description: Product context for a buffer assessment.
    from: Product
    to: BufferAssessment

  - name: buffer_assessment_inventory
    description: Inventory evidence used by a buffer assessment.
    from: BufferAssessment
    to: InventoryPosition

# ─── Governed relationships ──────────────────────────────────────────
#
# Each governed edge is created through propose_relationship_group +
# resolution. The proposal_policy block names the signal source that
# supplies tri-state signals; the auto_resolve_when policy gates when proposals
# can apply without human review.
#
# Bucket signatures are Cruxible-built from workflow/proposal structure and
# consumed signal sources, so trust accumulates on the configured proposal path
# across many incidents — not per incident.

  - name: incident_impacts_supplier
    description: Governed judgment that an incident materially impacts a supplier.
    from: Incident
    to: Supplier
    properties:
      match_basis:
        type: string
        optional: true
        enum_ref: supplier_match_basis
        description: How the incident scope matched this supplier.
      rationale:
        type: string
        optional: true
    proposal_policy:
      signals:
        incident_supplier_scope_match:
          role: required
          always_review_on_unsure: true
      auto_resolve_when: all_support

  - name: incident_impacts_component
    description: Governed judgment that an incident impacts a component via its impacted suppliers.
    from: Incident
    to: Component
    properties:
      alternate_state:
        type: string
        optional: true
        enum_ref: alternate_state
        description: State of substitute supplier coverage at cascade time.
      rationale:
        type: string
        optional: true
    proposal_policy:
      signals:
        incident_component_cascade:
          role: required
          always_review_on_unsure: true
      auto_resolve_when: all_support

  - name: incident_impacts_assembly
    description: Governed judgment that an incident impacts a directly supplied assembly via its impacted suppliers.
    from: Incident
    to: Assembly
    properties:
      impacted_supplier_id:
        type: string
        optional: true
        description: Supplier impact that triggered the assembly cascade.
      alternate_state:
        type: string
        optional: true
        enum_ref: alternate_state
        description: State of substitute supplier coverage at cascade time.
      rationale:
        type: string
        optional: true
    proposal_policy:
      signals:
        incident_assembly_cascade:
          role: required
          always_review_on_unsure: true
      auto_resolve_when: all_support

# ─── Named queries ───────────────────────────────────────────────────
#
# All graph-native single-purpose reads. Composition (e.g. "products
# at risk plus their single-source flags") happens in the skill, not
# in a query.

named_queries:
  incident_impacted_suppliers:
    description: Starting from an incident, find suppliers judged impacted.
    entry_point: Incident
    returns: Supplier
    traversal:
      - relationship: incident_impacts_supplier
        direction: outgoing

  incident_impacted_components:
    description: Starting from an incident, find components judged impacted via the supplier cascade.
    entry_point: Incident
    returns: Component
    traversal:
      - relationship: incident_impacts_component
        direction: outgoing

  incident_impacted_assemblies:
    description: >
      Starting from an incident, find assemblies judged impacted via direct
      supplier-to-assembly cascade.
    entry_point: Incident
    returns: Assembly
    traversal:
      - relationship: incident_impacts_assembly
        direction: outgoing

  incident_exposed_assembly_context:
    description: >
      Starting from an incident, derive assembly context exposed by accepted
      supplier, component, or direct assembly impacts through supply and BOM
      structure. This is a query/view, not governed state.
    entry_point: Incident
    returns: Assembly
    traversal:
      - relationship: [incident_impacts_supplier, incident_impacts_component, incident_impacts_assembly]
        direction: outgoing
      - relationship: [supplier_supplies_assembly, component_part_of_assembly, assembly_part_of_assembly]
        direction: outgoing
        max_depth: 8

  incident_component_exposed_products:
    description: >
      Starting from an incident, derive finished products exposed through
      accepted component impacts and the component/assembly BOM hierarchy.
      This is context for an agentic product or shipment judgment, not
      governed graph state.
    entry_point: Incident
    returns: Product
    traversal:
      - relationship: incident_impacts_component
        direction: outgoing
      - relationship: [component_part_of_assembly, assembly_part_of_assembly]
        direction: outgoing
        max_depth: 8
      - relationship: assembly_part_of_product
        direction: outgoing

  incident_direct_assembly_exposed_products:
    description: >
      Starting from an incident, derive finished products exposed through
      accepted direct assembly impacts where the assembly is a top-level
      product assembly.
    entry_point: Incident
    returns: Product
    traversal:
      - relationship: incident_impacts_assembly
        direction: outgoing
      - relationship: assembly_part_of_product
        direction: outgoing

  incident_nested_assembly_exposed_products:
    description: >
      Starting from an incident, derive finished products exposed through
      accepted direct assembly impacts and higher-level parent assemblies.
    entry_point: Incident
    returns: Product
    traversal:
      - relationship: incident_impacts_assembly
        direction: outgoing
      - relationship: assembly_part_of_assembly
        direction: outgoing
        max_depth: 8
      - relationship: assembly_part_of_product
        direction: outgoing

  single_source_components_for_incident:
    description: >
      Starting from an incident, find impacted components that have only one
      viable supplier path. Surfaces the "no viable alternate supplier"
      enrichment for the operator summary.
    entry_point: Incident
    returns: Component
    traversal:
      - relationship: incident_impacts_component
        direction: outgoing
        filter:
          alternate_state: no_alternate

  single_source_assemblies_for_incident:
    description: >
      Starting from an incident, find impacted directly supplied assemblies
      that have only one viable supplier path.
    entry_point: Incident
    returns: Assembly
    traversal:
      - relationship: incident_impacts_assembly
        direction: outgoing
        filter:
          alternate_state: no_alternate

  supplier_supplied_components:
    description: Starting from a supplier, find directly supplied components.
    entry_point: Supplier
    returns: Component
    traversal:
      - relationship: supplier_supplies_component
        direction: outgoing

  supplier_supplied_assemblies:
    description: Starting from a supplier, find directly supplied assemblies.
    entry_point: Supplier
    returns: Assembly
    traversal:
      - relationship: supplier_supplies_assembly
        direction: outgoing

  component_parent_assemblies:
    description: >
      Starting from a component, find direct and higher-level parent assemblies
      in the BOM hierarchy.
    entry_point: Component
    returns: Assembly
    traversal:
      - relationship: [component_part_of_assembly, assembly_part_of_assembly]
        direction: outgoing
        max_depth: 8

  assembly_child_components:
    description: Starting from an assembly, find direct child components.
    entry_point: Assembly
    returns: Component
    traversal:
      - relationship: component_part_of_assembly
        direction: incoming

  assembly_child_assemblies:
    description: Starting from an assembly, find direct child assemblies.
    entry_point: Assembly
    returns: Assembly
    traversal:
      - relationship: assembly_part_of_assembly
        direction: incoming

  product_top_level_assemblies:
    description: Starting from a product, find top-level assemblies in its BOM.
    entry_point: Product
    returns: Assembly
    traversal:
      - relationship: assembly_part_of_product
        direction: incoming

  product_shipments:
    description: Starting from a product, find shipments containing it.
    entry_point: Product
    returns: Shipment
    traversal:
      - relationship: product_in_shipment
        direction: outgoing

  product_buffer_assessments:
    description: Starting from a product, find current buffer assessments used for product exposure context.
    entry_point: Product
    returns: BufferAssessment
    traversal:
      - relationship: product_buffer_assessment
        direction: outgoing

  component_inventory_positions:
    description: Starting from a component, find inventory positions for that component.
    entry_point: Component
    returns: InventoryPosition
    traversal:
      - relationship: component_inventory_position
        direction: outgoing

  assembly_inventory_positions:
    description: Starting from an assembly, find inventory positions for that assembly.
    entry_point: Assembly
    returns: InventoryPosition
    traversal:
      - relationship: assembly_inventory_position
        direction: outgoing

  shipment_products:
    description: Starting from a shipment, find products contained in it.
    entry_point: Shipment
    returns: Product
    traversal:
      - relationship: product_in_shipment
        direction: incoming

  supplier_impacting_incidents:
    description: Starting from a supplier, find incidents judged to impact it.
    entry_point: Supplier
    returns: Incident
    traversal:
      - relationship: incident_impacts_supplier
        direction: incoming

  product_component_impacting_incidents:
    description: Starting from a product, find incidents that impact components in its BOM.
    entry_point: Product
    returns: Incident
    traversal:
      - relationship: assembly_part_of_product
        direction: incoming
      - relationship: [assembly_part_of_assembly, component_part_of_assembly]
        direction: incoming
        max_depth: 8
      - relationship: incident_impacts_component
        direction: incoming

  product_direct_assembly_impacting_incidents:
    description: Starting from a product, find incidents that directly impact top-level assemblies in its BOM.
    entry_point: Product
    returns: Incident
    traversal:
      - relationship: assembly_part_of_product
        direction: incoming
      - relationship: incident_impacts_assembly
        direction: incoming

  product_nested_assembly_impacting_incidents:
    description: Starting from a product, find incidents that directly impact nested assemblies in its BOM.
    entry_point: Product
    returns: Incident
    traversal:
      - relationship: assembly_part_of_product
        direction: incoming
      - relationship: assembly_part_of_assembly
        direction: incoming
        max_depth: 8
      - relationship: incident_impacts_assembly
        direction: incoming

  assembly_impacting_incidents:
    description: Starting from an assembly, find incidents judged to impact it directly.
    entry_point: Assembly
    returns: Incident
    traversal:
      - relationship: incident_impacts_assembly
        direction: incoming

# ─── Quality checks ──────────────────────────────────────────────────

quality_checks:
  - name: components_have_supplier
    kind: cardinality
    description: Every component should have at least one supplier (orphan detector).
    entity_type: Component
    relationship_type: supplier_supplies_component
    direction: incoming
    min_count: 1
    severity: warning

  - name: critical_components_have_redundancy
    kind: cardinality
    description: Critical components should have at least two supplier options (single-source flag).
    entity_type: Component
    relationship_type: supplier_supplies_component
    direction: incoming
    min_count: 2
    severity: warning

  - name: components_have_kind
    kind: property
    description: Every component should declare whether it is a raw material or part.
    target: entity
    entity_type: Component
    property: component_kind
    rule: required
    severity: error

  - name: products_have_assembly_bom
    kind: cardinality
    description: Products should have at least one top-level assembly in their BOM.
    entity_type: Product
    relationship_type: assembly_part_of_product
    direction: incoming
    min_count: 1
    severity: error
contracts:
  EmptyInput:
    fields: {}

  SupplyChainSeedData:
    description: Deterministic base-world entities and edges loaded from seed CSVs.
    fields:
      suppliers:
        type: json
        json_schema:
          type: array
          items:
            type: object
            required: [supplier_id, name, primary_geography, tier_hint]
            properties:
              supplier_id: {type: string}
              name: {type: string}
              primary_geography: {type: string}
              tier_hint: {type: string}
      components:
        type: json
        json_schema:
          type: array
          items:
            type: object
            required: [component_id, name, component_kind, revision, lifecycle_status, criticality, category]
            properties:
              component_id: {type: string}
              name: {type: string}
              component_kind: {type: string, enum_ref: component_kind}
              revision: {type: string}
              lifecycle_status: {type: string, enum_ref: lifecycle_status}
              criticality: {type: string, enum_ref: criticality}
              category: {type: string}
      assemblies:
        type: json
        json_schema:
          type: array
          items:
            type: object
            required: [assembly_id, name, revision, lifecycle_status, criticality, category]
            properties:
              assembly_id: {type: string}
              name: {type: string}
              revision: {type: string}
              lifecycle_status: {type: string, enum_ref: lifecycle_status}
              criticality: {type: string, enum_ref: criticality}
              category: {type: string}
      products:
        type: json
        json_schema:
          type: array
          items:
            type: object
            required: [product_id, sku, name, lifecycle_status]
            properties:
              product_id: {type: string}
              sku: {type: string}
