# =============================================================================
# DRAFT — operation-state ontology additions (first version, 2026-06-17)
# =============================================================================
# Source:   wi-agent-operation-kit-lifecycle-semantics — approved table items O1–O6.
# Status:   DRAFT for review. NOT applied to the live project-state config.yaml.
# Scope:    Additive only — new relationship types, new OPTIONAL fields, and
#           quality/constraint guards for the new edges.
#           Nothing reshapes an existing contract, so every item lands IN OR AFTER the
#           0.2 lock (not a freeze gate).
#
# This file shows the *shape* of the additions in real config.yaml format.
#
#   O1  work_item_part_of_work_item        composition / roll-up axis  (MISSING today)
#   O2  work_item_spawned_from_work_item   work-item lineage axis      (MISSING today)
#   O3  rationale field                    optional "why" on WorkItem + Decision
#   O4  description field                   optional long-form notes on WorkItem
#
# HOW THIS LANDS — as an IN-PLACE edit to kits/project-state/config.yaml, NOT as an
#   `extends` overlay. The composer (config/composer.py) REJECTS redefining an existing
#   entity type / relationship in an overlay — it errors loud, it does NOT silently
#   merge. So the property blocks below are fields to INSERT into the existing entity
#   definitions, and the new quality_checks / constraints APPEND to those existing lists.
#
# O1–O4 validate today. No per-field presentation hint is included here:
# prose string fields should render as markdown by default at the read-only UI
# layer, while remaining plain strings in config/state.
#
# DEFERRED out of this draft — O6 (the typed `surface_ref_*` reference seam to a named
#   query/workflow). Still the recorded 0.2 reference seam on
#   oq-machinery-config-vs-operational-state, but pulled from this first pass: its only
#   real consumers (run-spec / calibration record) are post-0.2, and it is additive.
#
# SCOPING (deliberate, per review) — composition/lineage (O1/O2) are WorkItem-only:
#   roll-up and critical-path are work-item concerns, and decisions already have
#   decision_supersedes_decision. rationale (O3) is on work + decisions; description (O4)
#   is on work only. Extending any of these to Risk/OpenQuestion/ReviewRequest is a later
#   additive step, not an oversight.
# =============================================================================


# -----------------------------------------------------------------------------
# entity_types — additive OPTIONAL fields only; no existing field changes.
# (Property blocks to INSERT into the existing entity definitions.)
# Prose fields remain plain strings. Markdown rendering is a read-only UI
# convention, not a config schema key.
# -----------------------------------------------------------------------------
entity_types:

  WorkItem:
    properties:
      summary:                       # existing field retained as plain string
        type: string
        optional: true
      description:                   # O4 — long-form notes, distinct from one-line summary
        type: string
        optional: true
      rationale:                     # O3 — optional "why this exists / why prioritized"
        type: string
        optional: true

  Decision:
    properties:
      summary:                       # existing field retained as plain string
        type: string
        optional: true
      rationale:                     # O3 — a decision's standing argument, kept inline
        type: string
        optional: true

  Risk:
    properties:
      summary:                       # existing field retained as plain string
        type: string
        optional: true

  OpenQuestion:
    properties:
      summary:                       # existing field retained as plain string
        type: string
        optional: true

  ReviewRequest:
    properties:
      summary:                       # existing field retained as plain string
        type: string
        optional: true
      review_notes:                  # existing field retained as plain string
        type: string
        optional: true


# -----------------------------------------------------------------------------
# relationships — the two MISSING axes, so depends_on stops being a catch-all.
#
# GOVERNANCE — both new edges are DIRECT operational facts (structure / provenance),
# like the existing containment edges (work_item_in_milestone / work_item_in_release)
# which also carry no proposal_policy. They are NOT interpretive judgments like
# work_item_depends_on_work_item or decision_supersedes_decision (which require a
# *_basis + proposal_policy), so they intentionally omit proposal_policy/basis.
#
# READINESS INVARIANT — readiness / critical-path / blocker surfaces must enumerate
# ONLY work_item_depends_on_work_item, risk_blocks_work_item, and
# open_question_blocks_work_item — NEVER the two edges below. Composition and lineage
# carry no sequencing meaning; including them would inject false blockers. Enforced
# today only by those queries naming exact relationships; a regression test should pin
# it. (A relationship-level `axis:` tag for mechanical exclusion would be a separate
# schema-language change — not taken here.)
#
# Existing axes for reference:
#   SEQUENCING (have):  work_item_depends_on_work_item        B-before-A, critical-path
#   IMPEDIMENT (have):  risk_blocks_work_item / open_question_blocks_work_item
# -----------------------------------------------------------------------------
relationships:

  # O1 — COMPOSITION axis. Order-independent scope + roll-up; parent rolls up children.
  # NOT a prerequisite, NOT a blocker. Composition is a TREE: a work item has at most
  # one parent (cardinality check below) and may not be its own parent (constraint below).
  - name: work_item_part_of_work_item
    description: >
      Composition: this work item is part of (a child / sub-item of) a larger work
      item. Order-independent scope and roll-up — not a prerequisite, not a blocker.
    from: WorkItem
    to: WorkItem

  # O2 — LINEAGE axis. Provenance only: "A came out of B." NOT a prerequisite, NOT a
  # blocker. Uses the same self-edge PATTERN as decision_supersedes_decision but with
  # PROVENANCE semantics — it does NOT mean replacement (for work-item replacement, add a
  # separate work_item_supersedes_work_item later). Direction: from = the spawned/
  # follow-up item, to = the origin. Single origin (cardinality below); no self-edge
  # (constraint below).
  - name: work_item_spawned_from_work_item
    description: >
      Lineage / provenance: this work item was spawned from (is a follow-up of) another
      work item. from = the spawned/follow-up item; to = the origin it came from.
      Records where it came from — not a prerequisite, not a blocker, not a replacement.
    from: WorkItem
    to: WorkItem


# -----------------------------------------------------------------------------
# quality_checks — keep composition a tree and lineage single-origin (warnings).
# (APPEND to the existing quality_checks list.)
# NOTE: these catch single-parent / single-origin violations at the per-entity level.
# They do NOT prevent multi-hop cycles (A→B→A) — the constraint language can't express
# graph-level acyclicity. Roll-up traversal relies on the query engine's cycle-pruned
# BFS (TraversalStep) to stay safe on any residual cycle.
# -----------------------------------------------------------------------------
quality_checks:
  - name: work_item_part_of_single_parent
    kind: cardinality
    description: A work item should be part of at most one parent (composition is a tree).
    severity: warning
    entity_type: WorkItem
    relationship_type: work_item_part_of_work_item
    direction: outgoing
    max_count: 1

  - name: work_item_spawned_from_single_origin
    kind: cardinality
    description: A work item should record at most one origin it was spawned from.
    severity: warning
    entity_type: WorkItem
    relationship_type: work_item_spawned_from_work_item
    direction: outgoing
    max_count: 1


# -----------------------------------------------------------------------------
# constraints — forbid direct self-edges on the two new self-relationships (errors).
# (APPEND to the existing constraints list.)
# -----------------------------------------------------------------------------
constraints:
  - name: work_item_part_of_not_self
    description: A work item cannot be part of itself.
    severity: error
    rule: work_item_part_of_work_item.FROM.work_item_id != work_item_part_of_work_item.TO.work_item_id

  - name: work_item_spawned_from_not_self
    description: A work item cannot be spawned from itself.
    severity: error
    rule: work_item_spawned_from_work_item.FROM.work_item_id != work_item_spawned_from_work_item.TO.work_item_id
