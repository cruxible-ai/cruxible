version: '1.0'
name: agent_operation
description: |
  Agent-native operation state for coordinating human and agent work over one or more durable domain ontologies. Models the operating layer: work, reviews, decisions, risks, open questions, actors, lifecycle, blockers, dependencies, composition, lineage, and optional references out to domain state. Not a domain model, ticketing clone, document inventory, workflow catalog, or memory store.
enums:
  actor_kind:
    values:
    - human
    - agent
    - service_account
    - system
  actor_status:
    values:
    - active
    - inactive
  priority:
    values:
    - low
    - medium
    - high
    - critical
    ordered: low_to_high
  lifecycle_status:
    values:
    - planned
    - active
    - blocked
    - watching
    - deferred
    - closed
  work_item_type:
    values:
    - feature
    - bug
    - cleanup
    - research
    - docs
    - test
    - infrastructure
    - operations
  decision_status:
    values:
    - proposed
    - accepted
    - rejected
    - deferred
  decision_impact_type:
    values:
    - prioritizes
    - deprioritizes
    - blocks
    - unblocks
    - scopes
    - constrains
  review_status:
    values:
    - requested
    - in_review
    - changes_requested
    - approved
    - withdrawn
  state_note_kind:
    values:
    - correction
    - field_note
    - rationale_update
    - implementation_note
    - review_note
entity_types:
  Actor:
    description: Human, agent, service account, or system actor referenced by operation state.
    properties:
      actor_id:
        type: string
        primary_key: true
      name:
        type: string
        indexed: true
      kind:
        type: string
        enum_ref: actor_kind
      status:
        type: string
        enum_ref: actor_status
        default: active
      summary:
        type: string
        optional: true
  SubjectRef:
    description: |
      Lightweight reference to an external/cross-instance/not-yet-modeled subject. In a composed same-instance graph, prefer explicit typed operation-to-domain relationships over wrapping modeled domain entities in SubjectRef.
    properties:
      subject_ref_id:
        type: string
        primary_key: true
      label:
        type: string
        indexed: true
      subject_type:
        type: string
        indexed: true
      subject_id:
        type: string
        indexed: true
      state_ref:
        type: string
        optional: true
      summary:
        type: string
        optional: true
  WorkItem:
    description: Execution-level item an agent or human can work, review, close, defer, or supersede.
    properties:
      work_item_id:
        type: string
        primary_key: true
      title:
        type: string
        indexed: true
      summary:
        type: string
        optional: true
      description:
        type: string
        optional: true
      rationale:
        type: string
        optional: true
      type:
        type: string
        enum_ref: work_item_type
      status:
        type: string
        enum_ref: lifecycle_status
      priority:
        type: string
        enum_ref: priority
      target_date:
        type: date
        optional: true
  ReviewRequest:
    description: Review checkpoint that can gate completion of a work item.
    properties:
      review_request_id:
        type: string
        primary_key: true
      title:
        type: string
        indexed: true
      status:
        type: string
        enum_ref: review_status
      summary:
        type: string
        optional: true
      review_notes:
        type: string
        optional: true
      change_repo:
        type: string
        optional: true
      change_base:
        type: string
        optional: true
      change_head:
        type: string
        optional: true
      requested_at:
        type: date
        optional: true
      resolved_at:
        type: date
        optional: true
  Decision:
    description: Durable operating decision with lifecycle, rationale, impact, and supersession context.
    properties:
      decision_id:
        type: string
        primary_key: true
      title:
        type: string
        indexed: true
      summary:
        type: string
        optional: true
      rationale:
        type: string
        optional: true
      status:
        type: string
        enum_ref: decision_status
      decided_at:
        type: date
        optional: true
  Risk:
    description: Operational risk that can block or materially delay work.
    properties:
      risk_id:
        type: string
        primary_key: true
      title:
        type: string
        indexed: true
      summary:
        type: string
        optional: true
      status:
        type: string
        enum_ref: lifecycle_status
      priority:
        type: string
        enum_ref: priority
  OpenQuestion:
    description: Open question that can block work or decisions until answered.
    properties:
      question_id:
        type: string
        primary_key: true
      title:
        type: string
        indexed: true
      summary:
        type: string
        optional: true
      status:
        type: string
        enum_ref: lifecycle_status
      due_date:
        type: date
        optional: true
  StateNote:
    description: |
      Durable dated note about operation state (corrections, field notes, rationale updates, implementation notes, review notes). Preserves evolving interpretation without turning current entity summaries into changelogs.
    properties:
      note_id:
        type: string
        primary_key: true
      kind:
        type: string
        enum_ref: state_note_kind
      title:
        type: string
        indexed: true
      summary:
        type: string
      body:
        type: string
      created_at:
        type: datetime
      author:
        type: string
        optional: true
relationships:
- name: work_item_owned_by_actor
  from: WorkItem
  to: Actor
  description: Actor accountable for a work item.
- name: review_request_requested_by_actor
  from: ReviewRequest
  to: Actor
  description: Actor that requested the review.
- name: review_request_assigned_to_actor
  from: ReviewRequest
  to: Actor
  description: Actor expected to review the request.
- name: decision_owned_by_actor
  from: Decision
  to: Actor
  description: Actor accountable for a decision.
- name: risk_owned_by_actor
  from: Risk
  to: Actor
  description: Actor accountable for a risk.
- name: open_question_owned_by_actor
  from: OpenQuestion
  to: Actor
  description: Actor accountable for answering it.
- name: state_note_authored_by_actor
  from: StateNote
  to: Actor
  description: Actor that authored/recorded the note.
- name: review_request_for_work_item
  from: ReviewRequest
  to: WorkItem
  description: Reviews a work item for completion/acceptance.
- name: state_note_about_work_item
  from: StateNote
  to: WorkItem
- name: state_note_about_review_request
  from: StateNote
  to: ReviewRequest
- name: state_note_about_decision
  from: StateNote
  to: Decision
- name: state_note_about_risk
  from: StateNote
  to: Risk
- name: state_note_about_open_question
  from: StateNote
  to: OpenQuestion
- name: state_note_about_subject
  from: StateNote
  to: SubjectRef
- name: state_note_supersedes_state_note
  from: StateNote
  to: StateNote
  description: Supersedes/corrects an earlier note.
  properties:
    supersession_basis:
      type: string
      optional: true
- name: state_note_resolves_state_note
  from: StateNote
  to: StateNote
  description: |
    Note resolves an earlier note (e.g. a review finding) without erasing it; the original still stands as raised. "Unresolved" = no incoming resolves edge.
  properties:
    resolution_basis:
      type: string
      optional: true
- name: work_item_depends_on_work_item
  from: WorkItem
  to: WorkItem
  description: 'Sequencing: from depends on to landing/deciding first.'
  properties:
    dependency_basis:
      type: string
      optional: true
  proposal_policy:
    signals:
      source_evidence:
        role: required
        always_review_on_unsure: true
      maintainer_judgment:
        role: advisory
        always_review_on_unsure: true
- name: work_item_part_of_work_item
  from: WorkItem
  to: WorkItem
  description: 'Composition: part-of roll-up; NOT a prerequisite.'
- name: work_item_spawned_from_work_item
  from: WorkItem
  to: WorkItem
  description: 'Lineage: spawned from; provenance, not prerequisite.'
- name: work_item_supersedes_work_item
  from: WorkItem
  to: WorkItem
  description: 'Governed: one work item replaces/supersedes another.'
  properties:
    supersession_basis:
      type: string
      optional: true
  proposal_policy:
    signals:
      source_evidence:
        role: required
        always_review_on_unsure: true
      maintainer_judgment:
        role: advisory
        always_review_on_unsure: true
- name: risk_blocks_work_item
  from: Risk
  to: WorkItem
  description: 'Governed: a risk blocks/materially delays a work item.'
  properties:
    blocking_basis:
      type: string
      optional: true
  proposal_policy:
    signals:
      source_evidence:
        role: required
        always_review_on_unsure: true
      maintainer_judgment:
        role: advisory
        always_review_on_unsure: true
- name: open_question_blocks_work_item
  from: OpenQuestion
  to: WorkItem
  description: 'Governed: an open question blocks/delays a work item.'
  properties:
    blocking_basis:
      type: string
      optional: true
  proposal_policy:
    signals:
      source_evidence:
        role: required
        always_review_on_unsure: true
      maintainer_judgment:
        role: advisory
        always_review_on_unsure: true
- name: open_question_blocks_decision
  from: OpenQuestion
  to: Decision
  description: 'Governed: an open question blocks a decision.'
  properties:
    blocking_basis:
      type: string
      optional: true
  proposal_policy:
    signals:
      source_evidence:
        role: required
        always_review_on_unsure: true
      maintainer_judgment:
        role: advisory
        always_review_on_unsure: true
- name: work_item_mitigates_risk
  from: WorkItem
  to: Risk
  description: 'Governed: a work item mitigates/reduces a risk.'
  properties:
    mitigation_basis:
      type: string
      optional: true
  proposal_policy:
    signals:
      source_evidence:
        role: required
        always_review_on_unsure: true
      maintainer_judgment:
        role: advisory
        always_review_on_unsure: true
- name: work_item_answers_open_question
  from: WorkItem
  to: OpenQuestion
  description: 'Governed: a work item answers/investigates a question.'
  properties:
    answer_basis:
      type: string
      optional: true
  proposal_policy:
    signals:
      source_evidence:
        role: required
        always_review_on_unsure: true
      maintainer_judgment:
        role: advisory
        always_review_on_unsure: true
- name: decision_answers_open_question
  from: Decision
  to: OpenQuestion
  description: 'Governed: a decision answers an open question.'
  properties:
    answer_basis:
      type: string
      optional: true
  proposal_policy:
    signals:
      source_evidence:
        role: required
        always_review_on_unsure: true
      maintainer_judgment:
        role: advisory
        always_review_on_unsure: true
- name: decision_supersedes_decision
  from: Decision
  to: Decision
  description: 'Governed: one decision supersedes another.'
  properties:
    supersession_basis:
      type: string
      optional: true
  proposal_policy:
    signals:
      source_evidence:
        role: required
        always_review_on_unsure: true
      maintainer_judgment:
        role: advisory
        always_review_on_unsure: true
- name: decision_constrains_work_item
  from: Decision
  to: WorkItem
  description: 'Governed: a decision constrains how work proceeds.'
  properties:
    impact_type:
      type: string
      enum_ref: decision_impact_type
    constraint_basis:
      type: string
      optional: true
  proposal_policy:
    signals:
      source_evidence:
        role: required
        always_review_on_unsure: true
      maintainer_judgment:
        role: advisory
        always_review_on_unsure: true
- name: work_item_targets_subject
  from: WorkItem
  to: SubjectRef
  description: Work item targets/changes a domain subject.
- name: decision_affects_subject
  from: Decision
  to: SubjectRef
  description: 'Governed: a decision affects a domain subject.'
  properties:
    impact_type:
      type: string
      enum_ref: decision_impact_type
    impact_basis:
      type: string
      optional: true
  proposal_policy:
    signals:
      source_evidence:
        role: required
        always_review_on_unsure: true
      maintainer_judgment:
        role: advisory
        always_review_on_unsure: true
- name: risk_attaches_to_subject
  from: Risk
  to: SubjectRef
  description: 'Governed: a risk attaches to a domain subject.'
  properties:
    impact_basis:
      type: string
      optional: true
  proposal_policy:
    signals:
      source_evidence:
        role: required
        always_review_on_unsure: true
      maintainer_judgment:
        role: advisory
        always_review_on_unsure: true
- name: open_question_concerns_subject
  from: OpenQuestion
  to: SubjectRef
  description: 'Governed: an open question concerns a domain subject.'
  properties:
    concern_basis:
      type: string
      optional: true
  proposal_policy:
    signals:
      source_evidence:
        role: required
        always_review_on_unsure: true
      maintainer_judgment:
        role: advisory
        always_review_on_unsure: true
named_queries:
  work_item_context:
    mode: traversal
    description: From a work item, inspect dependencies, blockers, reviews, composition, lineage, decisions, owner, subjects.
    entry_point: WorkItem
    returns: AnyEntity
    result_shape: path
    traversal:
    - relationship:
      - work_item_owned_by_actor
      - review_request_for_work_item
      - state_note_about_work_item
      - work_item_depends_on_work_item
      - work_item_part_of_work_item
      - work_item_spawned_from_work_item
      - work_item_supersedes_work_item
      - risk_blocks_work_item
      - open_question_blocks_work_item
      - work_item_mitigates_risk
      - work_item_answers_open_question
      - decision_constrains_work_item
      - work_item_targets_subject
      direction: both
      as: context
    include:
      work_item_owned_by_actor:
        from: $entry
        relationship: work_item_owned_by_actor
        direction: outgoing
        many: true
      review_request_for_work_item:
        from: $entry
        relationship: review_request_for_work_item
        direction: incoming
        many: true
      state_note_about_work_item:
        from: $entry
        relationship: state_note_about_work_item
        direction: incoming
        many: true
        limit: 10
        order_by:
        - by: $source.properties.created_at
          direction: desc
          value_type: datetime
      work_item_depends_on_work_item_out:
        from: $entry
        relationship: work_item_depends_on_work_item
        direction: outgoing
        many: true
      work_item_depends_on_work_item_in:
        from: $entry
        relationship: work_item_depends_on_work_item
        direction: incoming
        many: true
      work_item_part_of_work_item_out:
        from: $entry
        relationship: work_item_part_of_work_item
        direction: outgoing
        many: true
      work_item_part_of_work_item_in:
        from: $entry
        relationship: work_item_part_of_work_item
        direction: incoming
        many: true
      work_item_spawned_from_work_item_out:
        from: $entry
        relationship: work_item_spawned_from_work_item
        direction: outgoing
        many: true
      work_item_spawned_from_work_item_in:
        from: $entry
        relationship: work_item_spawned_from_work_item
        direction: incoming
        many: true
      work_item_supersedes_work_item_out:
        from: $entry
        relationship: work_item_supersedes_work_item
        direction: outgoing
        many: true
      work_item_supersedes_work_item_in:
        from: $entry
        relationship: work_item_supersedes_work_item
        direction: incoming
        many: true
      risk_blocks_work_item:
        from: $entry
        relationship: risk_blocks_work_item
        direction: incoming
        many: true
      open_question_blocks_work_item:
        from: $entry
        relationship: open_question_blocks_work_item
        direction: incoming
        many: true
      work_item_mitigates_risk:
        from: $entry
        relationship: work_item_mitigates_risk
        direction: outgoing
        many: true
      work_item_answers_open_question:
        from: $entry
        relationship: work_item_answers_open_question
        direction: outgoing
        many: true
      decision_constrains_work_item:
        from: $entry
        relationship: decision_constrains_work_item
        direction: incoming
        many: true
      work_item_targets_subject:
        from: $entry
        relationship: work_item_targets_subject
        direction: outgoing
        many: true
    select:
      work_item_id: $result.entity_id
      title: $result.properties.title
      status: $result.properties.status
      priority: $result.properties.priority
    relationship_state: reviewable
    allow_relationship_state_override: true
    max_paths: 500
    max_paths_per_result: 50
  actor_work_queue:
    mode: traversal
    description: Work items owned by an actor with latest reviews, dependency counts, blockers, subjects.
    entry_point: Actor
    returns: WorkItem
    result_shape: path
    traversal:
    - relationship: work_item_owned_by_actor
      direction: incoming
      as: work_item
      where:
        candidate.properties.status:
          not_in:
          - closed
    include:
      latest_review:
        from: $result
        relationship: review_request_for_work_item
        direction: incoming
        many: true
        limit: 1
        order_by:
        - by: $source.properties.requested_at
          direction: desc
          value_type: date
        - by: $source.properties.resolved_at
          direction: desc
          value_type: date
      work_item_depends_on_work_item_out:
        from: $result
        relationship: work_item_depends_on_work_item
        direction: outgoing
        many: true
      work_item_depends_on_work_item_in:
        from: $result
        relationship: work_item_depends_on_work_item
        direction: incoming
        many: true
      risk_blocks_work_item:
        from: $result
        relationship: risk_blocks_work_item
        direction: incoming
        many: true
      open_question_blocks_work_item:
        from: $result
        relationship: open_question_blocks_work_item
        direction: incoming
        many: true
      work_item_targets_subject:
        from: $result
        relationship: work_item_targets_subject
        direction: outgoing
        many: true
    select:
      work_item_id: $result.entity_id
      title: $result.properties.title
      status: $result.properties.status
      priority: $result.properties.priority
      type: $result.properties.type
      upstream_dependency_count: $include.work_item_depends_on_work_item_out.count
      downstream_dependent_count: $include.work_item_depends_on_work_item_in.count
      blocking_risk_count: $include.risk_blocks_work_item.count
      blocking_open_question_count: $include.open_question_blocks_work_item.count
      subject_count: $include.work_item_targets_subject.count
      latest_review_request_id: $include.latest_review.items.0.source.entity_id
      latest_review_status: $include.latest_review.items.0.source.properties.status
    order_by:
    - by: $result.properties.priority
      direction: desc
      enum_ref: priority
    relationship_state: reviewable
    allow_relationship_state_override: true
    max_paths: 500
    max_paths_per_result: 100
  review_queue:
    mode: collection
    description: Review requests awaiting review or changes.
    returns: ReviewRequest
    result_shape: entity
    where:
      result.properties.status:
        in:
        - requested
        - in_review
        - changes_requested
    include:
      review_request_for_work_item:
        from: $result
        relationship: review_request_for_work_item
        direction: outgoing
        many: true
      review_request_assigned_to_actor:
        from: $result
        relationship: review_request_assigned_to_actor
        direction: outgoing
        many: true
      review_request_requested_by_actor:
        from: $result
        relationship: review_request_requested_by_actor
        direction: outgoing
        many: true
    select:
      review_request_id: $result.entity_id
      title: $result.properties.title
      status: $result.properties.status
      requested_at: $result.properties.requested_at
      work_item_count: $include.review_request_for_work_item.count
      reviewer_count: $include.review_request_assigned_to_actor.count
      requester_count: $include.review_request_requested_by_actor.count
      work_items: $include.review_request_for_work_item.items
      reviewers: $include.review_request_assigned_to_actor.items
      requesters: $include.review_request_requested_by_actor.items
    order_by:
    - by: $result.properties.requested_at
      direction: asc
      value_type: date
    relationship_state: reviewable
    allow_relationship_state_override: true
    limit: 100
  recent_state_notes:
    mode: collection
    description: Recent operation-state notes, corrections, rationale/implementation/review notes.
    returns: StateNote
    result_shape: entity
    include:
      state_note_authored_by_actor:
        from: $result
        relationship: state_note_authored_by_actor
        direction: outgoing
        many: true
      state_note_about_work_item:
        from: $result
        relationship: state_note_about_work_item
        direction: outgoing
        many: true
      state_note_about_review_request:
        from: $result
        relationship: state_note_about_review_request
        direction: outgoing
        many: true
      state_note_about_decision:
        from: $result
        relationship: state_note_about_decision
        direction: outgoing
        many: true
      state_note_about_risk:
        from: $result
        relationship: state_note_about_risk
        direction: outgoing
        many: true
      state_note_about_open_question:
        from: $result
        relationship: state_note_about_open_question
        direction: outgoing
        many: true
      state_note_about_subject:
        from: $result
        relationship: state_note_about_subject
        direction: outgoing
        many: true
      state_note_supersedes_state_note_out:
        from: $result
        relationship: state_note_supersedes_state_note
        direction: outgoing
        many: true
      state_note_supersedes_state_note_in:
        from: $result
        relationship: state_note_supersedes_state_note
        direction: incoming
        many: true
    select:
      note_id: $result.entity_id
      kind: $result.properties.kind
      title: $result.properties.title
      summary: $result.properties.summary
      created_at: $result.properties.created_at
      author_count: $include.state_note_authored_by_actor.count
      work_item_count: $include.state_note_about_work_item.count
      review_request_count: $include.state_note_about_review_request.count
      decision_count: $include.state_note_about_decision.count
      risk_count: $include.state_note_about_risk.count
      open_question_count: $include.state_note_about_open_question.count
      subject_count: $include.state_note_about_subject.count
      supersedes_count: $include.state_note_supersedes_state_note_out.count
      superseded_by_count: $include.state_note_supersedes_state_note_in.count
    order_by:
    - by: $result.properties.created_at
      direction: desc
      value_type: datetime
    relationship_state: reviewable
    allow_relationship_state_override: true
    limit: 100
  state_note_context:
    mode: traversal
    description: Full context for a state note (targets, author, supersession).
    entry_point: StateNote
    returns: AnyEntity
    result_shape: path
    traversal:
    - relationship:
      - state_note_authored_by_actor
      - state_note_about_work_item
      - state_note_about_review_request
      - state_note_about_decision
      - state_note_about_risk
      - state_note_about_open_question
      - state_note_about_subject
      - state_note_supersedes_state_note
      - state_note_resolves_state_note
      direction: both
      as: context
    include:
      state_note_authored_by_actor:
        from: $entry
        relationship: state_note_authored_by_actor
        direction: outgoing
        many: true
      state_note_about_work_item:
        from: $entry
        relationship: state_note_about_work_item
        direction: outgoing
        many: true
      state_note_about_review_request:
        from: $entry
        relationship: state_note_about_review_request
        direction: outgoing
        many: true
      state_note_about_decision:
        from: $entry
        relationship: state_note_about_decision
        direction: outgoing
        many: true
      state_note_about_risk:
        from: $entry
        relationship: state_note_about_risk
        direction: outgoing
        many: true
      state_note_about_open_question:
        from: $entry
        relationship: state_note_about_open_question
        direction: outgoing
        many: true
      state_note_about_subject:
        from: $entry
        relationship: state_note_about_subject
        direction: outgoing
        many: true
      state_note_supersedes_state_note_out:
        from: $entry
        relationship: state_note_supersedes_state_note
        direction: outgoing
        many: true
      state_note_supersedes_state_note_in:
        from: $entry
        relationship: state_note_supersedes_state_note
        direction: incoming
        many: true
      state_note_resolves_state_note_out:
        from: $entry
        relationship: state_note_resolves_state_note
        direction: outgoing
        many: true
      state_note_resolves_state_note_in:
        from: $entry
        relationship: state_note_resolves_state_note
        direction: incoming
        many: true
    relationship_state: reviewable
    allow_relationship_state_override: true
    max_paths: 200
    max_paths_per_result: 50
  state_notes_for_work_item:
    mode: traversal
    description: State notes attached to a work item, newest first.
    entry_point: WorkItem
    returns: StateNote
    result_shape: path
    traversal:
    - relationship: state_note_about_work_item
      direction: incoming
      as: state_note
    order_by:
    - by: $result.properties.created_at
      direction: desc
      value_type: datetime
    relationship_state: reviewable
    allow_relationship_state_override: true
    max_paths: 200
    max_paths_per_result: 50
  approved_reviews_for_work_item:
    mode: traversal
    description: Approved review requests for a work item. Used by the closed-transition guard.
    entry_point: WorkItem
    returns: ReviewRequest
    result_shape: path
    traversal:
    - relationship: review_request_for_work_item
      direction: incoming
      as: approved_review
      where:
        candidate.properties.status:
          eq: approved
    relationship_state: reviewable
    allow_relationship_state_override: true
    max_paths: 100
    max_paths_per_result: 25
  blocked_work_items:
    mode: collection
    description: Work items marked blocked, with risk/open-question blocker context.
    returns: WorkItem
    result_shape: entity
    where:
      result.properties.status:
        eq: blocked
    include:
      risk_blocks_work_item:
        from: $result
        relationship: risk_blocks_work_item
        direction: incoming
        many: true
      open_question_blocks_work_item:
        from: $result
        relationship: open_question_blocks_work_item
        direction: incoming
        many: true
      work_item_depends_on_work_item_out:
        from: $result
        relationship: work_item_depends_on_work_item
        direction: outgoing
        many: true
    select:
      work_item_id: $result.entity_id
      title: $result.properties.title
      priority: $result.properties.priority
      blocking_risk_count: $include.risk_blocks_work_item.count
      blocking_open_question_count: $include.open_question_blocks_work_item.count
      upstream_dependency_count: $include.work_item_depends_on_work_item_out.count
      blocking_risks: $include.risk_blocks_work_item.items
      blocking_open_questions: $include.open_question_blocks_work_item.items
      upstream_dependencies: $include.work_item_depends_on_work_item_out.items
    order_by:
    - by: $result.properties.priority
      direction: desc
      enum_ref: priority
    relationship_state: reviewable
    allow_relationship_state_override: true
    limit: 100
  work_item_rollup_context:
    mode: traversal
    description: Child/descendant work items under a parent.
    entry_point: WorkItem
    returns: WorkItem
    result_shape: path
    traversal:
    - relationship: work_item_part_of_work_item
      direction: incoming
      as: child_or_descendant
      max_depth: 5
    relationship_state: reviewable
    allow_relationship_state_override: true
    max_paths: 500
    max_paths_per_result: 100
  work_item_lineage_context:
    mode: traversal
    description: Work item lineage/replacement context, excluding sequencing deps.
    entry_point: WorkItem
    returns: WorkItem
    result_shape: path
    traversal:
    - relationship:
      - work_item_spawned_from_work_item
      - work_item_supersedes_work_item
      direction: both
      as: lineage
      max_depth: 5
    relationship_state: reviewable
    allow_relationship_state_override: true
    max_paths: 500
    max_paths_per_result: 100
  subject_operation_context:
    mode: traversal
    description: Work, decisions, risks, open questions attached to a subject ref.
    entry_point: SubjectRef
    returns: AnyEntity
    result_shape: path
    traversal:
    - relationship:
      - state_note_about_subject
      - work_item_targets_subject
      - decision_affects_subject
      - risk_attaches_to_subject
      - open_question_concerns_subject
      direction: both
      as: context
    include:
      state_note_about_subject:
        from: $entry
        relationship: state_note_about_subject
        direction: incoming
        many: true
      work_item_targets_subject:
        from: $entry
        relationship: work_item_targets_subject
        direction: incoming
        many: true
      decision_affects_subject:
        from: $entry
        relationship: decision_affects_subject
        direction: incoming
        many: true
      risk_attaches_to_subject:
        from: $entry
        relationship: risk_attaches_to_subject
        direction: incoming
        many: true
      open_question_concerns_subject:
        from: $entry
        relationship: open_question_concerns_subject
        direction: incoming
        many: true
    relationship_state: reviewable
    allow_relationship_state_override: true
    max_paths: 500
    max_paths_per_result: 100
  active_risks:
    mode: collection
    description: Active operational risks.
    returns: Risk
    result_shape: entity
    where:
      result.properties.status:
        eq: active
    order_by:
    - by: $result.properties.priority
      direction: desc
      enum_ref: priority
    limit: 100
  open_questions_needing_review:
    mode: collection
    description: Planned/active open questions needing review.
    returns: OpenQuestion
    result_shape: entity
    where:
      result.properties.status:
        in:
        - planned
        - active
    order_by:
    - by: $result.properties.due_date
      direction: asc
      value_type: date
    limit: 100
  proposed_decisions:
    mode: collection
    description: Proposed decisions awaiting acceptance/rejection/deferral.
    returns: Decision
    result_shape: entity
    where:
      result.properties.status:
        eq: proposed
    limit: 100
  superseded_decisions:
    mode: collection
    description: Decision retired/superseded on the canonical entity-lifecycle axis (lifecycle.status != live), gated out of live reads. Supersession is not a domain status value.
    returns: Decision
    result_shape: entity
    relationship_state: not-live
    allow_relationship_state_override: true
    limit: 100
  superseded_work_items:
    mode: collection
    description: WorkItem retired/superseded on the canonical entity-lifecycle axis (lifecycle.status != live), gated out of live reads. Supersession is not a domain status value.
    returns: WorkItem
    result_shape: entity
    relationship_state: not-live
    allow_relationship_state_override: true
    limit: 100
mutation_guards:
- name: review_verdict_requires_rationale_note
  entity_type: ReviewRequest
  property: status
  new_value:
  - changes_requested
  - approved
  - withdrawn
  condition:
    type: co_write
    requires:
      entity_type: StateNote
      via_relationship: state_note_about_review_request
      kind: review_note
  message: A ReviewRequest verdict must co-write a new StateNote(kind=review_note) linked via state_note_about_review_request in the same write. Status can't advance without recording why.
- name: review_request_approval_requires_authorized_actor
  entity_type: ReviewRequest
  property: status
  new_value: approved
  condition:
    type: actor
    allowed_actor_ids:
    - authorized-reviewer
  message: ReviewRequest approvals require the authenticated reviewer actor (not a writer credential or spoofed body actor).
- name: work_item_closed_requires_approved_review
  entity_type: WorkItem
  property: status
  new_value: closed
  condition:
    type: query
    query_name: approved_reviews_for_work_item
    params:
      work_item_id: $entity.entity_id
    min_count: 1
  message: Work items cannot be closed until an approved ReviewRequest reviews them.
quality_checks:
- name: work_items_have_owner
  kind: cardinality
  entity_type: WorkItem
  relationship_type: work_item_owned_by_actor
  direction: outgoing
  description: Work items should have an accountable actor.
  min_count: 1
- name: review_requests_review_work
  kind: cardinality
  entity_type: ReviewRequest
  relationship_type: review_request_for_work_item
  direction: outgoing
  description: Review requests should attach to the work item they review.
  min_count: 1
- name: work_item_part_of_single_parent
  kind: cardinality
  entity_type: WorkItem
  relationship_type: work_item_part_of_work_item
  direction: outgoing
  description: Composition should form a tree; one direct parent.
  max_count: 1
- name: work_item_spawned_from_single_origin
  kind: cardinality
  entity_type: WorkItem
  relationship_type: work_item_spawned_from_work_item
  direction: outgoing
  description: Lineage records at most one direct origin.
  max_count: 1
- name: state_notes_have_author
  kind: cardinality
  entity_type: StateNote
  relationship_type: state_note_authored_by_actor
  direction: outgoing
  description: State notes should be attributable to an actor.
  min_count: 1
- name: work_dependencies_have_basis
  kind: property
  target: relationship
  relationship_type: work_item_depends_on_work_item
  property: dependency_basis
  rule: non_empty
- name: work_supersessions_have_basis
  kind: property
  target: relationship
  relationship_type: work_item_supersedes_work_item
  property: supersession_basis
  rule: non_empty
- name: risk_work_blockers_have_basis
  kind: property
  target: relationship
  relationship_type: risk_blocks_work_item
  property: blocking_basis
  rule: non_empty
- name: open_question_work_blockers_have_basis
  kind: property
  target: relationship
  relationship_type: open_question_blocks_work_item
  property: blocking_basis
  rule: non_empty
- name: decision_work_constraints_have_type
  kind: property
  target: relationship
  relationship_type: decision_constrains_work_item
  property: impact_type
  rule: required
- name: decision_supersessions_have_basis
  kind: property
  target: relationship
  relationship_type: decision_supersedes_decision
  property: supersession_basis
  rule: non_empty
- name: state_note_supersessions_have_basis
  kind: property
  target: relationship
  relationship_type: state_note_supersedes_state_note
  property: supersession_basis
  rule: non_empty
constraints: []
