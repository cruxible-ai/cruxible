<svg viewBox="0 0 1260 430" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <marker id="aG" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 1 L 8 5 L 0 9 z" fill="#8b949e"/>
    </marker>
    <marker id="aB" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 8 5 L 0 9 z" fill="#3b82f6"/>
    </marker>
    <marker id="aA" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 8 5 L 0 9 z" fill="#d29922"/>
    </marker>
    <marker id="aT" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 8 5 L 0 9 z" fill="#14b8a6"/>
    </marker>
  </defs>

  <!-- clients: actors operating from outside the state layers -->
  <rect x="850" y="16" width="100" height="30" rx="15" fill="#8b949e" fill-opacity="0.04" stroke="#8b949e" stroke-width="1.2"/>
  <text x="900" y="35" fill="#8b949e" font-size="11" text-anchor="middle">agent · MCP</text>
  <rect x="970" y="16" width="100" height="30" rx="15" fill="#8b949e" fill-opacity="0.04" stroke="#8b949e" stroke-width="1.2"/>
  <text x="1020" y="35" fill="#8b949e" font-size="11" text-anchor="middle">human · CLI</text>

  <!-- domain -> clients: reads terminate at the client -->
  <path d="M 790 100 L 790 78 Q 790 72 796 72 L 887 72 Q 893 72 893 66 L 893 52" fill="none" stroke="#8b949e" stroke-width="1.5" marker-end="url(#aG)"/>
  <text x="790" y="58" fill="#8b949e" font-size="10.5" text-anchor="end">deterministic queries</text>
  <text x="790" y="71" fill="#8b949e" font-size="10.5" text-anchor="end">+ receipts</text>

  <!-- clients -> operation: actors drive the work -->
  <path d="M 1020 50 L 1020 66 Q 1020 72 1026 72 L 1119 72 Q 1125 72 1125 78 L 1125 96" fill="none" stroke="#8b949e" stroke-width="1.5" marker-end="url(#aG)"/>
  <text x="1090" y="64" fill="#8b949e" font-size="10.5">claim · review · decide</text>

  <!-- ======== SOURCE SYSTEMS ======== -->
  <rect x="30" y="100" width="160" height="280" rx="10" fill="#8b949e" fill-opacity="0.05" stroke="#8b949e" stroke-width="1.2" stroke-dasharray="5 4"/>
  <text x="110" y="128" fill="#8b949e" font-size="12.5" font-weight="700" letter-spacing="0.05em" text-anchor="middle">SOURCE SYSTEMS</text>
  <rect x="70" y="150" width="80" height="46" rx="4" fill="none" stroke="#8b949e" stroke-width="1.2"/>
  <line x1="70" y1="165" x2="150" y2="165" stroke="#8b949e" stroke-width="1"/>
  <line x1="70" y1="180" x2="150" y2="180" stroke="#8b949e" stroke-width="1"/>
  <line x1="103" y1="150" x2="103" y2="196" stroke="#8b949e" stroke-width="1"/>
  <text x="110" y="214" fill="#8b949e" font-size="10" text-anchor="middle">inventory.csv</text>
  <path d="M 88 234 L 120 234 L 132 246 L 132 294 L 88 294 Z" fill="none" stroke="#8b949e" stroke-width="1.2"/>
  <path d="M 120 234 L 120 246 L 132 246" fill="none" stroke="#8b949e" stroke-width="1.2"/>
  <line x1="96" y1="258" x2="124" y2="258" stroke="#8b949e" stroke-width="1"/>
  <line x1="96" y1="270" x2="124" y2="270" stroke="#8b949e" stroke-width="1"/>
  <line x1="96" y1="282" x2="116" y2="282" stroke="#8b949e" stroke-width="1"/>
  <text x="110" y="312" fill="#8b949e" font-size="10" text-anchor="middle">runbook.md</text>
  <text x="110" y="346" fill="#8b949e" font-size="10.5" text-anchor="middle">kept where they are,</text>
  <text x="110" y="361" fill="#8b949e" font-size="10.5" text-anchor="middle">cited by claims</text>

  <!-- sources -> workflows -->
  <line x1="190" y1="240" x2="286" y2="240" stroke="#8b949e" stroke-width="1.5" marker-end="url(#aG)"/>
  <text x="240" y="218" fill="#8b949e" font-size="10.5" text-anchor="middle">pinned, digest-</text>
  <text x="240" y="231" fill="#8b949e" font-size="10.5" text-anchor="middle">verified artifacts</text>

  <!-- ======== WORKFLOWS ======== -->
  <rect x="290" y="100" width="230" height="280" rx="10" fill="#14b8a6" fill-opacity="0.07" stroke="#14b8a6" stroke-width="1.5"/>
  <text x="405" y="128" fill="#14b8a6" font-size="13" font-weight="700" letter-spacing="0.05em" text-anchor="middle">WORKFLOWS</text>
  <rect x="335" y="150" width="140" height="26" rx="6" fill="#14b8a6" fill-opacity="0.10" stroke="#14b8a6" stroke-width="1.2"/>
  <text x="405" y="167" fill="#14b8a6" font-size="10.5" text-anchor="middle">parse pinned artifact</text>
  <line x1="405" y1="176" x2="405" y2="192" stroke="#14b8a6" stroke-width="1.2" marker-end="url(#aT)"/>
  <rect x="335" y="195" width="140" height="26" rx="6" fill="#14b8a6" fill-opacity="0.10" stroke="#14b8a6" stroke-width="1.2"/>
  <text x="405" y="212" fill="#14b8a6" font-size="10.5" text-anchor="middle">match rows to state</text>
  <line x1="405" y1="221" x2="405" y2="237" stroke="#14b8a6" stroke-width="1.2" marker-end="url(#aT)"/>
  <rect x="335" y="240" width="140" height="26" rx="6" fill="#d29922" fill-opacity="0.08" stroke="#d29922" stroke-width="1.2" stroke-dasharray="4 3"/>
  <text x="405" y="257" fill="#d29922" font-size="10.5" text-anchor="middle">model verdict (if needed)</text>
  <line x1="405" y1="266" x2="405" y2="282" stroke="#14b8a6" stroke-width="1.2" marker-end="url(#aT)"/>
  <rect x="335" y="285" width="140" height="26" rx="6" fill="#14b8a6" fill-opacity="0.10" stroke="#14b8a6" stroke-width="1.2"/>
  <text x="405" y="302" fill="#14b8a6" font-size="10.5" text-anchor="middle">propose claims</text>
  <text x="405" y="341" fill="#8b949e" font-size="10.5" text-anchor="middle">preview → apply · locked to</text>
  <text x="405" y="356" fill="#8b949e" font-size="10.5" text-anchor="middle">pinned provider code · replayable</text>

  <!-- workflows <-> domain -->
  <line x1="520" y1="190" x2="636" y2="190" stroke="#8b949e" stroke-width="1.5" marker-end="url(#aG)"/>
  <text x="580" y="168" fill="#8b949e" font-size="10.5" text-anchor="middle">proposed claims,</text>
  <text x="580" y="181" fill="#8b949e" font-size="10.5" text-anchor="middle">matched row by row</text>
  <line x1="640" y1="290" x2="524" y2="290" stroke="#8b949e" stroke-width="1.5" marker-end="url(#aG)"/>
  <text x="580" y="310" fill="#8b949e" font-size="10.5" text-anchor="middle">workflow steps</text>
  <text x="580" y="323" fill="#8b949e" font-size="10.5" text-anchor="middle">read state back</text>

  <!-- ======== DOMAIN STATE ======== -->
  <rect x="640" y="100" width="260" height="280" rx="10" fill="#3b82f6" fill-opacity="0.07" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="770" y="128" fill="#3b82f6" font-size="13" font-weight="700" letter-spacing="0.05em" text-anchor="middle">DOMAIN STATE</text>
  <rect x="662" y="164" width="86" height="26" rx="13" fill="#3b82f6" fill-opacity="0.10" stroke="#3b82f6" stroke-width="1.2"/>
  <text x="705" y="181" fill="#3b82f6" font-size="10.5" font-weight="600" text-anchor="middle">Supplier</text>
  <rect x="792" y="164" width="86" height="26" rx="13" fill="#3b82f6" fill-opacity="0.10" stroke="#3b82f6" stroke-width="1.2"/>
  <text x="835" y="181" fill="#3b82f6" font-size="10.5" font-weight="600" text-anchor="middle">Component</text>
  <rect x="662" y="269" width="86" height="26" rx="13" fill="#3b82f6" fill-opacity="0.10" stroke="#3b82f6" stroke-width="1.2"/>
  <text x="705" y="286" fill="#3b82f6" font-size="10.5" font-weight="600" text-anchor="middle">Incident</text>
  <rect x="792" y="269" width="86" height="26" rx="13" fill="#3b82f6" fill-opacity="0.10" stroke="#3b82f6" stroke-width="1.2"/>
  <text x="835" y="286" fill="#3b82f6" font-size="10.5" font-weight="600" text-anchor="middle">Product</text>
  <line x1="748" y1="177" x2="788" y2="177" stroke="#3b82f6" stroke-width="1.3" marker-end="url(#aB)"/>
  <text x="768" y="147" fill="#8b949e" font-size="9.5" text-anchor="middle">supplies</text>
  <text x="768" y="159" fill="#3fb950" font-size="9.5" text-anchor="middle">approved</text>
  <line x1="705" y1="269" x2="705" y2="194" stroke="#d29922" stroke-width="1.3" stroke-dasharray="4 3" marker-end="url(#aA)"/>
  <text x="713" y="224" fill="#8b949e" font-size="9.5">impacts</text>
  <text x="713" y="237" fill="#d29922" font-size="9.5">pending review</text>
  <line x1="835" y1="194" x2="835" y2="265" stroke="#3b82f6" stroke-width="1.3" marker-end="url(#aB)"/>
  <text x="843" y="224" fill="#8b949e" font-size="9.5">used_in</text>
  <text x="843" y="237" fill="#3fb950" font-size="9.5">approved</text>
  <text x="770" y="341" fill="#8b949e" font-size="10.5" text-anchor="middle">every edge carries review status,</text>
  <text x="770" y="356" fill="#8b949e" font-size="10.5" text-anchor="middle">attribution, and its cited chunk</text>

  <!-- domain <-> operation -->
  <line x1="1020" y1="190" x2="904" y2="190" stroke="#8b949e" stroke-width="1.5" marker-end="url(#aG)"/>
  <text x="960" y="168" fill="#8b949e" font-size="10.5" text-anchor="middle">propose · approve</text>
  <text x="960" y="181" fill="#8b949e" font-size="10.5" text-anchor="middle">mint into fact</text>
  <line x1="1020" y1="290" x2="904" y2="290" stroke="#8b949e" stroke-width="1.3" stroke-dasharray="5 4" marker-end="url(#aG)"/>
  <text x="960" y="310" fill="#8b949e" font-size="10.5" text-anchor="middle">seam edges: work items</text>
  <text x="960" y="323" fill="#8b949e" font-size="10.5" text-anchor="middle">target domain subjects</text>

  <!-- ======== AGENT OPERATION STATE ======== -->
  <rect x="1020" y="100" width="210" height="280" rx="10" fill="#8b5cf6" fill-opacity="0.07" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="1125" y="128" fill="#8b5cf6" font-size="13" font-weight="700" letter-spacing="0.04em" text-anchor="middle">AGENT OPERATION STATE</text>
  <rect x="1042" y="150" width="166" height="28" rx="6" fill="#8b5cf6" fill-opacity="0.10" stroke="#8b5cf6" stroke-width="1.2"/>
  <text x="1052" y="168" fill="#8b5cf6" font-size="10.5" font-weight="600">WorkItem</text>
  <text x="1198" y="168" fill="#8b949e" font-size="10" text-anchor="end">active</text>
  <line x1="1125" y1="178" x2="1125" y2="196" stroke="#8b5cf6" stroke-width="1.2" marker-end="url(#aG)"/>
  <rect x="1042" y="199" width="166" height="28" rx="6" fill="#8b5cf6" fill-opacity="0.10" stroke="#8b5cf6" stroke-width="1.2"/>
  <text x="1052" y="217" fill="#8b5cf6" font-size="10.5" font-weight="600">ReviewRequest</text>
  <text x="1198" y="217" fill="#3fb950" font-size="10" text-anchor="end">approved</text>
  <line x1="1125" y1="227" x2="1125" y2="245" stroke="#8b5cf6" stroke-width="1.2" marker-end="url(#aG)"/>
  <rect x="1042" y="248" width="166" height="28" rx="6" fill="#8b5cf6" fill-opacity="0.10" stroke="#8b5cf6" stroke-width="1.2"/>
  <text x="1052" y="266" fill="#8b5cf6" font-size="10.5" font-weight="600">Decision</text>
  <text x="1198" y="266" fill="#8b949e" font-size="10" text-anchor="end">attributed</text>
  <text x="1125" y="341" fill="#8b949e" font-size="10.5" text-anchor="middle">actors are minted identities;</text>
  <text x="1125" y="356" fill="#8b949e" font-size="10.5" text-anchor="middle">work closes only through review</text>

  <!-- config bracket under the three declared layers -->
  <path d="M 290 390 L 290 400 L 1230 400 L 1230 390" fill="none" stroke="#8b949e" stroke-width="1.5"/>
  <text x="760" y="420" fill="#8b949e" font-size="12" text-anchor="middle">declared together in one Terraform-like config</text>
</svg>
